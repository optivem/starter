name: bump-versions

on:
  workflow_dispatch:

jobs:
  bump:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Bump Patch Versions
        id: bump
        uses: optivem/actions/bump-patch-versions@v1
        with:
          version-files: |
            VERSION:meta-v,monolith-java-v,monolith-dotnet-v,monolith-typescript-v,multitier-java-v,multitier-dotnet-v,multitier-typescript-v
            system/monolith/dotnet/VERSION:monolith-dotnet-v,meta-v
            system/monolith/java/VERSION:monolith-java-v,meta-v
            system/monolith/typescript/VERSION:monolith-typescript-v,meta-v
            system/multitier/backend-dotnet/VERSION:multitier-backend-dotnet-v,multitier-dotnet-v,meta-v
            system/multitier/backend-java/VERSION:multitier-backend-java-v,multitier-java-v,meta-v
            system/multitier/backend-typescript/VERSION:multitier-backend-typescript-v,multitier-typescript-v,meta-v
            system/multitier/frontend-react/VERSION:multitier-frontend-react-v,multitier-java-v,multitier-dotnet-v,multitier-typescript-v,meta-v

      - name: Write summary
        shell: bash
        env:
          BUMPED: ${{ steps.bump.outputs.bumped }}
          BUMP_SUMMARY: ${{ steps.bump.outputs.summary }}
        run: |
          if [[ "$BUMPED" == "true" ]]; then
            {
              echo "## Versions bumped"
              echo ""
              echo '```'
              printf '%s\n' "$BUMP_SUMMARY"
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## No versions bumped" >> "$GITHUB_STEP_SUMMARY"
          fi
