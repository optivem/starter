name: bump-versions

on:
  workflow_dispatch:

jobs:
  bump:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Compute Patch Bumps
        id: bump
        uses: optivem/actions/bump-patch-versions@v1
        with:
          version-files: |
            [
              {"path": "VERSION", "signal": "git-tag", "value": "meta-v"},
              {"path": "system/monolith/dotnet/VERSION",         "signal": "ghcr-image", "value": "ghcr.io/${{ github.repository }}/monolith-system-dotnet"},
              {"path": "system/monolith/java/VERSION",           "signal": "ghcr-image", "value": "ghcr.io/${{ github.repository }}/monolith-system-java"},
              {"path": "system/monolith/typescript/VERSION",     "signal": "ghcr-image", "value": "ghcr.io/${{ github.repository }}/monolith-system-typescript"},
              {"path": "system/multitier/backend-dotnet/VERSION",    "signal": "ghcr-image", "value": "ghcr.io/${{ github.repository }}/multitier-backend-dotnet"},
              {"path": "system/multitier/backend-java/VERSION",      "signal": "ghcr-image", "value": "ghcr.io/${{ github.repository }}/multitier-backend-java"},
              {"path": "system/multitier/backend-typescript/VERSION","signal": "ghcr-image", "value": "ghcr.io/${{ github.repository }}/multitier-backend-typescript"},
              {"path": "system/multitier/frontend-react/VERSION",    "signal": "ghcr-image", "value": "ghcr.io/${{ github.repository }}/multitier-frontend-react"}
            ]

      - name: Build Commit Payload
        id: payload
        if: steps.bump.outputs.bumped == 'true'
        shell: bash
        env:
          BUMPS: ${{ steps.bump.outputs.bumps }}
        run: |
          set -euo pipefail
          files=$(jq -c '[.[] | {
            path: .path,
            content: ("\(.["new-version"])\n"),
            message: "Bump \(.path) \(.["old-version"]) -> \(.["new-version"]) (post \(.["release-signal"]))"
          }]' <<< "$BUMPS")
          echo "files=$files" >> "$GITHUB_OUTPUT"

      - name: Commit Bumped VERSION Files
        if: steps.bump.outputs.bumped == 'true'
        uses: optivem/actions/commit-files@v1
        with:
          files: ${{ steps.payload.outputs.files }}
          branch: main
          token: ${{ secrets.GITHUB_TOKEN }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Write summary
        shell: bash
        env:
          BUMPED: ${{ steps.bump.outputs.bumped }}
          BUMP_SUMMARY: ${{ steps.bump.outputs.summary }}
        run: |
          if [[ "$BUMPED" == "true" ]]; then
            {
              echo "## Versions bumped"
              echo ""
              echo '```'
              printf '%s\n' "$BUMP_SUMMARY"
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## No versions bumped" >> "$GITHUB_STEP_SUMMARY"
          fi
