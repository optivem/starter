name: monolith-typescript-commit-stage

on:
  push:
    branches: [ "main" ]
    paths:
        - 'system/monolith/typescript/**'
        - '.github/workflows/monolith-typescript-commit-stage.yml'
  pull_request:
    branches: [ "main" ]
    paths:
        - 'system/monolith/typescript/**'
        - '.github/workflows/monolith-typescript-commit-stage.yml'
  workflow_dispatch:
    inputs:
      commit-sha:
        description: 'Git SHA to build (leave empty for HEAD)'
        required: false
        type: string

env:
  COMMIT_SHA: ${{ inputs.commit-sha || github.sha }}

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Ensure Environment Variables Defined
        uses: optivem/actions/validate-env-vars-defined@v1
        with:
          names: |
            DOCKERHUB_USERNAME
            DOCKERHUB_TOKEN
        env:
          DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          ref: ${{ env.COMMIT_SHA }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

  run:
    needs: check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    outputs:
      image-digest-url: ${{ steps.digest-url.outputs.value }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          ref: ${{ env.COMMIT_SHA }}
          fetch-depth: 0

      - name: Verify Built SHA Is On Main
        id: verify-main
        uses: optivem/actions/check-sha-on-branch@v1
        with:
          commit-sha: ${{ env.COMMIT_SHA }}

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22.x
          cache: 'npm'
          cache-dependency-path: system/monolith/typescript/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: system/monolith/typescript

      - name: Compile Code
        run: npm run build
        working-directory: system/monolith/typescript

      # TODO: Implement
      - name: Run Unit Tests
        run: echo "TODO - not yet implemented"

      # TODO: Implement
      - name: Run Narrow Integration Tests
        run: echo "TODO - not yet implemented"

      # TODO: Implement
      - name: Run Component Tests
        run: echo "TODO - not yet implemented"

      # TODO: Implement
      - name: Run Contract Tests
        run: echo "TODO - not yet implemented"

      - name: Run Linter
        run: npm run lint
        working-directory: system/monolith/typescript

      - name: Run Code Analysis
        if: steps.verify-main.outputs.on-branch == 'true' && env.SONAR_TOKEN != ''
        uses: SonarSource/sonarcloud-github-action@v5
        with:
          projectBaseDir: system/monolith/typescript
          args: >
            -Dsonar.projectKey=optivem_shop-monolith-typescript
            -Dsonar.projectName=shop-monolith-typescript
            -Dsonar.organization=optivem
            -Dsonar.sources=src

      - name: Read Base Component Version
        if: steps.verify-main.outputs.on-branch == 'true'
        id: read-version
        uses: optivem/actions/read-base-version@v1
        with:
          file: system/monolith/typescript/VERSION

      - name: Compose Dev Version
        if: steps.verify-main.outputs.on-branch == 'true'
        id: dev-version
        uses: optivem/actions/compose-prerelease-version@v1
        with:
          base-version: ${{ steps.read-version.outputs.base-version }}
          suffix: dev
          build-number: ${{ github.run_number }}

      - name: Log in to GHCR
        if: steps.verify-main.outputs.on-branch == 'true'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker Metadata
        if: steps.verify-main.outputs.on-branch == 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/monolith-system-typescript
          tags: |
            type=sha,format=long
            type=raw,value=latest
            type=raw,value=${{ steps.dev-version.outputs.version }}

      - name: Set up Docker Buildx
        if: steps.verify-main.outputs.on-branch == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Docker Image
        if: steps.verify-main.outputs.on-branch == 'true'
        id: push
        uses: docker/build-push-action@v6
        with:
          context: system/monolith/typescript
          file: system/monolith/typescript/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: mode=max
          sbom: true

      - name: Compose Digest URL
        if: steps.verify-main.outputs.on-branch == 'true'
        id: digest-url
        shell: bash
        run: echo "value=ghcr.io/${{ github.repository }}/monolith-system-typescript@${{ steps.push.outputs.digest }}" >> "$GITHUB_OUTPUT"

  summary:
    needs: [check, run]
    if: always()
    runs-on: ubuntu-latest
    steps:
    - name: Format Artifacts
      id: format-artifacts
      uses: optivem/actions/format-artifact-list@v1
      with:
        artifacts: ${{ needs.run.outputs.image-digest-url }}

    - name: Summarize Stage
      uses: optivem/actions/render-stage-summary@v1
      with:
        stage-name: 'Commit Stage'
        stage-result: ${{ needs.run.result }}
        stage-success-content: |
          🔗 **Artifacts:**
          ${{ steps.format-artifacts.outputs.formatted }}
