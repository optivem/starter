name: bump-patch-version

# All-multitier-components bumper. Bumps each of the 4 multitier component
# VERSION files when its matching tag advances. In shop, no longer called
# from prod-stages (per-flavor `bump-patch-version-multitier-<lang>.yml`
# bumpers handle the system bundle + component cascade). Kept as a manual
# recovery tool and as a scaffold source for student multitier scaffolds.
# Race-safe (Contents API with SHA preconditions). Idempotent.

on:
  workflow_call:
  workflow_dispatch:

jobs:
  bump:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Compute Patch Bumps
        id: bump
        uses: optivem/actions/bump-patch-versions@v1
        with:
          version-files: |
            [
              {"path": "system/multitier/backend-dotnet/VERSION",    "value": "multitier-backend-dotnet-v"},
              {"path": "system/multitier/backend-java/VERSION",      "value": "multitier-backend-java-v"},
              {"path": "system/multitier/backend-typescript/VERSION","value": "multitier-backend-typescript-v"},
              {"path": "system/multitier/frontend-react/VERSION",    "value": "multitier-frontend-react-v"}
            ]

      - name: Build Commit Payload
        id: payload
        if: steps.bump.outputs.bumped == 'true'
        shell: bash
        env:
          BUMPS: ${{ steps.bump.outputs.bumps }}
        run: |
          set -euo pipefail
          files=$(jq -c '[.[] | {
            path: .path,
            content: ("\(.["new-version"])\n"),
            message: "Bump \(.path) \(.["old-version"]) -> \(.["new-version"]) (post \(.["release-signal"]))"
          }]' <<< "$BUMPS")
          echo "files=$files" >> "$GITHUB_OUTPUT"

      - name: Commit Bumped VERSION Files
        if: steps.bump.outputs.bumped == 'true'
        uses: optivem/actions/commit-files@v1
        with:
          files: ${{ steps.payload.outputs.files }}
          branch: main
          token: ${{ secrets.GITHUB_TOKEN }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
