name: bump-patch-version

# Component-level VERSION bumper for shop's multitier flavors. Triggered automatically
# at the end of each multitier flavor's prod-stage when a release has been cut, or
# manually by a developer (workflow_dispatch) to recover from a missed auto-run.
#
# Meta-level (root VERSION via meta-v signal) bumps are handled separately by
# `bump-patch-version-meta.yml` (called from meta-release-stage). Monolith flavors in
# shop intentionally have no entries here — shop's monolith VERSION is the meta
# version, owned by meta-release-stage. Student-repo monolith and multitier flavors
# get their own per-flavor scaffold variants (`bump-patch-version-{arch}-{lang}.yml`).
#
# Uses the GitHub Contents API with SHA preconditions — no `git push`, no main-branch race.
# Idempotent: only bumps a VERSION file if its matching release tag exists on the remote.

on:
  workflow_call:
  workflow_dispatch:

jobs:
  bump:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Compute Patch Bumps
        id: bump
        uses: optivem/actions/bump-patch-versions@v1
        with:
          version-files: |
            [
              {"path": "system/multitier/backend-dotnet/VERSION",    "signal": "git-tag", "value": "multitier-backend-dotnet-v"},
              {"path": "system/multitier/backend-java/VERSION",      "signal": "git-tag", "value": "multitier-backend-java-v"},
              {"path": "system/multitier/backend-typescript/VERSION","signal": "git-tag", "value": "multitier-backend-typescript-v"},
              {"path": "system/multitier/frontend-react/VERSION",    "signal": "git-tag", "value": "multitier-frontend-react-v"}
            ]

      - name: Build Commit Payload
        id: payload
        if: steps.bump.outputs.bumped == 'true'
        shell: bash
        env:
          BUMPS: ${{ steps.bump.outputs.bumps }}
        run: |
          set -euo pipefail
          files=$(jq -c '[.[] | {
            path: .path,
            content: ("\(.["new-version"])\n"),
            message: "Bump \(.path) \(.["old-version"]) -> \(.["new-version"]) (post \(.["release-signal"]))"
          }]' <<< "$BUMPS")
          echo "files=$files" >> "$GITHUB_OUTPUT"

      - name: Commit Bumped VERSION Files
        if: steps.bump.outputs.bumped == 'true'
        uses: optivem/actions/commit-files@v1
        with:
          files: ${{ steps.payload.outputs.files }}
          branch: main
          token: ${{ secrets.GITHUB_TOKEN }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
