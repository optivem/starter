          run_url=$(gh workflow run monolith-typescript-verify.yml \
            --repo "${{ github.repository }}" \
            --ref main 2>&1)
          run_id=$(echo "$run_url" | grep -oP '/runs/\K[0-9]+')
          echo "run_id=$run_id" >> $GITHUB_OUTPUT

      - name: Wait for monolith-typescript-verify
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          run_id="${{ steps.trigger-verify.outputs.run_id }}"
          echo "Waiting for run $run_id..."
          gh run watch "$run_id" --repo "${{ github.repository }}" --exit-status

  multitier-java:
    needs: monolith-typescript
    runs-on: ubuntu-latest
    steps:
      - name: Trigger multitier-java-verify
        id: trigger-verify
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          run_url=$(gh workflow run multitier-java-verify.yml \
            --repo "${{ github.repository }}" \
            --ref main 2>&1)
          run_id=$(echo "$run_url" | grep -oP '/runs/\K[0-9]+')
          echo "run_id=$run_id" >> $GITHUB_OUTPUT

      - name: Wait for multitier-java-verify
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          run_id="${{ steps.trigger-verify.outputs.run_id }}"
          echo "Waiting for run $run_id..."
          gh run watch "$run_id" --repo "${{ github.repository }}" --exit-status

  multitier-dotnet:
    needs: multitier-java
    runs-on: ubuntu-latest
    steps:
      - name: Trigger multitier-dotnet-verify
        id: trigger-verify
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          run_url=$(gh workflow run multitier-dotnet-verify.yml \
            --repo "${{ github.repository }}" \
            --ref main 2>&1)
          run_id=$(echo "$run_url" | grep -oP '/runs/\K[0-9]+')
          echo "run_id=$run_id" >> $GITHUB_OUTPUT

      - name: Wait for multitier-dotnet-verify
        env:
