name: verify-all

on:
  schedule:
    - cron: '0 1 * * *'  # Run daily at 01:00 UTC
  workflow_dispatch:
    inputs:
      level:
        description: 'Verification level'
        required: false
        type: choice
        options:
          - local
          - commit
          - acceptance
          - release
        default: 'release'
      language:
        description: 'Language to verify (java, dotnet, typescript). Leave empty to run all.'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - java
          - dotnet
          - typescript
      architecture:
        description: 'Architecture to verify (monolith, multitier). Leave empty to run all.'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - monolith
          - multitier
      skip-commit-stage:
        description: 'Skip commit stage (Phase 1)'
        required: false
        type: boolean
        default: false

jobs:
  print-inputs:
    runs-on: ubuntu-latest
    steps:
      - name: Print input parameters
        run: |
          echo "=== Workflow Inputs ==="
          echo "Level: ${{ inputs.level || 'release (default)' }}"
          echo "Language: ${{ inputs.language || 'all (default)' }}"
          echo "Architecture: ${{ inputs.architecture || 'all (default)' }}"
          echo "Skip commit stage: ${{ inputs.skip-commit-stage || false }}"
          echo "Triggered by: ${{ github.event_name }}"

  # Phase 1: Run all commit stages in parallel (deduplicated)
  commit-monolith-java:
    if: !inputs.skip-commit-stage && (inputs.language == '' || inputs.language == 'java') && (inputs.architecture == '' || inputs.architecture == 'monolith')
    runs-on: ubuntu-latest
    steps:
      - uses: optivem/actions/trigger-and-wait@main
        with:
          workflow: monolith-java-commit-stage.yml

  commit-monolith-dotnet:
    if: !inputs.skip-commit-stage && (inputs.language == '' || inputs.language == 'dotnet') && (inputs.architecture == '' || inputs.architecture == 'monolith')
    runs-on: ubuntu-latest
    steps:
      - uses: optivem/actions/trigger-and-wait@main
        with:
          workflow: monolith-dotnet-commit-stage.yml

  commit-monolith-typescript:
    if: !inputs.skip-commit-stage && (inputs.language == '' || inputs.language == 'typescript') && (inputs.architecture == '' || inputs.architecture == 'monolith')
    runs-on: ubuntu-latest
    steps:
      - uses: optivem/actions/trigger-and-wait@main
        with:
          workflow: monolith-typescript-commit-stage.yml

  commit-multitier-backend-java:
    if: !inputs.skip-commit-stage && (inputs.language == '' || inputs.language == 'java') && (inputs.architecture == '' || inputs.architecture == 'multitier')
    runs-on: ubuntu-latest
    steps:
      - uses: optivem/actions/trigger-and-wait@main
        with:
          workflow: multitier-backend-java-commit-stage.yml

  commit-multitier-backend-dotnet:
    if: !inputs.skip-commit-stage && (inputs.language == '' || inputs.language == 'dotnet') && (inputs.architecture == '' || inputs.architecture == 'multitier')
    runs-on: ubuntu-latest
    steps:
      - uses: optivem/actions/trigger-and-wait@main
        with:
          workflow: multitier-backend-dotnet-commit-stage.yml

  commit-multitier-backend-typescript:
    if: !inputs.skip-commit-stage && (inputs.language == '' || inputs.language == 'typescript') && (inputs.architecture == '' || inputs.architecture == 'multitier')
    runs-on: ubuntu-latest
    steps:
      - uses: optivem/actions/trigger-and-wait@main
        with:
          workflow: multitier-backend-typescript-commit-stage.yml

  commit-multitier-frontend-react:
    if: !inputs.skip-commit-stage && (inputs.architecture == '' || inputs.architecture == 'multitier')
    runs-on: ubuntu-latest
    steps:
      - uses: optivem/actions/trigger-and-wait@main
        with:
          workflow: multitier-frontend-react-commit-stage.yml

  # Phase 2: Run verify pipelines sequentially (to avoid RC version race conditions)
  monolith-java:
    needs: [commit-monolith-java, commit-monolith-dotnet, commit-monolith-typescript, commit-multitier-backend-java, commit-multitier-backend-dotnet, commit-multitier-backend-typescript, commit-multitier-frontend-react]
    if: ${{ always() && !failure() && (inputs.level || 'release') != 'commit' && (inputs.language == '' || inputs.language == 'java') && (inputs.architecture == '' || inputs.architecture == 'monolith') }}
    runs-on: ubuntu-latest
    steps:
      - uses: optivem/actions/trigger-and-wait@main
        with:
          workflow: verify-monolith-java.yml
          inputs: '{"level": "${{ inputs.level || ''release'' }}", "skip-commit-stage": "true"}'

  monolith-dotnet:
    needs: monolith-java
    if: ${{ always() && !failure() && (inputs.level || 'release') != 'commit' && (inputs.language == '' || inputs.language == 'dotnet') && (inputs.architecture == '' || inputs.architecture == 'monolith') }}
    runs-on: ubuntu-latest
    steps:
      - uses: optivem/actions/trigger-and-wait@main
        with:
          workflow: verify-monolith-dotnet.yml
          inputs: '{"level": "${{ inputs.level || ''release'' }}", "skip-commit-stage": "true"}'

  monolith-typescript:
    needs: monolith-dotnet
    if: ${{ always() && !failure() && (inputs.level || 'release') != 'commit' && (inputs.language == '' || inputs.language == 'typescript') && (inputs.architecture == '' || inputs.architecture == 'monolith') }}
    runs-on: ubuntu-latest
    steps:
      - uses: optivem/actions/trigger-and-wait@main
        with:
          workflow: verify-monolith-typescript.yml
          inputs: '{"level": "${{ inputs.level || ''release'' }}", "skip-commit-stage": "true"}'

  multitier-java:
    needs: monolith-typescript
    if: ${{ always() && !failure() && (inputs.level || 'release') != 'commit' && (inputs.language == '' || inputs.language == 'java') && (inputs.architecture == '' || inputs.architecture == 'multitier') }}
    runs-on: ubuntu-latest
    steps:
      - uses: optivem/actions/trigger-and-wait@main
        with:
          workflow: verify-multitier-java.yml
          inputs: '{"level": "${{ inputs.level || ''release'' }}", "skip-commit-stage": "true"}'

  multitier-dotnet:
    needs: multitier-java
    if: ${{ always() && !failure() && (inputs.level || 'release') != 'commit' && (inputs.language == '' || inputs.language == 'dotnet') && (inputs.architecture == '' || inputs.architecture == 'multitier') }}
    runs-on: ubuntu-latest
    steps:
      - uses: optivem/actions/trigger-and-wait@main
        with:
          workflow: verify-multitier-dotnet.yml
          inputs: '{"level": "${{ inputs.level || ''release'' }}", "skip-commit-stage": "true"}'

  multitier-typescript:
    needs: multitier-dotnet
    if: ${{ always() && !failure() && (inputs.level || 'release') != 'commit' && (inputs.language == '' || inputs.language == 'typescript') && (inputs.architecture == '' || inputs.architecture == 'multitier') }}
    runs-on: ubuntu-latest
    steps:
      - uses: optivem/actions/trigger-and-wait@main
        with:
          workflow: verify-multitier-typescript.yml
          inputs: '{"level": "${{ inputs.level || ''release'' }}", "skip-commit-stage": "true"}'
