        run: |
          run_url=$(gh workflow run multitier-typescript-verify.yml \
            --repo "${{ github.repository }}" \
            --ref main 2>&1)
          run_id=$(echo "$run_url" | grep -oP '/runs/\K[0-9]+')
          echo "run_id=$run_id" >> $GITHUB_OUTPUT

      - name: Wait for multitier-typescript-verify
        env:
