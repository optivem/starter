name: verify-all

on:
  workflow_dispatch:

jobs:
  monolith-java:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger monolith-java-verify
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run monolith-java-verify.yml \
            --repo "${{ github.repository }}" \
            --ref main

      - name: Wait for monolith-java-verify
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          sleep 5

          run_id=$(gh run list \
            --repo "${{ github.repository }}" \
            --workflow "monolith-java-verify.yml" \
            --event workflow_dispatch \
            --limit 1 \
            --json databaseId \
            --jq '.[0].databaseId')

          echo "Waiting for run $run_id..."
          gh run watch "$run_id" --repo "${{ github.repository }}" --exit-status

  monolith-dotnet:
