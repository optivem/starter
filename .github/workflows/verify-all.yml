name: verify-all

on:
  schedule:
    - cron: '0 4 * * *'  # Run daily at 04:00 UTC
  workflow_dispatch:
    inputs:
      language:
        description: 'Language to verify (java, dotnet, typescript). Leave empty to run all.'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - java
          - dotnet
          - typescript
      architecture:
        description: 'Architecture to verify (monolith, multitier). Leave empty to run all.'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - monolith
          - multitier

jobs:
  monolith-java:
    if: (inputs.language == '' || inputs.language == 'java') && (inputs.architecture == '' || inputs.architecture == 'monolith')
    runs-on: ubuntu-latest
    steps:
      - name: Trigger monolith-java-verify
        id: trigger-verify
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Check GitHub API rate limit before triggering
          remaining=$(gh api rate_limit --jq ".resources.core.remaining" 2>/dev/null || echo "999")
          if [ "$remaining" -lt 50 ]; then
            reset=$(gh api rate_limit --jq ".resources.core.reset" 2>/dev/null || echo "0")
            wait=$(( reset - $(date +%s) + 5 ))
            if [ "$wait" -gt 0 ]; then
              echo "::warning::Rate limit low ($remaining remaining). Waiting ${wait}s for reset..."
              sleep "$wait"
            fi
          fi
          gh workflow run monolith-java-verify.yml \
            --repo "${{ github.repository }}" \
            --ref main
          sleep 10
          run_id=$(gh run list --workflow=monolith-java-verify.yml \
            --repo "${{ github.repository }}" \
            --branch main \
            --limit 1 --json databaseId --jq '.[0].databaseId')
          echo "run_id=$run_id" >> $GITHUB_OUTPUT

      - name: Wait for monolith-java-verify
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          run_id="${{ steps.trigger-verify.outputs.run_id }}"
          echo "Waiting for run $run_id..."
          gh run watch "$run_id" --repo "${{ github.repository }}" --exit-status --interval 60

