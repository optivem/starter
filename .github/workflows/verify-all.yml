name: verify-all

on:
  schedule:
    - cron: '0 4 * * *'  # Run daily at 04:00 UTC
  workflow_dispatch:

jobs:
  monolith-java:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger monolith-java-verify
        id: trigger-verify
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          run_url=$(gh workflow run monolith-java-verify.yml \
            --repo "${{ github.repository }}" \
            --ref main 2>&1)
          run_id=$(echo "$run_url" | grep -oP '/runs/\K[0-9]+')
          echo "run_id=$run_id" >> $GITHUB_OUTPUT

      - name: Wait for monolith-java-verify
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          run_id="${{ steps.trigger-verify.outputs.run_id }}"
          echo "Waiting for run $run_id..."
          gh run watch "$run_id" --repo "${{ github.repository }}" --exit-status

  monolith-dotnet:
    needs: monolith-java
    runs-on: ubuntu-latest
    steps:
      - name: Trigger monolith-dotnet-verify
        id: trigger-verify
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          run_url=$(gh workflow run monolith-dotnet-verify.yml \
            --repo "${{ github.repository }}" \
            --ref main 2>&1)
          run_id=$(echo "$run_url" | grep -oP '/runs/\K[0-9]+')
          echo "run_id=$run_id" >> $GITHUB_OUTPUT

      - name: Wait for monolith-dotnet-verify
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          run_id="${{ steps.trigger-verify.outputs.run_id }}"
          echo "Waiting for run $run_id..."
          gh run watch "$run_id" --repo "${{ github.repository }}" --exit-status

  monolith-typescript:
