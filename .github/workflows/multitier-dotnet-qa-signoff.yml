name: multitier-dotnet-qa-signoff

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version that was tested in QA (e.g., v1.0.0-rc.1)'
        required: true
        type: string
      result:
        description: 'QA testing result'
        required: true
        type: choice
        options:
          - approved
          - rejected

concurrency:
  group: multitier-dotnet-qa-signoff

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Ensure Environment Variables Defined
        uses: optivem/actions/validate-env-vars-defined@v1
        with:
          names: |
            WORKFLOW_TOKEN
        env:
          WORKFLOW_TOKEN: ${{ secrets.WORKFLOW_TOKEN }}

      - name: Check RC Exists
        uses: optivem/actions/validate-tag-exists@v1
        with:
          tag: ${{ inputs.version }}

  run:
    needs: check
    if: needs.check.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.promote.outputs.status-tag }}
      stage-result: ${{ steps.determine-result.outputs.stage-result }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.version }}

      - name: Determine Stage Result
        id: determine-result
        uses: optivem/actions/map-signoff-to-stage-result@v1
        with:
          result: ${{ inputs.result }}

      - name: Generate QA Signoff Tag
        id: promote
        uses: optivem/actions/compose-prerelease-status@v1
        with:
          prerelease-version: ${{ inputs.version }}
          environment: qa
          status: ${{ inputs.result }}

  publish-tag:
    needs: run
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.version }}

      - name: Publish Git Tag
        uses: optivem/actions/publish-tag@v1
        with:
          tag: ${{ needs.run.outputs.version }}
          token: ${{ secrets.WORKFLOW_TOKEN }}

  summary:
    needs: [check, run, publish-tag]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v5

    - name: Summarize Stage
      uses: optivem/actions/render-system-stage-summary@v1
      with:
        stage-name: 'QA Signoff'
        stage-result: ${{ needs.publish-tag.result == 'failure' && 'failure' || needs.run.outputs.stage-result }}
        environment: qa
        success-version: ${{ needs.run.outputs.version }}
