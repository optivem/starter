name: prerelease-pipeline-multitier-typescript

on:
  workflow_dispatch:
    inputs:
      level:
        description: 'Verification level'
        required: false
        type: choice
        options:
          - local
          - commit
          - acceptance
          - qa
        default: 'qa'
      skip-local-stage:
        description: 'Skip local stage'
        required: false
        type: boolean
        default: false
      skip-commit-stage:
        description: 'Skip commit stage'
        required: false
        type: boolean
        default: false
      skip-acceptance-legacy:
        description: 'Skip the legacy sample in the local stage and the acceptance-stage-legacy job'
        required: false
        type: boolean
        default: false
      commit-sha:
        description: 'Git SHA to pin (leave empty for HEAD)'
        required: false
        type: string
      debug-skip-tests:
        description: 'DEBUG ONLY: bypass acceptance-stage tests and skip the acceptance-stage-legacy run, while still minting the same RC tag. Use only when iterating on the meta-prerelease pipeline plumbing — never on a real release path.'
        required: false
        type: boolean
        default: false

jobs:
  verify:
    uses: ./.github/workflows/_prerelease-pipeline.yml
    secrets: inherit
    with:
      prefix: multitier-typescript
      architecture: multitier
      language: typescript
      commit-workflows: '["multitier-backend-typescript-commit-stage.yml", "multitier-frontend-react-commit-stage.yml"]'
      level: ${{ inputs.level || 'qa' }}
      skip-local-stage: ${{ inputs.skip-local-stage == true }}
      skip-commit-stage: ${{ inputs.skip-commit-stage == true }}
      skip-acceptance-legacy: ${{ inputs.skip-acceptance-legacy == true }}
      commit-sha: ${{ inputs.commit-sha }}
      debug-skip-tests: ${{ inputs.debug-skip-tests == true }}
