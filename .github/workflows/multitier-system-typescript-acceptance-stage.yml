name: multitier-system-typescript-acceptance-stage

on:
  schedule:
    - cron: '0 0 * * *'  # Run once a day at midnight UTC
  workflow_dispatch:

concurrency:
  group: multitier-system-typescript-acceptance-stage

jobs:
  preflight:
    runs-on: ubuntu-latest
    permissions:
      packages: read
    outputs:
      artifacts-exist: ${{ steps.check-artifacts.outputs.exist }}
    steps:
      - name: Check Artifacts Exist
        id: check-artifacts
        uses: optivem/actions/check-artifacts-exist@v1

  check:
    needs: preflight
    if: needs.preflight.outputs.artifacts-exist == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      should-run: ${{ steps.should-run.outputs.should-run }}
      image-digest-urls: ${{ steps.find-latest.outputs.image-digest-urls }}
    steps:
      - name: Validate Config
        uses: optivem/actions/validate-config@v1
        with:
          names: |
            DOCKERHUB_USERNAME
            DOCKERHUB_TOKEN
            SYSTEM_UI_URL
            SYSTEM_API_URL
            ERP_URL
            CLOCK_URL
        env:
          DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          SYSTEM_UI_URL: ${{ vars.SYSTEM_UI_URL }}
          SYSTEM_API_URL: ${{ vars.SYSTEM_API_URL }}
          ERP_URL: ${{ vars.ERP_URL }}
          CLOCK_URL: ${{ vars.CLOCK_URL }}

      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Check Target Version Exists
        uses: optivem/actions/check-target-version-exists@v1

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Find Latest Artifacts
        id: find-latest
        uses: optivem/actions/find-latest-docker-images@v1
        with:
          image-urls: |
            ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}/multitier-frontend-react:latest
            ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}/multitier-backend-typescript:latest

      - name: Check Run Conditions
        id: should-run
        uses: optivem/actions/should-run-acceptance-stage@v1
        with:
          latest-image-timestamp: ${{ steps.find-latest.outputs.latest-image-timestamp }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  run:
    needs: check
    if: needs.check.outputs.should-run == 'true'
    runs-on: ubuntu-latest
    environment: multitier-typescript-acceptance
    permissions:
      contents: write
      packages: write
    outputs:
      version: ${{ steps.promote-to-rc.outputs.version }}
      image-urls: ${{ steps.promote-to-rc.outputs.image-urls }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Deploy System (Acceptance Environment)
        id: deploy-system
        uses: optivem/actions/simulate-deployment@v1
        with:
          environment: acceptance
          version: latest
          image-urls: ${{ needs.check.outputs.image-digest-urls }}
          compose-file: docker-compose.multitier.yml
          systems: |
            [
              { "name": "Shop UI", "url": "${{ vars.SYSTEM_UI_URL }}/" },
              { "name": "Shop API", "url": "${{ vars.SYSTEM_API_URL }}/health" },
              { "name": "ERP", "url": "${{ vars.ERP_URL }}/health" },
              { "name": "Clock", "url": "${{ vars.CLOCK_URL }}/health" }
            ]
          working-directory: system-test/typescript

      - name: Setup Runtime
        uses: optivem/actions/setup-node@v1
        with:
          node-version: 20
          working-directory: system-test/typescript

      - name: Install Playwright Dependencies
        working-directory: system-test/typescript
        run: npx playwright install --with-deps chromium

      - name: Smoke (Stub)
        working-directory: system-test/typescript
        run: npm test -- test/smoke-tests
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: stub

      - name: Smoke (Real)
        working-directory: system-test/typescript
        run: npm test -- test/smoke-tests
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: real

      - name: Acceptance - API Channel
        working-directory: system-test/typescript
        run: npm test -- --passWithNoTests test/acceptance-tests
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: stub
          CHANNEL: API

      - name: Acceptance - UI Channel
        working-directory: system-test/typescript
        run: npm test -- --passWithNoTests test/acceptance-tests
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: stub
          CHANNEL: UI

      - name: Acceptance (Isolated) - API Channel
        working-directory: system-test/typescript
        run: npm test -- --passWithNoTests test/acceptance-tests
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: stub
          CHANNEL: API

      - name: Acceptance (Isolated) - UI Channel
        working-directory: system-test/typescript
        run: npm test -- --passWithNoTests test/acceptance-tests
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: stub
          CHANNEL: UI

      - name: Contract (Stub)
        working-directory: system-test/typescript
        run: npm test -- --passWithNoTests test/contract-tests
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: stub

      - name: Contract (Real)
        working-directory: system-test/typescript
        run: npm test -- --passWithNoTests test/contract-tests
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: real

      - name: E2E - API Channel
        working-directory: system-test/typescript
        run: npm test -- test/e2e-tests
        env:
          ENVIRONMENT: acceptance
          CHANNEL: API

      - name: E2E - UI Channel
        working-directory: system-test/typescript
        run: npm test -- test/e2e-tests
        env:
          ENVIRONMENT: acceptance
          CHANNEL: UI

      - name: Read Target Version
        id: read-version
        uses: optivem/actions/read-target-version@v1

      - name: Promote to RC
        id: promote-to-rc
        uses: optivem/actions/promote-to-rc@v1
        with:
          target-version: ${{ steps.read-version.outputs.target-version }}
          image-urls: ${{ needs.check.outputs.image-digest-urls }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  summary:
    needs: [check, run]
    if: always()
    runs-on: ubuntu-latest
    steps:
    - name: Summarize Stage
      uses: optivem/actions/summarize-system-stage@v1
      with:
        stage-name: 'Acceptance Stage'
        environment: acceptance
        stage-result: ${{ needs.run.result }}
        success-version: ${{ needs.run.outputs.version }}
        success-artifact-ids: ${{ needs.run.outputs.image-urls }}
