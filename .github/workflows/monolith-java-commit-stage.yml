name: monolith-java-commit-stage

on:
  push:
    branches: [ "main" ]
    paths:
        - 'system/monolith/java/**'
        - '.github/workflows/monolith-java-commit-stage.yml'
  pull_request:
    branches: [ "main" ]
    paths:
        - 'system/monolith/java/**'
        - '.github/workflows/monolith-java-commit-stage.yml'
  workflow_dispatch:
    inputs:
      sha:
        description: 'Git SHA to build (leave empty for HEAD)'
        required: false
        type: string

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Ensure Environment Variables Defined
        uses: optivem/actions/ensure-env-vars-defined@v1
        with:
          names: |
            DOCKERHUB_USERNAME
            DOCKERHUB_TOKEN
        env:
          DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.sha || github.sha }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

  run:
    needs: check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    outputs:
      image-digest-url: ${{ steps.push.outputs.image-digest-url }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.sha || github.sha }}
          fetch-depth: 0

      - name: Verify Built SHA Is On Main
        id: verify-main
        uses: optivem/actions/check-sha-on-branch@v1
        with:
          sha: ${{ inputs.sha || github.sha }}

      - name: Setup Java and Gradle
        uses: optivem/actions/setup-java-gradle@v1
        with:
          java-version: 21
          working-directory: system/monolith/java

      - name: Compile Code
        run: ./gradlew build
        working-directory: system/monolith/java

      - name: Run Unit Tests
        run: ./gradlew test
        working-directory: system/monolith/java

      - name: Run Linter
        run: ./gradlew checkstyleMain
        working-directory: system/monolith/java

      - name: Run Code Analysis
        if: steps.verify-main.outputs.on-branch == 'true' && env.SONAR_TOKEN != ''
        run: ./gradlew build sonar --info
        working-directory: system/monolith/java

      - name: Read Component Target Version
        if: steps.verify-main.outputs.on-branch == 'true'
        id: read-version
        uses: optivem/actions/read-target-version@v1
        with:
          file: system/monolith/java/VERSION

      - name: Build Artifact
        if: steps.verify-main.outputs.on-branch == 'true'
        id: build
        uses: optivem/actions/build-docker-image@v1
        with:
          working-directory: system/monolith/java
          image-name: monolith-system-java
          commit-sha: ${{ inputs.sha || github.sha }}
          dockerfile: Dockerfile

      - name: Compose Dev Version
        if: steps.verify-main.outputs.on-branch == 'true'
        id: dev-version
        uses: optivem/actions/compose-prerelease-version@v1
        with:
          target-version: ${{ steps.read-version.outputs.target-version }}
          suffix: dev
          number: ${{ github.run_number }}

      - name: Tag Docker Image
        if: steps.verify-main.outputs.on-branch == 'true'
        id: tag
        uses: optivem/actions/tag-docker-image-local@v1
        with:
          source: ${{ steps.build.outputs.local-image-ref }}
          image-name: monolith-system-java
          tags: |
            ${{ inputs.sha || github.sha }}
            latest
            ${{ steps.dev-version.outputs.version }}

      - name: Push Artifact
        if: steps.verify-main.outputs.on-branch == 'true'
        id: push
        uses: optivem/actions/push-docker-images@v1
        with:
          image-sha-tag: ${{ fromJSON(steps.tag.outputs.image-urls)[0] }}
          image-latest-url: ${{ fromJSON(steps.tag.outputs.image-urls)[1] }}
          image-version-tag: ${{ fromJSON(steps.tag.outputs.image-urls)[2] }}

  summary:
    needs: [check, run]
    if: always()
    runs-on: ubuntu-latest
    steps:
    - name: Summarize Stage
      uses: optivem/actions/compose-commit-stage-summary@v1
      with:
        stage-result: ${{ needs.run.result }}
        success-artifact-url: ${{ needs.run.outputs.image-digest-url }}
