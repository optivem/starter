name: auto-bump-patch

# Post-release VERSION bumper. Triggered automatically at the end of meta-release-stage
# when releases have just been cut, or manually by a developer (workflow_dispatch) to recover
# from a missed auto-run or after a direct prod-stage dispatch.
#
# Uses the GitHub Contents API with SHA preconditions — no `git push`, no main-branch race.
# Idempotent: only bumps a VERSION file if its matching release tag exists on the remote.

on:
  workflow_call:
  workflow_dispatch:

concurrency:
  group: shop-auto-bump-patch

jobs:
  bump:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Compute Patch Bumps
        id: bump
        uses: optivem/actions/bump-patch-versions@v1
        with:
          version-files: |
            [
              {"path": "VERSION", "signal": "git-tag", "value": "meta-v"},
              {"path": "system/multitier/backend-dotnet/VERSION",    "signal": "ghcr-image", "value": "ghcr.io/${{ github.repository }}/backend-dotnet"},
              {"path": "system/multitier/backend-java/VERSION",      "signal": "ghcr-image", "value": "ghcr.io/${{ github.repository }}/backend-java"},
              {"path": "system/multitier/backend-typescript/VERSION","signal": "ghcr-image", "value": "ghcr.io/${{ github.repository }}/backend-typescript"},
              {"path": "system/multitier/frontend-react/VERSION",    "signal": "ghcr-image", "value": "ghcr.io/${{ github.repository }}/frontend-react"}
            ]

      - name: Build Commit Payload
        id: payload
        if: steps.bump.outputs.bumped == 'true'
        shell: bash
        env:
          BUMPS: ${{ steps.bump.outputs.bumps }}
        run: |
          set -euo pipefail
          files=$(jq -c '[.[] | {
            path: .path,
            content: ("\(.["new-version"])\n"),
            message: "Bump \(.path) \(.["old-version"]) -> \(.["new-version"]) (post \(.["release-signal"]))"
          }]' <<< "$BUMPS")
          echo "files=$files" >> "$GITHUB_OUTPUT"

      - name: Commit Bumped VERSION Files
        if: steps.bump.outputs.bumped == 'true'
        uses: optivem/actions/commit-files@v1
        with:
          files: ${{ steps.payload.outputs.files }}
          branch: main
          token: ${{ secrets.GITHUB_TOKEN }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
