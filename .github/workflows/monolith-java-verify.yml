name: monolith-java-verify

on:
  workflow_dispatch:

jobs:
  commit-stage:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Commit Stage
        id: trigger-commit-stage
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          run_url=$(gh workflow run monolith-java-commit-stage.yml \
            --repo "${{ github.repository }}" \
            --ref main 2>&1)
          run_id=$(echo "$run_url" | grep -oP '/runs/\K[0-9]+')
          echo "run_id=$run_id" >> $GITHUB_OUTPUT

      - name: Wait for Commit Stage
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          run_id="${{ steps.trigger-commit-stage.outputs.run_id }}"
          echo "Waiting for run $run_id..."
          gh run watch "$run_id" --repo "${{ github.repository }}" --exit-status

  acceptance-stage:
    needs: commit-stage
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get-version.outputs.version }}
    steps:
      - name: Trigger Acceptance Stage
        id: trigger-acceptance-stage
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          run_url=$(gh workflow run monolith-java-acceptance-stage.yml \
            --repo "${{ github.repository }}" \
            --ref main 2>&1)
          run_id=$(echo "$run_url" | grep -oP '/runs/\K[0-9]+')
          echo "run_id=$run_id" >> $GITHUB_OUTPUT

      - name: Wait for Acceptance Stage
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          run_id="${{ steps.trigger-acceptance-stage.outputs.run_id }}"
          echo "Waiting for run $run_id..."
          gh run watch "$run_id" --repo "${{ github.repository }}" --exit-status

      - name: Get RC Version
        id: get-version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version=$(gh release list \
            --repo "${{ github.repository }}" \
            --json tagName,isPrerelease \
            --jq '[.[] | select(.isPrerelease)] | .[0].tagName')
          echo "version=$version" >> $GITHUB_OUTPUT

  qa-stage:
    needs: acceptance-stage
    runs-on: ubuntu-latest
    steps:
      - name: Trigger QA Stage
        id: trigger-qa-stage
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          run_url=$(gh workflow run monolith-java-qa-stage.yml \
            --repo "${{ github.repository }}" \
            --ref main \
            -f version=${{ needs.acceptance-stage.outputs.version }} 2>&1)
          run_id=$(echo "$run_url" | grep -oP '/runs/\K[0-9]+')
          echo "run_id=$run_id" >> $GITHUB_OUTPUT

      - name: Wait for QA Stage
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          run_id="${{ steps.trigger-qa-stage.outputs.run_id }}"
          echo "Waiting for run $run_id..."
          gh run watch "$run_id" --repo "${{ github.repository }}" --exit-status

  qa-signoff:
    needs: [acceptance-stage, qa-stage]
    runs-on: ubuntu-latest
    steps:
      - name: Trigger QA Signoff
        id: trigger-qa-signoff
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          run_url=$(gh workflow run monolith-java-qa-signoff.yml \
            --repo "${{ github.repository }}" \
            --ref main \
            -f version=${{ needs.acceptance-stage.outputs.version }} \
            -f result=approved 2>&1)
          run_id=$(echo "$run_url" | grep -oP '/runs/\K[0-9]+')
          echo "run_id=$run_id" >> $GITHUB_OUTPUT

      - name: Wait for QA Signoff
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          run_id="${{ steps.trigger-qa-signoff.outputs.run_id }}"
          echo "Waiting for run $run_id..."
          gh run watch "$run_id" --repo "${{ github.repository }}" --exit-status

  prod-stage:
    needs: [acceptance-stage, qa-signoff]
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Prod Stage
        id: trigger-prod-stage
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          run_url=$(gh workflow run monolith-java-prod-stage.yml \
            --repo "${{ github.repository }}" \
            --ref main \
            -f version=${{ needs.acceptance-stage.outputs.version }} 2>&1)
          run_id=$(echo "$run_url" | grep -oP '/runs/\K[0-9]+')
          echo "run_id=$run_id" >> $GITHUB_OUTPUT

      - name: Wait for Prod Stage
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          run_id="${{ steps.trigger-prod-stage.outputs.run_id }}"
          echo "Waiting for run $run_id..."
          gh run watch "$run_id" --repo "${{ github.repository }}" --exit-status
