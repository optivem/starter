name: monolith-java-verify

on:
  workflow_dispatch:
    inputs:
      skip-commit-stage:
        description: 'Skip commit stage'
        required: false
        type: boolean
        default: false

jobs:
  verify:
    uses: ./.github/workflows/_verify-pipeline.yml
    secrets: inherit
    with:
      prefix: monolith-java
      commit-workflows: '["monolith-java-commit-stage.yml"]'
      skip-commit-stage: ${{ inputs.skip-commit-stage == true }}
