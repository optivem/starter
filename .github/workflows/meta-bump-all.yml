name: meta-bump-all

# Recovery orchestrator: dispatches every bump-patch-version workflow to
# advance any stale VERSION file (meta + 3 monolith + 3 multitier flavors).
# Each child is idempotent. Multitier bumpers chain sequentially because
# they all cascade-bump the shared system/multitier/frontend-react/VERSION;
# monolith bumpers run in parallel (each touches a distinct file).

on:
  workflow_dispatch:

concurrency:
  group: my-shop-meta-bump-all

permissions:
  contents: write

jobs:
  bump-meta:
    uses: ./.github/workflows/bump-patch-version-meta.yml

  bump-monolith-java:
    uses: ./.github/workflows/monolith-java-bump-patch-version.yml

  bump-monolith-dotnet:
    uses: ./.github/workflows/monolith-dotnet-bump-patch-version.yml

  bump-monolith-typescript:
    uses: ./.github/workflows/monolith-typescript-bump-patch-version.yml

  bump-multitier-java:
    uses: ./.github/workflows/multitier-java-bump-patch-version.yml

  bump-multitier-dotnet:
    needs: bump-multitier-java
    uses: ./.github/workflows/multitier-dotnet-bump-patch-version.yml

  bump-multitier-typescript:
    needs: bump-multitier-dotnet
    uses: ./.github/workflows/multitier-typescript-bump-patch-version.yml
