name: monolith-typescript-acceptance-stage

on:
  schedule:
    - cron: '0 * * * *'  # Run every hour
  workflow_dispatch:
    inputs:
      commit-sha:
        description: 'Git SHA to test (leave empty for latest image)'
        required: false
        type: string

concurrency:
  group: monolith-typescript-acceptance-stage

env:
  COMMIT_SHA: ${{ inputs.commit-sha || github.sha }}

jobs:
  preflight:
    runs-on: ubuntu-latest
    permissions:
      packages: read
    outputs:
      artifacts-exist: ${{ steps.check-artifacts.outputs.exist }}
      skip-reason: ${{ steps.check-artifacts.outputs.exist != 'true' && 'No artifacts published yet — waiting for the commit stage to produce images.' || '' }}
    steps:
      - name: Check Container Packages Exist
        id: check-artifacts
        uses: optivem/actions/check-ghcr-packages-exist@v1
        with:
          image-urls: |
            ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}/monolith-system-typescript

  check:
    needs: preflight
    if: needs.preflight.outputs.artifacts-exist == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      should-run: ${{ steps.gate.outputs.should-run }}
      skip-reason: ${{ steps.gate.outputs.skip-reason }}
      image-digest-urls: ${{ steps.find-latest.outputs.image-digest-urls }}
      latest-updated-at: ${{ steps.find-latest.outputs.latest-updated-at }}
      last-run-at: ${{ steps.last-run.outputs.timestamp }}
    steps:
      - name: Ensure Environment Variables Defined
        uses: optivem/actions/validate-env-vars-defined@v1
        with:
          names: |
            DOCKERHUB_USERNAME
            DOCKERHUB_TOKEN
            WORKFLOW_TOKEN
        env:
          DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          WORKFLOW_TOKEN: ${{ secrets.WORKFLOW_TOKEN }}

      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ env.COMMIT_SHA }}

      - name: Read Base Version
        id: read-base-version
        uses: optivem/actions/read-base-version@v1

      - name: Check System Release Already Published
        id: check-tag
        uses: optivem/actions/check-tag-exists@v1
        with:
          tag: monolith-typescript-v${{ steps.read-base-version.outputs.base-version }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Resolve Docker Image Digests
        id: find-latest
        uses: optivem/actions/resolve-docker-image-digests@v1
        with:
          base-image-urls: |
            ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}/monolith-system-typescript
          tag: ${{ inputs.commit-sha && format('sha-{0}', inputs.commit-sha) || 'latest' }}

      - name: Resolve Latest Updated At
        id: latest
        shell: bash
        env:
          IMAGE_TS: ${{ steps.find-latest.outputs.latest-updated-at }}
        run: |
          set -euo pipefail
          # Take max of image push time and commit time. Tests live in this
          # repo, so using the commit timestamp makes the gate fire on
          # test-only changes as well as on image rebuilds.
          commit_ts=$(git log -1 --format=%cI "$COMMIT_SHA")
          image_epoch=$(date -d "$IMAGE_TS" +%s)
          commit_epoch=$(date -d "$commit_ts" +%s)
          if [ "$image_epoch" -ge "$commit_epoch" ]; then
            max_epoch=$image_epoch
          else
            max_epoch=$commit_epoch
          fi
          latest=$(date -d "@$max_epoch" -u +%Y-%m-%dT%H:%M:%SZ)
          echo "Image timestamp:  $IMAGE_TS"
          echo "Commit timestamp: $commit_ts"
          echo "Latest:           $latest"
          echo "latest-updated-at=$latest" >> "$GITHUB_OUTPUT"

      - name: Get Last Workflow Run
        id: last-run
        uses: optivem/actions/get-last-workflow-run@v1
        with:
          workflow-name: ${{ github.workflow }}

      - name: Check for Docker Image Updates Since Last Run
        id: should-run
        uses: optivem/actions/check-timestamp-newer@v1
        with:
          latest: ${{ steps.latest.outputs.latest-updated-at }}
          since: ${{ steps.last-run.outputs.timestamp }}

      - name: Evaluate Run Gate
        id: gate
        uses: optivem/actions/evaluate-run-gate@v1
        with:
          skip-conditions: |
            [
              {"when": ${{ steps.check-tag.outputs.exists == 'true' }}, "reason": "Release in progress — version already tagged, awaiting post-release VERSION bump."},
              {"when": ${{ steps.should-run.outputs.newer != 'true' }}, "reason": "No new artifacts since the last run."}
            ]

  run:
    needs: check
    if: needs.check.outputs.should-run == 'true'
    runs-on: ubuntu-latest
    environment: monolith-typescript-acceptance
    permissions:
      contents: read
      packages: write
    outputs:
      version: ${{ steps.rc-version.outputs.version }}
      image-urls: ${{ steps.tag-images.outputs.tagged-image-urls }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ env.COMMIT_SHA }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Simulate Deployment (Real External Systems)
        uses: optivem/actions/deploy-docker-compose@v1
        with:
          environment: acceptance
          version: ${{ env.COMMIT_SHA }}
          image-urls: ${{ needs.check.outputs.image-digest-urls }}
          compose-file: docker-compose.pipeline.real.yml
          working-directory: docker/typescript/monolith

      - name: Wait for Systems (Simulate Deployment (Real External Systems))
        uses: optivem/actions/wait-for-endpoints@v1
        with:
          endpoints: |
            [
              { "name": "MyShop UI", "url": "http://localhost:3311/" },
              { "name": "MyShop API", "url": "http://localhost:8311/health" },
              { "name": "ERP", "url": "http://localhost:9311/erp/health" },
              { "name": "Clock", "url": "http://localhost:9311/clock/health" }
            ]
          compose-file: docker-compose.pipeline.real.yml
          working-directory: docker/typescript/monolith

      - name: Simulate Deployment (Stub External Systems)
        uses: optivem/actions/deploy-docker-compose@v1
        with:
          environment: acceptance
          version: ${{ env.COMMIT_SHA }}
          image-urls: ${{ needs.check.outputs.image-digest-urls }}
          compose-file: docker-compose.pipeline.stub.yml
          working-directory: docker/typescript/monolith

      - name: Wait for Systems (Simulate Deployment (Stub External Systems))
        uses: optivem/actions/wait-for-endpoints@v1
        with:
          endpoints: |
            [
              { "name": "MyShop UI", "url": "http://localhost:3312/" },
              { "name": "MyShop API", "url": "http://localhost:8312/health" },
              { "name": "ERP", "url": "http://localhost:9312/erp/health" },
              { "name": "Clock", "url": "http://localhost:9312/clock/health" }
            ]
          compose-file: docker-compose.pipeline.stub.yml
          working-directory: docker/typescript/monolith

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: 'npm'
          cache-dependency-path: system-test/typescript/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: docker/typescript/monolith

      - name: Cache Playwright Browsers
        id: cache-playwright
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('system-test/typescript/package-lock.json') }}

      - name: Install Playwright Browsers
        timeout-minutes: 5
        if: steps.cache-playwright.outputs.cache-hit != 'true'
        working-directory: docker/typescript/monolith
        run: npx playwright install chromium

      - name: Install Playwright System Dependencies
        timeout-minutes: 5
        working-directory: docker/typescript/monolith
        run: npx playwright install-deps chromium

      - name: Compile System Tests
        working-directory: docker/typescript/monolith
        run: npx tsc --noEmit

      - name: Run Smoke Tests (Stub)
        working-directory: docker/typescript/monolith
        run: npx playwright test --project=smoke-test tests/latest/smoke
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: stub

      - name: Run Smoke Tests (Real)
        working-directory: docker/typescript/monolith
        run: npx playwright test --project=smoke-test tests/latest/smoke
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: real

      - name: Run Acceptance Tests - API Channel
        working-directory: docker/typescript/monolith
        run: npx playwright test --project=acceptance-test tests/latest/acceptance --grep-invert "@isolated"
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: stub
          CHANNEL: API

      - name: Run Acceptance Tests - UI Channel
        working-directory: docker/typescript/monolith
        run: npx playwright test --project=acceptance-test tests/latest/acceptance --grep-invert "@isolated"
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: stub
          CHANNEL: UI
          CHANNEL_MODE: static

      - name: Run Acceptance Tests (Isolated) - API Channel
        working-directory: docker/typescript/monolith
        run: npx playwright test --project=acceptance-test tests/latest/acceptance --grep "@isolated" --workers=1
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: stub
          CHANNEL: API

      - name: Run Acceptance Tests (Isolated) - UI Channel
        working-directory: docker/typescript/monolith
        run: npx playwright test --project=acceptance-test tests/latest/acceptance --grep "@isolated" --workers=1
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: stub
          CHANNEL: UI
          CHANNEL_MODE: static

      - name: Run Contract Tests (Stub)
        working-directory: docker/typescript/monolith
        run: npx playwright test --project=external-system-contract-test "tests/latest/contract/.*-stub-.*\.spec\.ts" --grep-invert "@isolated" --workers=1
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: stub

      - name: Run Contract Tests (Stub) (Isolated)
        working-directory: docker/typescript/monolith
        run: npx playwright test --project=external-system-contract-test "tests/latest/contract/.*-stub-.*\.spec\.ts" --grep "@isolated" --workers=1
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: stub

      - name: Run Contract Tests (Real)
        working-directory: docker/typescript/monolith
        run: npx playwright test --project=external-system-contract-test "tests/latest/contract/.*-real-.*\.spec\.ts" --workers=1
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: real

      - name: Run E2E Tests - API Channel
        working-directory: docker/typescript/monolith
        run: npx playwright test --project=e2e-test tests/latest/e2e
        env:
          ENVIRONMENT: acceptance
          CHANNEL: API

      - name: Run E2E Tests - UI Channel
        working-directory: docker/typescript/monolith
        run: npx playwright test --project=e2e-test tests/latest/e2e
        env:
          ENVIRONMENT: acceptance
          CHANNEL: UI
          CHANNEL_MODE: static

      - name: Read Base System Version
        id: read-version
        uses: optivem/actions/read-base-version@v1

      - name: Compose Prerelease Version
        id: rc-version
        uses: optivem/actions/compose-prerelease-version@v1
        with:
          base-version: ${{ steps.read-version.outputs.base-version }}
          suffix: rc
          build-number: ${{ github.run_number }}
          prefix: monolith-typescript

      - name: Tag Docker Images for Prerelease
        id: tag-images
        uses: optivem/actions/tag-docker-images@v1
        with:
          image-urls: ${{ needs.check.outputs.image-digest-urls }}
          tag: ${{ steps.rc-version.outputs.version }}
          registry-username: ${{ github.repository_owner }}
          token: ${{ secrets.GHCR_TOKEN }}

  publish-tag:
    needs: run
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          ref: ${{ env.COMMIT_SHA }}

      - name: Publish Git Tag
        uses: optivem/actions/publish-tag@v1
        with:
          tag: ${{ needs.run.outputs.version }}
          token: ${{ secrets.WORKFLOW_TOKEN }}

  summary:
    needs: [preflight, check, run, publish-tag]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
    - name: Summarize Stage
      uses: optivem/actions/render-system-stage-summary@v1
      with:
        stage-name: 'Acceptance Stage'
        stage-result: ${{ needs.publish-tag.result == 'failure' && 'failure' || needs.run.result }}
        environment: acceptance
        success-version: ${{ needs.run.outputs.version }}
        success-artifact-ids: ${{ needs.run.outputs.image-urls }}
        skipped-reason: ${{ needs.preflight.outputs.skip-reason || needs.check.outputs.skip-reason }}
        latest-artifact-ids: ${{ needs.check.outputs.image-digest-urls }}
        latest-updated-at: ${{ needs.check.outputs.latest-updated-at }}
        last-run-at: ${{ needs.check.outputs.last-run-at }}
