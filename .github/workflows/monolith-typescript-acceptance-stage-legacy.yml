name: monolith-typescript-acceptance-stage-legacy

on:
  schedule:
    - cron: '0 * * * *'  # Run every hour
  workflow_dispatch:
    inputs:
      commit-sha:
        description: 'Git SHA to test (leave empty for latest image)'
        required: false
        type: string

concurrency:
  group: monolith-typescript-acceptance-stage-legacy

env:
  COMMIT_SHA: ${{ inputs.commit-sha || github.sha }}

jobs:
  preflight:
    runs-on: ubuntu-latest
    permissions:
      packages: read
    outputs:
      artifacts-exist: ${{ steps.check-artifacts.outputs.exist }}
      skip-reason: ${{ steps.check-artifacts.outputs.exist != 'true' && 'No artifacts published yet — waiting for the commit stage to produce images.' || '' }}
    steps:
      - name: Check Container Packages Exist
        id: check-artifacts
        uses: optivem/actions/check-ghcr-packages-exist@v1
        with:
          image-urls: |
            ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}/monolith-system-typescript

  check:
    needs: preflight
    if: needs.preflight.outputs.artifacts-exist == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      should-run: ${{ steps.should-run.outputs.newer }}
      skip-reason: ${{ steps.should-run.outputs.newer != 'true' && 'No new artifacts since the last successful run.' || '' }}
      image-digest-urls: ${{ steps.find-latest.outputs.image-digest-urls }}
      latest-updated-at: ${{ steps.find-latest.outputs.latest-updated-at }}
      last-run-at: ${{ steps.last-run.outputs.timestamp }}
    steps:
      - name: Ensure Environment Variables Defined
        uses: optivem/actions/validate-env-vars-defined@v1
        with:
          names: |
            DOCKERHUB_USERNAME
            DOCKERHUB_TOKEN
        env:
          DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ env.COMMIT_SHA }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Resolve Docker Image Digests
        id: find-latest
        uses: optivem/actions/resolve-docker-image-digests@v1
        with:
          base-image-urls: |
            ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}/monolith-system-typescript
          commit-sha: ${{ inputs.commit-sha }}

      - name: Get Last Successful Workflow Run Timestamp
        id: last-run
        uses: optivem/actions/get-last-successful-github-workflow-run-timestamp@v1
        with:
          workflow-name: ${{ github.workflow }}

      - name: Check for Docker Image Updates Since Last Run
        id: should-run
        uses: optivem/actions/check-timestamp-newer@v1
        with:
          subject: ${{ steps.find-latest.outputs.latest-updated-at }}
          baseline: ${{ steps.last-run.outputs.timestamp }}

  run:
    needs: check
    if: needs.check.outputs.should-run == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ env.COMMIT_SHA }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Simulate Deployment (Real External Systems)
        uses: optivem/actions/deploy-docker-compose@v1
        with:
          environment: acceptance
          version: latest
          image-urls: ${{ needs.check.outputs.image-digest-urls }}
          compose-file: docker-compose.pipeline.monolith.real.yml
          working-directory: system-test/typescript

      - name: Wait for Systems (Simulate Deployment (Real External Systems))
        uses: optivem/actions/wait-for-endpoints@v1
        with:
          endpoints: |
            [
              { "name": "Shop UI", "url": "http://localhost:3311/" },
              { "name": "Shop API", "url": "http://localhost:8311/health" },
              { "name": "ERP", "url": "http://localhost:9311/erp/health" },
              { "name": "Clock", "url": "http://localhost:9311/clock/health" }
            ]
          compose-file: docker-compose.pipeline.monolith.real.yml
          working-directory: system-test/typescript

      - name: Simulate Deployment (Stub External Systems)
        uses: optivem/actions/deploy-docker-compose@v1
        with:
          environment: acceptance
          version: latest
          image-urls: ${{ needs.check.outputs.image-digest-urls }}
          compose-file: docker-compose.pipeline.monolith.stub.yml
          working-directory: system-test/typescript

      - name: Wait for Systems (Simulate Deployment (Stub External Systems))
        uses: optivem/actions/wait-for-endpoints@v1
        with:
          endpoints: |
            [
              { "name": "Shop UI", "url": "http://localhost:3312/" },
              { "name": "Shop API", "url": "http://localhost:8312/health" },
              { "name": "ERP", "url": "http://localhost:9312/erp/health" },
              { "name": "Clock", "url": "http://localhost:9312/clock/health" }
            ]
          compose-file: docker-compose.pipeline.monolith.stub.yml
          working-directory: system-test/typescript

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: 'npm'
          cache-dependency-path: system-test/typescript/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: system-test/typescript

      - name: Cache Playwright Browsers
        id: cache-playwright
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('system-test/typescript/package-lock.json') }}

      - name: Install Playwright Browsers
        timeout-minutes: 5
        if: steps.cache-playwright.outputs.cache-hit != 'true'
        working-directory: system-test/typescript
        run: npx playwright install chromium

      - name: Install Playwright System Dependencies
        timeout-minutes: 5
        working-directory: system-test/typescript
        run: npx playwright install-deps chromium

      - name: Compile System Tests
        working-directory: system-test/typescript
        run: npx tsc --noEmit

      - name: mod02 - Run Smoke Tests
        working-directory: system-test/typescript
        run: npx playwright test --project=smoke-test tests/legacy/mod02/smoke
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: real

      - name: mod03 - Run E2E Tests
        working-directory: system-test/typescript
        run: npx playwright test --project=e2e-test tests/legacy/mod03/e2e
        env:
          ENVIRONMENT: acceptance

      - name: mod04 - Run Smoke Tests
        working-directory: system-test/typescript
        run: npx playwright test --project=smoke-test tests/legacy/mod04/smoke
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: real

      - name: mod04 - Run E2E Tests
        working-directory: system-test/typescript
        run: npx playwright test --project=e2e-test tests/legacy/mod04/e2e
        env:
          ENVIRONMENT: acceptance

      - name: mod05 - Run Smoke Tests
        working-directory: system-test/typescript
        run: npx playwright test --project=smoke-test tests/legacy/mod05/smoke
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: real

      - name: mod05 - Run E2E Tests
        working-directory: system-test/typescript
        run: npx playwright test --project=e2e-test tests/legacy/mod05/e2e
        env:
          ENVIRONMENT: acceptance

      - name: mod06 - Run Smoke Tests
        working-directory: system-test/typescript
        run: npx playwright test --project=smoke-test tests/legacy/mod06/smoke
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: real

      - name: mod06 - Run E2E Tests - API Channel
        working-directory: system-test/typescript
        run: npx playwright test --project=e2e-test tests/legacy/mod06/e2e
        env:
          ENVIRONMENT: acceptance
          CHANNEL: API

      - name: mod06 - Run E2E Tests - UI Channel
        working-directory: system-test/typescript
        run: npx playwright test --project=e2e-test tests/legacy/mod06/e2e
        env:
          ENVIRONMENT: acceptance
          CHANNEL: UI

      - name: mod07 - Run Smoke Tests
        working-directory: system-test/typescript
        run: npx playwright test --project=smoke-test tests/legacy/mod07/smoke
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: real

      - name: mod07 - Run E2E Tests - API Channel
        working-directory: system-test/typescript
        run: npx playwright test --project=e2e-test tests/legacy/mod07/e2e
        env:
          ENVIRONMENT: acceptance
          CHANNEL: API

      - name: mod07 - Run E2E Tests - UI Channel
        working-directory: system-test/typescript
        run: npx playwright test --project=e2e-test tests/legacy/mod07/e2e
        env:
          ENVIRONMENT: acceptance
          CHANNEL: UI

      - name: mod08 - Run Smoke Tests
        working-directory: system-test/typescript
        run: npx playwright test --project=smoke-test tests/legacy/mod08/smoke
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: real

      - name: mod08 - Run E2E Tests - API Channel
        working-directory: system-test/typescript
        run: npx playwright test --project=e2e-test tests/legacy/mod08/e2e
        env:
          ENVIRONMENT: acceptance
          CHANNEL: API

      - name: mod08 - Run E2E Tests - UI Channel
        working-directory: system-test/typescript
        run: npx playwright test --project=e2e-test tests/legacy/mod08/e2e
        env:
          ENVIRONMENT: acceptance
          CHANNEL: UI

      - name: mod09 - Run Smoke Tests (Stub)
        working-directory: system-test/typescript
        run: npx playwright test --project=smoke-test tests/legacy/mod09/smoke
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: stub

      - name: mod09 - Run Smoke Tests (Real)
        working-directory: system-test/typescript
        run: npx playwright test --project=smoke-test tests/legacy/mod09/smoke
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: real

      - name: mod10 - Run Acceptance Tests - API Channel
        working-directory: system-test/typescript
        run: npx playwright test --project=acceptance-test tests/legacy/mod10/acceptance --grep-invert "@isolated"
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: stub
          CHANNEL: API

      - name: mod10 - Run Acceptance Tests - UI Channel
        working-directory: system-test/typescript
        run: npx playwright test --project=acceptance-test tests/legacy/mod10/acceptance --grep-invert "@isolated"
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: stub
          CHANNEL: UI

      - name: mod10 - Run Acceptance Tests (Isolated) - API Channel
        working-directory: system-test/typescript
        run: npx playwright test --project=acceptance-test tests/legacy/mod10/acceptance --grep "@isolated" --workers=1
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: stub
          CHANNEL: API

      - name: mod10 - Run Acceptance Tests (Isolated) - UI Channel
        working-directory: system-test/typescript
        run: npx playwright test --project=acceptance-test tests/legacy/mod10/acceptance --grep "@isolated" --workers=1
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: stub
          CHANNEL: UI

      - name: mod11 - Run Contract Tests (Stub)
        working-directory: system-test/typescript
        run: npx playwright test --project=external-system-contract-test tests/legacy/mod11/contract --grep-invert "@isolated" --workers=1
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: stub

      - name: mod11 - Run Contract Tests (Isolated) (Stub)
        working-directory: system-test/typescript
        run: npx playwright test --project=external-system-contract-test tests/legacy/mod11/contract --grep "@isolated" --workers=1
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: stub

      - name: mod11 - Run Contract Tests (Real)
        working-directory: system-test/typescript
        run: npx playwright test --project=external-system-contract-test "tests/legacy/mod11/contract/.*-real-.*\.spec\.ts" --workers=1
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: real

      - name: mod11 - Run E2E Tests - API Channel
        working-directory: system-test/typescript
        run: npx playwright test --project=e2e-test tests/legacy/mod11/e2e
        env:
          ENVIRONMENT: acceptance
          CHANNEL: API

      - name: mod11 - Run E2E Tests - UI Channel
        working-directory: system-test/typescript
        run: npx playwright test --project=e2e-test tests/legacy/mod11/e2e
        env:
          ENVIRONMENT: acceptance
          CHANNEL: UI

  summary:
    needs: [preflight, check, run]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
    - name: Summarize Stage
      uses: optivem/actions/render-system-stage-summary@v1
      with:
        stage-name: 'Acceptance Stage'
        stage-result: ${{ needs.run.result }}
        environment: acceptance
        success-version: latest
        skipped-reason: ${{ needs.preflight.outputs.skip-reason || needs.check.outputs.skip-reason }}
        latest-artifact-ids: ${{ needs.check.outputs.image-digest-urls }}
        latest-updated-at: ${{ needs.check.outputs.latest-updated-at }}
        last-run-at: ${{ needs.check.outputs.last-run-at }}
