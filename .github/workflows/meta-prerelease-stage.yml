name: meta-prerelease-stage

on:
  schedule:
    - cron: '0 */3 * * *'  # Every 3 hours — gated, only runs if there are new commits since the last run
    - cron: '0 7 * * 1'    # Mondays 07:00 UTC — weekly heartbeat, runs unconditionally
  workflow_dispatch:
    inputs:
      skip-tests:
        description: 'Bypass ALL test phases and tag the meta-rc directly. RECOVERY-ONLY: meta-release-stage requires all 6 <flavor>-v<VERSION>-rc.*-qa-approved git tags to already exist. Use this only when those approvals exist from a previous run but the meta-rc tag itself was never created (e.g. a transient failure after qa-approved was set). Without those flavor approvals the meta-rc will be tagged but meta-release-stage will fail.'
        required: false
        type: boolean
        default: false
      fail-fast:
        description: 'When true, the first failing matrix entry cancels its siblings. Default false lets every variant run to completion.'
        required: false
        type: boolean
        default: false
      pipeline-timeout-seconds:
        description: 'Hard timeout (seconds) for each Phase 2 variant pipeline run before giving up. Default 14400 (4h).'
        required: false
        type: string
        default: '14400'

concurrency:
  group: meta-prerelease-stage
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      should-run: ${{ steps.gate.outputs.should-run }}
      skip-reason: ${{ steps.gate.outputs.skip-reason }}
      trigger-name: ${{ steps.trigger.outputs.name }}
    steps:
      - name: Resolve Trigger Name
        id: trigger
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          SCHEDULE: ${{ github.event.schedule }}
        run: |
          set -euo pipefail
          if [[ "$EVENT_NAME" == 'workflow_dispatch' ]]; then
            name='manual'
          elif [[ "$SCHEDULE" == '0 */3 * * *' ]]; then
            name='gated-3h'
          elif [[ "$SCHEDULE" == '0 7 * * 1' ]]; then
            name='weekly-heartbeat'
          else
            name='unrecognized-schedule'
            echo "::warning::Unrecognized schedule expression '$SCHEDULE' — gate will fail-open and run the pipeline."
          fi
          echo "Trigger: $name (event=$EVENT_NAME, schedule='$SCHEDULE')"
          echo "name=$name" >> "$GITHUB_OUTPUT"

      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve Last Meta Release Tag
        id: last-release
        shell: bash
        run: |
          set -euo pipefail
          # Find the most recent final meta release tag (excluding -rc.* prereleases).
          # If none exists (bootstrap), leave the output empty and let the next step run.
          if last=$(git describe --tags --abbrev=0 --match='meta-v*' --exclude='*-rc.*' 2>/dev/null); then
            echo "Last meta release tag: $last"
            echo "tag=$last" >> "$GITHUB_OUTPUT"
          else
            echo "No prior meta-v* release tag found — bootstrap mode, will run."
            echo "tag=" >> "$GITHUB_OUTPUT"
          fi

      - name: Detect Real Source Changes Since Last Release
        id: real-changes
        shell: bash
        env:
          LAST_RELEASE: ${{ steps.last-release.outputs.tag }}
        run: |
          set -euo pipefail
          # Bootstrap: no prior release means we always run.
          if [[ -z "$LAST_RELEASE" ]]; then
            echo "has-real-changes=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # List unique paths changed since the last release. The empty
          # `--pretty=format:` strips per-commit headers so we get a flat list.
          changed=$(git log --name-only --pretty=format: "$LAST_RELEASE..HEAD" \
            | sort -u | grep -v '^$' || true)

          if [[ -z "$changed" ]]; then
            echo "No file changes since $LAST_RELEASE."
            echo "has-real-changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Files changed since $LAST_RELEASE:"
          echo "$changed" | sed 's/^/  /'
          echo

          # Anything whose basename is exactly "VERSION" is a bump-loop artifact
          # produced by auto-bump-patch — ignore it. Anything else is real.
          non_version=$(echo "$changed" | grep -v -E '(^|/)VERSION$' || true)

          if [[ -z "$non_version" ]]; then
            echo "All changes are VERSION-file bumps — no real source changes."
            echo "has-real-changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "Real (non-VERSION) source changes detected:"
            echo "$non_version" | sed 's/^/  /'
            echo "has-real-changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Evaluate Run Gate
        id: gate
        uses: optivem/actions/evaluate-run-gate@v1
        with:
          skip-conditions: |
            [
              {"when": ${{ steps.trigger.outputs.name == 'gated-3h' && steps.real-changes.outputs.has-real-changes != 'true' }}, "reason": "Gated 3-hour run skipped — only VERSION-file bumps (or no changes) since the last meta release. Weekly heartbeat will still fire."}
            ]

  run:
    needs: check
    if: needs.check.outputs.should-run == 'true'
    uses: ./.github/workflows/_meta-prerelease-pipeline.yml
    secrets: inherit
    with:
      level: qa
      variant: all
      skip-local: false
      skip-tests: ${{ inputs.skip-tests || false }}
      is-release-run: true
      fail-fast: ${{ inputs.fail-fast || false }}
      pipeline-timeout-seconds: ${{ inputs.pipeline-timeout-seconds || '14400' }}
