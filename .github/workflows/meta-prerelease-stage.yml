name: meta-prerelease-stage

on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch:
    inputs:
      level:
        description: 'Verification level'
        required: false
        type: choice
        options:
          - local
          - commit
          - acceptance
          - qa
        default: 'qa'

concurrency:
  group: meta-prerelease-stage
  cancel-in-progress: false

jobs:
  print-inputs:
    runs-on: ubuntu-latest
    steps:
      - name: Print input parameters
        run: |
          echo "=== Workflow Inputs ==="
          echo "Level: ${{ inputs.level || 'qa' }}"
          echo "Triggered by: ${{ github.event_name }} ${{ github.event.schedule }}"

  # Fail fast if any VERSION file's version has already been used as a final
  # release by meta, any pipeline, or any per-stack artifact. Mirrors the
  # VERSION → prefix mapping in bump-versions.yml so every tag that auto-bump
  # would touch is checked — otherwise we'd only discover it deep into the
  # downstream pipeline acceptance stages.
  check-version:
    needs: print-inputs
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Check versions not already released
        shell: bash
        run: |
          set -euo pipefail

          # "<file> <prefix> [<prefix>...]" — matches bump-versions.yml mapping.
          # Prefixes include their trailing "v" (e.g. "meta-v" → tag "meta-v1.0.21").
          mapping=(
            "VERSION v meta-v monolith-java-v monolith-dotnet-v monolith-typescript-v multitier-java-v multitier-dotnet-v multitier-typescript-v"
            "system/monolith/dotnet/VERSION monolith-dotnet-v meta-v"
            "system/monolith/java/VERSION monolith-java-v meta-v"
            "system/monolith/typescript/VERSION monolith-typescript-v meta-v"
            "system/multitier/backend-dotnet/VERSION multitier-backend-dotnet-v multitier-dotnet-v meta-v"
            "system/multitier/backend-java/VERSION multitier-backend-java-v multitier-java-v meta-v"
            "system/multitier/backend-typescript/VERSION multitier-backend-typescript-v multitier-typescript-v meta-v"
            "system/multitier/frontend-react/VERSION multitier-frontend-react-v multitier-java-v multitier-dotnet-v multitier-typescript-v meta-v"
          )

          declare -A SEEN
          FOUND=()
          for entry in "${mapping[@]}"; do
            read -ra parts <<< "$entry"
            file="${parts[0]}"
            version=$(tr -d '[:space:]' < "$file")
            for ((i=1; i<${#parts[@]}; i++)); do
              prefix="${parts[$i]}"
              tag="${prefix}${version}"
              [[ -n "${SEEN[$tag]:-}" ]] && continue
              SEEN[$tag]=1
              if git tag -l "$tag" | grep -qx "$tag"; then
                FOUND+=("$tag (from $file)")
              fi
            done
          done

          if [[ ${#FOUND[@]} -gt 0 ]]; then
            BUMP_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/workflows/auto-bump-patch.yml"
            {
              echo "## Version already released"
              echo ""
              echo "The following tags already exist as final releases:"
              echo ""
              for item in "${FOUND[@]}"; do echo "- \`${item}\`"; done
              echo ""
              echo "Run the [auto-bump-patch workflow](${BUMP_URL}) to bump VERSION files, then re-run this workflow."
            } >> "$GITHUB_STEP_SUMMARY"
            echo "::error::Version already released: ${FOUND[*]}. Run the auto-bump-patch workflow to bump VERSION files, then re-run this workflow: ${BUMP_URL}"
            exit 1
          fi
          echo "All version tags available across meta and all pipelines. OK to proceed."

  # Phase 0: Run all local stages in parallel
  local-monolith-java:
    needs: check-version
    runs-on: ubuntu-latest
    steps:
      - uses: optivem/actions/trigger-and-wait@main
        with:
          workflow: prerelease-pipeline-monolith-java.yml
          inputs: '{"level": "local", "skip-commit-stage": "true"}'

  local-monolith-dotnet:
    needs: check-version
    runs-on: ubuntu-latest
    steps:
      - uses: optivem/actions/trigger-and-wait@main
        with:
          workflow: prerelease-pipeline-monolith-dotnet.yml
          inputs: '{"level": "local", "skip-commit-stage": "true"}'

  local-monolith-typescript:
    needs: check-version
    runs-on: ubuntu-latest
    steps:
      - uses: optivem/actions/trigger-and-wait@main
        with:
          workflow: prerelease-pipeline-monolith-typescript.yml
          inputs: '{"level": "local", "skip-commit-stage": "true"}'

  local-multitier-java:
    needs: check-version
    runs-on: ubuntu-latest
    steps:
      - uses: optivem/actions/trigger-and-wait@main
        with:
          workflow: prerelease-pipeline-multitier-java.yml
          inputs: '{"level": "local", "skip-commit-stage": "true"}'

  local-multitier-dotnet:
    needs: check-version
    runs-on: ubuntu-latest
    steps:
      - uses: optivem/actions/trigger-and-wait@main
        with:
          workflow: prerelease-pipeline-multitier-dotnet.yml
          inputs: '{"level": "local", "skip-commit-stage": "true"}'

  local-multitier-typescript:
    needs: check-version
    runs-on: ubuntu-latest
    steps:
      - uses: optivem/actions/trigger-and-wait@main
        with:
          workflow: prerelease-pipeline-multitier-typescript.yml
          inputs: '{"level": "local", "skip-commit-stage": "true"}'

  # Phase 1: Run all commit stages in parallel (deduplicated)
  commit-monolith-java:
    needs: [local-monolith-java, local-monolith-dotnet, local-monolith-typescript, local-multitier-java, local-multitier-dotnet, local-multitier-typescript]
    if: ${{ contains(fromJSON('["commit","acceptance","qa"]'), inputs.level || 'qa') }}
    runs-on: ubuntu-latest
    steps:
      - uses: optivem/actions/trigger-and-wait@main
        with:
          workflow: monolith-java-commit-stage.yml

  commit-monolith-dotnet:
    needs: [local-monolith-java, local-monolith-dotnet, local-monolith-typescript, local-multitier-java, local-multitier-dotnet, local-multitier-typescript]
    if: ${{ contains(fromJSON('["commit","acceptance","qa"]'), inputs.level || 'qa') }}
    runs-on: ubuntu-latest
    steps:
      - uses: optivem/actions/trigger-and-wait@main
        with:
          workflow: monolith-dotnet-commit-stage.yml

  commit-monolith-typescript:
    needs: [local-monolith-java, local-monolith-dotnet, local-monolith-typescript, local-multitier-java, local-multitier-dotnet, local-multitier-typescript]
    if: ${{ contains(fromJSON('["commit","acceptance","qa"]'), inputs.level || 'qa') }}
    runs-on: ubuntu-latest
    steps:
      - uses: optivem/actions/trigger-and-wait@main
        with:
          workflow: monolith-typescript-commit-stage.yml

  commit-multitier-backend-java:
    needs: [local-monolith-java, local-monolith-dotnet, local-monolith-typescript, local-multitier-java, local-multitier-dotnet, local-multitier-typescript]
    if: ${{ contains(fromJSON('["commit","acceptance","qa"]'), inputs.level || 'qa') }}
    runs-on: ubuntu-latest
    steps:
      - uses: optivem/actions/trigger-and-wait@main
        with:
          workflow: multitier-backend-java-commit-stage.yml

  commit-multitier-backend-dotnet:
    needs: [local-monolith-java, local-monolith-dotnet, local-monolith-typescript, local-multitier-java, local-multitier-dotnet, local-multitier-typescript]
    if: ${{ contains(fromJSON('["commit","acceptance","qa"]'), inputs.level || 'qa') }}
    runs-on: ubuntu-latest
    steps:
      - uses: optivem/actions/trigger-and-wait@main
        with:
          workflow: multitier-backend-dotnet-commit-stage.yml

  commit-multitier-backend-typescript:
    needs: [local-monolith-java, local-monolith-dotnet, local-monolith-typescript, local-multitier-java, local-multitier-dotnet, local-multitier-typescript]
    if: ${{ contains(fromJSON('["commit","acceptance","qa"]'), inputs.level || 'qa') }}
    runs-on: ubuntu-latest
    steps:
      - uses: optivem/actions/trigger-and-wait@main
        with:
          workflow: multitier-backend-typescript-commit-stage.yml

  commit-multitier-frontend-react:
    needs: [local-monolith-java, local-monolith-dotnet, local-monolith-typescript, local-multitier-java, local-multitier-dotnet, local-multitier-typescript]
    if: ${{ contains(fromJSON('["commit","acceptance","qa"]'), inputs.level || 'qa') }}
    runs-on: ubuntu-latest
    steps:
      - uses: optivem/actions/trigger-and-wait@main
        with:
          workflow: multitier-frontend-react-commit-stage.yml

  # Phase 2: Run all pipelines in parallel. Each pipeline produces RC tags namespaced
  # by its prefix (e.g. monolith-java-v1.0.0-rc.N), so there are no shared-counter collisions.
  monolith-java:
    needs: [commit-monolith-java, commit-monolith-dotnet, commit-monolith-typescript, commit-multitier-backend-java, commit-multitier-backend-dotnet, commit-multitier-backend-typescript, commit-multitier-frontend-react]
    if: ${{ always() && !failure() && !cancelled() && contains(fromJSON('["acceptance","qa"]'), inputs.level || 'qa') }}
    runs-on: ubuntu-latest
    steps:
      - uses: optivem/actions/trigger-and-wait@main
        with:
          workflow: prerelease-pipeline-monolith-java.yml
          inputs: '{"level": "${{ inputs.level || ''qa'' }}", "skip-local-stage": "true", "skip-commit-stage": "true"}'

  monolith-dotnet:
    needs: [commit-monolith-java, commit-monolith-dotnet, commit-monolith-typescript, commit-multitier-backend-java, commit-multitier-backend-dotnet, commit-multitier-backend-typescript, commit-multitier-frontend-react]
    if: ${{ always() && !failure() && !cancelled() && contains(fromJSON('["acceptance","qa"]'), inputs.level || 'qa') }}
    runs-on: ubuntu-latest
    steps:
      - uses: optivem/actions/trigger-and-wait@main
        with:
          workflow: prerelease-pipeline-monolith-dotnet.yml
          inputs: '{"level": "${{ inputs.level || ''qa'' }}", "skip-local-stage": "true", "skip-commit-stage": "true"}'

  monolith-typescript:
    needs: [commit-monolith-java, commit-monolith-dotnet, commit-monolith-typescript, commit-multitier-backend-java, commit-multitier-backend-dotnet, commit-multitier-backend-typescript, commit-multitier-frontend-react]
    if: ${{ always() && !failure() && !cancelled() && contains(fromJSON('["acceptance","qa"]'), inputs.level || 'qa') }}
    runs-on: ubuntu-latest
    steps:
      - uses: optivem/actions/trigger-and-wait@main
        with:
          workflow: prerelease-pipeline-monolith-typescript.yml
          inputs: '{"level": "${{ inputs.level || ''qa'' }}", "skip-local-stage": "true", "skip-commit-stage": "true"}'

  multitier-java:
    needs: [commit-monolith-java, commit-monolith-dotnet, commit-monolith-typescript, commit-multitier-backend-java, commit-multitier-backend-dotnet, commit-multitier-backend-typescript, commit-multitier-frontend-react]
    if: ${{ always() && !failure() && !cancelled() && contains(fromJSON('["acceptance","qa"]'), inputs.level || 'qa') }}
    runs-on: ubuntu-latest
    steps:
      - uses: optivem/actions/trigger-and-wait@main
        with:
          workflow: prerelease-pipeline-multitier-java.yml
          inputs: '{"level": "${{ inputs.level || ''qa'' }}", "skip-local-stage": "true", "skip-commit-stage": "true"}'

  multitier-dotnet:
    needs: [commit-monolith-java, commit-monolith-dotnet, commit-monolith-typescript, commit-multitier-backend-java, commit-multitier-backend-dotnet, commit-multitier-backend-typescript, commit-multitier-frontend-react]
    if: ${{ always() && !failure() && !cancelled() && contains(fromJSON('["acceptance","qa"]'), inputs.level || 'qa') }}
    runs-on: ubuntu-latest
    steps:
      - uses: optivem/actions/trigger-and-wait@main
        with:
          workflow: prerelease-pipeline-multitier-dotnet.yml
          inputs: '{"level": "${{ inputs.level || ''qa'' }}", "skip-local-stage": "true", "skip-commit-stage": "true"}'

  multitier-typescript:
    needs: [commit-monolith-java, commit-monolith-dotnet, commit-monolith-typescript, commit-multitier-backend-java, commit-multitier-backend-dotnet, commit-multitier-backend-typescript, commit-multitier-frontend-react]
    if: ${{ always() && !failure() && !cancelled() && contains(fromJSON('["acceptance","qa"]'), inputs.level || 'qa') }}
    runs-on: ubuntu-latest
    steps:
      - uses: optivem/actions/trigger-and-wait@main
        with:
          workflow: prerelease-pipeline-multitier-typescript.yml
          inputs: '{"level": "${{ inputs.level || ''qa'' }}", "skip-local-stage": "true", "skip-commit-stage": "true"}'

  # Final: tag SHA as meta-rc — only when level is qa and all 6 language×architecture combos passed
  tag-meta-rc:
    needs: [monolith-java, monolith-dotnet, monolith-typescript, multitier-java, multitier-dotnet, multitier-typescript]
    if: ${{ success() && (inputs.level || 'qa') == 'qa' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.VERIFY_TOKEN }}
      - name: Tag meta-rc
        run: |
          set -euo pipefail
          VERSION=$(tr -d '[:space:]' < VERSION)
          TAG="meta-v${VERSION}-rc.${{ github.run_number }}"
          echo "Creating tag ${TAG} on ${{ github.sha }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "$TAG" "${{ github.sha }}"
          git push origin "$TAG"
          echo "Tagged ${{ github.sha }} as ${TAG}"
          TAG_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/releases/tag/${TAG}"
          {
            echo "## Meta RC tagged"
            echo ""
            echo "- Tag: [\`${TAG}\`](${TAG_URL})"
            echo "- Commit: [\`${GITHUB_SHA::7}\`](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/commit/${GITHUB_SHA})"
          } >> "$GITHUB_STEP_SUMMARY"
