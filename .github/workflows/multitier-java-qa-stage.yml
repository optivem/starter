name: multitier-java-qa-stage

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Prerelease version to deploy (e.g., multitier-java-v1.0.0-rc.1). Leave empty to deploy the latest available RC.'
        required: false
        type: string
        default: ''

concurrency:
  group: multitier-java-qa-stage

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ inputs.version || steps.resolve-latest.outputs.tag }}
      image-urls: ${{ steps.resolve-images.outputs.image-urls }}
    steps:
      - name: Ensure Environment Variables Defined
        uses: optivem/actions/validate-env-vars-defined@v1
        with:
          names: |
            DOCKERHUB_USERNAME
            DOCKERHUB_TOKEN
            WORKFLOW_TOKEN
        env:
          DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          WORKFLOW_TOKEN: ${{ secrets.WORKFLOW_TOKEN }}

      - name: Resolve Latest RC
        id: resolve-latest
        if: inputs.version == ''
        uses: optivem/actions/resolve-latest-prerelease-tag@v1
        with:
          tag-prefix: multitier-java-v

      - name: Check RC Exists
        if: inputs.version != ''
        uses: optivem/actions/validate-tag-exists@v1
        with:
          tag: ${{ inputs.version }}

      - name: Compose Docker Image URLs
        id: resolve-images
        uses: optivem/actions/compose-docker-image-urls@v1
        with:
          tag: ${{ inputs.version || steps.resolve-latest.outputs.tag }}
          base-image-urls: |
            ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}/multitier-frontend-react
            ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}/multitier-backend-java

  run:
    needs: check
    if: needs.check.result == 'success'
    runs-on: ubuntu-latest
    environment: multitier-java-qa
    permissions:
      contents: read
      packages: read
    outputs:
      version: ${{ steps.promote.outputs.status-tag }}
      image-urls: ${{ needs.check.outputs.image-urls }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.check.outputs.version }}

      - name: Log in to Docker Hub
        uses: Wandalen/wretry.action@v3
        with:
          action: docker/login-action@v4
          attempt_limit: 3
          attempt_delay: 10000
          with: |
            username: ${{ vars.DOCKERHUB_USERNAME }}
            password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        uses: Wandalen/wretry.action@v3
        with:
          action: docker/login-action@v4
          attempt_limit: 3
          attempt_delay: 10000
          with: |
            registry: ghcr.io
            username: ${{ github.repository_owner }}
            password: ${{ secrets.GHCR_TOKEN }}

      - name: Simulate Deployment (QA Environment)
        id: deploy
        uses: optivem/actions/deploy-docker-compose@v1
        with:
          environment: qa
          version: ${{ needs.check.outputs.version }}
          image-urls: ${{ needs.check.outputs.image-urls }}
          service-names: |
            frontend
            backend
          compose-file: docker-compose.pipeline.real.yml
          working-directory: docker/java/multitier

      - name: Wait for Systems (Simulate Deployment (QA Environment))
        uses: optivem/actions/wait-for-endpoints@v1
        with:
          endpoints: |
            [
              { "name": "MyShop UI", "url": "http://localhost:3111/" },
              { "name": "MyShop API", "url": "http://localhost:8111/health" },
              { "name": "ERP", "url": "http://localhost:9111/erp/health" },
              { "name": "Clock", "url": "http://localhost:9111/clock/health" }
            ]
          compose-file: docker-compose.pipeline.real.yml
          working-directory: docker/java/multitier

      - name: Generate QA Deployed Tag
        id: promote
        uses: optivem/actions/compose-prerelease-status@v1
        with:
          prerelease-version: ${{ needs.check.outputs.version }}
          environment: qa
          status: deployed

  publish-tag:
    needs: run
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.version }}

      - name: Publish Git Tag
        uses: optivem/actions/publish-tag@v1
        with:
          tag: ${{ needs.run.outputs.version }}
          token: ${{ secrets.WORKFLOW_TOKEN }}

  summary:
    needs: [check, run, publish-tag]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
    - name: Summarize Stage
      uses: optivem/actions/render-system-stage-summary@v1
      with:
        stage-name: 'QA Stage'
        stage-result: ${{ needs.publish-tag.result == 'failure' && 'failure' || needs.run.result }}
        environment: qa
        success-version: ${{ needs.run.outputs.version }}
        success-artifact-ids: ${{ needs.run.outputs.image-urls }}
