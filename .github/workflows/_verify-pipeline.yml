name: _verify-pipeline

on:
  workflow_call:
    inputs:
      prefix:
        description: 'Pipeline prefix (e.g. monolith-java, multitier-dotnet)'
        required: true
        type: string
      commit-workflows:
        description: 'JSON array of commit-stage workflow filenames'
        required: false
        type: string
        default: '[]'
      skip-commit-stage:
        description: 'Skip commit stage (when commit stages are run externally)'
        required: false
        type: boolean
        default: false

jobs:
  commit-stage:
    if: ${{ !inputs.skip-commit-stage }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        workflow: ${{ fromJSON(inputs.commit-workflows) }}
    steps:
      - uses: optivem/actions/trigger-and-wait@main
        with:
          workflow: ${{ matrix.workflow }}

  acceptance-stage:
    needs: commit-stage
    if: ${{ always() && (inputs.skip-commit-stage || needs.commit-stage.result == 'success') }}
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get-version.outputs.version }}
    steps:
      - uses: optivem/actions/trigger-and-wait@main
        with:
          workflow: ${{ inputs.prefix }}-acceptance-stage.yml
          poll-interval: '300'

      - name: Get RC Version
        id: get-version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version=$(gh release list \
            --repo "${{ github.repository }}" \
            --json tagName,isPrerelease \
            --jq '[.[] | select(.isPrerelease) | select(.tagName | test("-qa-|-prod-") | not)] | .[0].tagName')
          echo "version=$version" >> $GITHUB_OUTPUT

  qa-stage:
    needs: acceptance-stage
    runs-on: ubuntu-latest
    steps:
      - uses: optivem/actions/trigger-and-wait@main
        with:
          workflow: ${{ inputs.prefix }}-qa-stage.yml
          inputs: '{"version": "${{ needs.acceptance-stage.outputs.version }}"}'

  qa-signoff:
    needs: [acceptance-stage, qa-stage]
    runs-on: ubuntu-latest
    steps:
      - uses: optivem/actions/trigger-and-wait@main
        with:
          workflow: ${{ inputs.prefix }}-qa-signoff.yml
          inputs: '{"version": "${{ needs.acceptance-stage.outputs.version }}", "result": "approved"}'

  prod-stage:
    needs: [acceptance-stage, qa-signoff]
    runs-on: ubuntu-latest
    steps:
      - uses: optivem/actions/trigger-and-wait@main
        with:
          workflow: ${{ inputs.prefix }}-prod-stage.yml
          inputs: '{"version": "${{ needs.acceptance-stage.outputs.version }}"}'
