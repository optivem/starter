name: _verify-pipeline

on:
  workflow_call:
    inputs:
      prefix:
        description: 'Pipeline prefix (e.g. monolith-java, multitier-dotnet)'
        required: true
        type: string
      commit-workflows:
        description: 'JSON array of commit-stage workflow filenames'
        required: false
        type: string
        default: '[]'
      skip-commit-stage:
        description: 'Skip commit stage (when commit stages are run externally)'
        required: false
        type: boolean
        default: false
      level:
        description: 'Verification level: commit, acceptance, or release'
        required: false
        type: string
        default: 'release'

jobs:
  commit-stage:
    if: ${{ !inputs.skip-commit-stage }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        workflow: ${{ fromJSON(inputs.commit-workflows) }}
    steps:
      - uses: optivem/actions/trigger-and-wait@main
        with:
          workflow: ${{ matrix.workflow }}

  acceptance-stage:
    needs: commit-stage
    if: ${{ always() && inputs.level != 'commit' && (inputs.skip-commit-stage || needs.commit-stage.result == 'success') }}
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get-version.outputs.tag }}
    steps:
      - id: trigger
        uses: optivem/actions/trigger-and-wait@main
        with:
          workflow: ${{ inputs.prefix }}-acceptance-stage.yml
          poll-interval: '300'

      - id: get-version
        uses: optivem/actions/find-release-by-run@main
        with:
          run-id: ${{ steps.trigger.outputs.run-id }}

  acceptance-stage-legacy:
    needs: acceptance-stage
    if: ${{ always() && inputs.level != 'commit' && needs.acceptance-stage.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: optivem/actions/trigger-and-wait@main
        with:
          workflow: ${{ inputs.prefix }}-acceptance-stage-legacy.yml
          poll-interval: '300'

  qa-stage:
    needs: [acceptance-stage, acceptance-stage-legacy]
    if: ${{ always() && inputs.level == 'release' && needs.acceptance-stage-legacy.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: optivem/actions/trigger-and-wait@main
        with:
          workflow: ${{ inputs.prefix }}-qa-stage.yml
          inputs: '{"version": "${{ needs.acceptance-stage.outputs.version }}"}'

  qa-signoff:
    needs: [acceptance-stage, qa-stage]
    if: ${{ always() && inputs.level == 'release' && needs.qa-stage.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: optivem/actions/trigger-and-wait@main
        with:
          workflow: ${{ inputs.prefix }}-qa-signoff.yml
          inputs: '{"version": "${{ needs.acceptance-stage.outputs.version }}", "result": "approved"}'

  prod-stage:
    needs: [acceptance-stage, qa-signoff]
    if: ${{ always() && inputs.level == 'release' && needs.qa-signoff.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: optivem/actions/trigger-and-wait@main
        with:
          workflow: ${{ inputs.prefix }}-prod-stage.yml
          inputs: '{"version": "${{ needs.acceptance-stage.outputs.version }}"}'
