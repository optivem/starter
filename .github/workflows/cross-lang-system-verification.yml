name: cross-lang-system-verification

# Verifies behavior parity across system languages: each test-lang's suite
# is run against every other system-lang's SUT (Java tests vs .NET system,
# .NET tests vs TypeScript system, etc.). Same-lang-vs-same-system combos
# are excluded — they are already covered by the per-(arch, lang)
# acceptance stages.
#
# This workflow is purely a regression check. It does NOT tag images,
# publish git tags, or trigger downstream prerelease pipelines. Failures
# here surface backend-behavior drift but do not block any release.
#
# SHA pinning is structurally tighter than the per-lang acceptance stages:
# `checkout @ <sha>` atomically pins source code, docker-compose files,
# system.json, and tests config to one commit. Images are built from source
# at that SHA — no GHCR lookups, no digest resolution.

on:
  schedule:
    - cron: '0 6 * * *'  # Daily at 06:00 UTC (off-peak; per-lang stages run hourly)
  workflow_dispatch:
    inputs:
      commit-sha:
        description: 'Git SHA to test (leave empty for HEAD of default branch)'
        required: false
        type: string

concurrency:
  group: cross-lang-system-verification
  cancel-in-progress: false

env:
  COMMIT_SHA: ${{ inputs.commit-sha || github.sha }}

jobs:
  verify:
    name: ${{ matrix.test-lang }} tests vs ${{ matrix.arch }} ${{ matrix.system-lang }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      # Independent regression signals — one failing combo must not mask the others.
      fail-fast: false
      matrix:
        arch: [monolith, multitier]
        test-lang: [java, dotnet, typescript]
        system-lang: [java, dotnet, typescript]
        exclude:
          # Same-lang combos are covered by <arch>-<lang>-acceptance-stage.yml.
          - { test-lang: java,       system-lang: java }
          - { test-lang: dotnet,     system-lang: dotnet }
          - { test-lang: typescript, system-lang: typescript }
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ env.COMMIT_SHA }}

      - name: Setup Java
        if: matrix.test-lang == 'java'
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: temurin

      - name: Setup Gradle
        if: matrix.test-lang == 'java'
        uses: gradle/actions/setup-gradle@v6

      - name: Setup .NET
        if: matrix.test-lang == 'dotnet'
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Setup Node
        if: matrix.test-lang == 'typescript'
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install gh-optivem CLI extension
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh extension install optivem/gh-optivem

      - name: Build SUT (${{ matrix.system-lang }} ${{ matrix.arch }})
        run: gh optivem build system --system docker/${{ matrix.system-lang }}/${{ matrix.arch }}/system.json

      - name: Start SUT (${{ matrix.system-lang }} ${{ matrix.arch }})
        run: gh optivem run system --system docker/${{ matrix.system-lang }}/${{ matrix.arch }}/system.json

      - name: Export SUT URL env vars from system.json
        # Test code defaults to its own language's port set (3[1|2|3]xx). For cross-lang
        # runs the test process must point at the SUT's port set instead. Each loader
        # checks env vars after loading its config file; this step exports the 10
        # mode-suffixed URLs (5 keys × _REAL/_STUB) extracted from the SUT's system.json.
        # Tax is not in externalSystems but is colocated with ERP — derived by URL swap.
        run: |
          SYSTEM_JSON=docker/${{ matrix.system-lang }}/${{ matrix.arch }}/system.json
          for label in real stub; do
            SUFFIX=$(echo "$label" | tr '[:lower:]' '[:upper:]')
            UI_URL=$(jq -r --arg lbl "$label" '.systems[] | select(.label == $lbl) | .components[0].url' "$SYSTEM_JSON")
            API_URL=$(jq -r --arg lbl "$label" '.systems[] | select(.label == $lbl) | .components[1].url' "$SYSTEM_JSON" | sed 's|/health$||')
            ERP_URL=$(jq -r --arg lbl "$label" '.systems[] | select(.label == $lbl) | .externalSystems[] | select(.name | test("ERP")) | .url' "$SYSTEM_JSON" | sed 's|/health$||')
            CLOCK_URL=$(jq -r --arg lbl "$label" '.systems[] | select(.label == $lbl) | .externalSystems[] | select(.name | test("Clock")) | .url' "$SYSTEM_JSON" | sed 's|/health$||')
            TAX_URL=$(echo "$ERP_URL" | sed 's|/erp$|/tax|')
            {
              echo "MYSHOP_UI_BASE_URL_${SUFFIX}=${UI_URL}"
              echo "MYSHOP_API_BASE_URL_${SUFFIX}=${API_URL}"
              echo "ERP_API_BASE_URL_${SUFFIX}=${ERP_URL}"
              echo "CLOCK_API_BASE_URL_${SUFFIX}=${CLOCK_URL}"
              echo "TAX_API_BASE_URL_${SUFFIX}=${TAX_URL}"
            } >> "$GITHUB_ENV"
          done
          echo "::group::Exported URL env vars"
          grep -E '^(MYSHOP|ERP|CLOCK|TAX)_' "$GITHUB_ENV" || true
          echo "::endgroup::"

      - name: Run ${{ matrix.test-lang }} system tests vs ${{ matrix.system-lang }} SUT
        run: gh optivem test system --system docker/${{ matrix.system-lang }}/${{ matrix.arch }}/system.json --tests system-test/${{ matrix.test-lang }}/tests-latest.json

      - name: Stop SUT
        if: always()
        run: gh optivem stop system --system docker/${{ matrix.system-lang }}/${{ matrix.arch }}/system.json

  summary:
    # Aggregate headline for the run page. Per-row pass/fail is already visible
    # in the matrix table — this surfaces the "12/12 green" or "X failed" line at
    # the top of the run summary without needing to click into individual jobs.
    name: Cross-lang verification summary
    runs-on: ubuntu-latest
    needs: verify
    if: always()
    steps:
      - name: Aggregate result
        run: |
          {
            echo "## Cross-lang system verification"
            echo ""
            echo "**Aggregate:** ${{ needs.verify.result }}"
            echo ""
            echo "Per-combo pass/fail is visible in the matrix table on this run's page."
            echo "\`fail-fast\` is disabled — failing combos do not mask others."
          } >> "$GITHUB_STEP_SUMMARY"
          [[ "${{ needs.verify.result }}" == "success" ]] || exit 1
