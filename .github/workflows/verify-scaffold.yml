name: verify-scaffold

on:
  schedule:
    - cron: '0 6 * * *'  # Run daily at 06:00 UTC
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Configure Git Identity
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Authenticate GitHub CLI and Git
        run: |
          echo "${{ secrets.VERIFY_TOKEN }}" | gh auth login --with-token
          gh auth setup-git

      - name: Run Verification
        run: |
          cd scripts
          python verify.py --batch multirepo-quick --random-suffix
        env:
          DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GHCR_TOKEN: ${{ secrets.VERIFY_TOKEN }}

# TODO: Add --cleanup once we have a better way to track and clean up test resources. 