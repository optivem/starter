name: verify-scaffold

on:
  schedule:
    - cron: '0 6 * * *'  # Run daily at 06:00 UTC
  workflow_dispatch:

jobs:
  quick:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        batch: [monolith-quick, multitier-quick, multirepo-quick]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Configure Git Identity
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Authenticate GitHub CLI and Git
        run: |
          echo "${{ secrets.VERIFY_TOKEN }}" | gh auth login --with-token
          gh auth setup-git

      - name: Run Quick Verification (${{ matrix.batch }})
        run: |
          cd scripts
          python verify.py --batch ${{ matrix.batch }} --random-suffix
        env:
          DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GHCR_TOKEN: ${{ secrets.VERIFY_TOKEN }}

  full:
    needs: quick
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      max-parallel: 2
      matrix:
        batch:
          - monolith-monolang
          - monolith-multilang
          - multitier-monolang
          - multitier-multilang
          - multirepo-monolang
          - multirepo-multilang
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Configure Git Identity
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Authenticate GitHub CLI and Git
        run: |
          echo "${{ secrets.VERIFY_TOKEN }}" | gh auth login --with-token
          gh auth setup-git

      - name: Run Full Verification (${{ matrix.batch }})
        run: |
          cd scripts
          python verify.py --batch ${{ matrix.batch }} --random-suffix
        env:
          DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GHCR_TOKEN: ${{ secrets.VERIFY_TOKEN }}
