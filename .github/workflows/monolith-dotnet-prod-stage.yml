name: monolith-dotnet-prod-stage

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Prerelease version to deploy (e.g., v1.0.0-rc.1)'
        required: true
        type: string

concurrency:
  group: monolith-dotnet-prod-stage

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      image-urls: ${{ steps.resolve-images.outputs.image-urls }}
    steps:
      - name: Ensure Environment Variables Defined
        uses: optivem/actions/ensure-env-vars-defined@v1
        with:
          names: |
            DOCKERHUB_USERNAME
            DOCKERHUB_TOKEN
        env:
          DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Check RC Exists
        id: check-release
        uses: optivem/actions/ensure-tag-exists@v1
        with:
          tag: ${{ inputs.version }}

      - name: Check QA Approved
        uses: optivem/actions/ensure-tag-exists@v1
        with:
          tag: ${{ inputs.version }}-qa-approved

      - name: Generate Release Version
        id: release-version
        uses: optivem/actions/generate-release-version@v1
        with:
          prerelease-version: ${{ inputs.version }}

      - name: Verify Release Does Not Exist
        uses: optivem/actions/ensure-version-unreleased@v1
        with:
          version: ${{ steps.release-version.outputs.version }}

      - name: Resolve Artifacts
        id: resolve-images
        uses: optivem/actions/resolve-docker-images@v1
        with:
          tag: ${{ inputs.version }}
          base-image-urls: |
            ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}/monolith-system-dotnet

  run:
    needs: check
    if: needs.check.result == 'success'
    runs-on: ubuntu-latest
    environment: monolith-dotnet-production
    permissions:
      contents: write
      packages: write
    outputs:
      version: ${{ steps.promote.outputs.version }}
      image-urls: ${{ needs.check.outputs.image-urls }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Deploy System (Production Environment)
        id: deploy
        uses: optivem/actions/run-docker-compose@v1
        with:
          environment: production
          version: ${{ inputs.version }}
          image-urls: ${{ needs.check.outputs.image-urls }}
          compose-file: docker-compose.pipeline.monolith.real.yml
          systems: |
            [
              { "name": "Shop UI", "url": "http://localhost:3211/" },
              { "name": "Shop API", "url": "http://localhost:8211/health" },
              { "name": "ERP", "url": "http://localhost:9211/erp/health" },
              { "name": "Clock", "url": "http://localhost:9211/clock/health" }
            ]
          working-directory: system-test/dotnet

      - name: Promote RC (Production Deployed)
        id: promote
        uses: optivem/actions/create-release@v1
        with:
          version: ${{ inputs.version }}
          artifact-urls: ${{ needs.check.outputs.image-urls }}
          component-versions: |
            monolith-system-dotnet:system/monolith/dotnet/VERSION
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  summary:
    needs: [check, run]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v5

    - name: Log in to Docker Hub
      uses: docker/login-action@v4
      with:
        username: ${{ vars.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Summarize Stage
      uses: optivem/actions/summarize-system-stage@v1
      with:
        stage-name: 'Production Stage'
        environment: production
        stage-result: ${{ needs.run.result }}
        success-version: ${{ needs.run.outputs.version }}
        success-artifact-ids: ${{ needs.run.outputs.image-urls }}
