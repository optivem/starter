name: meta-prerelease-dry-run

run-name: >-
  meta-prerelease-dry-run${{ inputs.variant != 'all' && format(' [variant:{0}]', inputs.variant) || '' }}${{ inputs.skip-local && ' [skip-local]' || '' }}${{ inputs.skip-acceptance-legacy && ' [skip-acceptance-legacy]' || '' }}

on:
  workflow_dispatch:
    inputs:
      level:
        description: 'Verification level'
        required: false
        type: choice
        options:
          - local
          - commit
          - acceptance
          - qa
        default: 'qa'
      variant:
        description: 'Variant to run (all = full matrix; any single variant = dry-run; dry-runs do NOT produce a meta-rc tag)'
        required: false
        type: choice
        options:
          - all
          - monolith-java
          - monolith-dotnet
          - monolith-typescript
          - multitier-java
          - multitier-dotnet
          - multitier-typescript
        default: 'monolith-java'
      skip-local:
        description: 'Skip Phase 0 (local stages) for debugging — Phase 1 and Phase 2 still run if level permits'
        required: false
        type: boolean
        default: false
      skip-acceptance-legacy:
        description: 'Skip the legacy sample in local stages and the acceptance-stage-legacy job in Phase 2 (prevents meta-rc tagging)'
        required: false
        type: boolean
        default: false

# Shared concurrency group with meta-prerelease-stage so dry-runs and whole runs
# serialize rather than stepping on each other.
concurrency:
  group: meta-prerelease-stage
  cancel-in-progress: false

jobs:
  run:
    uses: ./.github/workflows/_meta-prerelease-pipeline.yml
    secrets: inherit
    with:
      level: ${{ inputs.level }}
      variant: ${{ inputs.variant }}
      skip-local: ${{ inputs.skip-local }}
      skip-acceptance-legacy: ${{ inputs.skip-acceptance-legacy }}
