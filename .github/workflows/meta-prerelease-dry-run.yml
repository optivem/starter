name: meta-prerelease-dry-run

run-name: >-
  meta-prerelease-dry-run${{ inputs.variant != 'all' && format(' [variant:{0}]', inputs.variant) || '' }}${{ inputs.skip-local && ' [skip-local]' || '' }}${{ inputs.skip-commit && ' [skip-commit]' || '' }}${{ inputs.skip-acceptance-legacy && ' [skip-acceptance-legacy]' || '' }}${{ !inputs.auto-trigger-stage && ' [no-auto-stage]' || '' }}

on:
  workflow_dispatch:
    inputs:
      level:
        description: 'Verification level'
        required: false
        type: choice
        options:
          - local
          - commit
          - acceptance
          - qa
        default: 'qa'
      variant:
        description: 'Variant to run (all = full matrix; any single variant = single-flavor run). This workflow never produces a meta-rc tag regardless of variant — `tag-meta-rc` lives in `meta-prerelease-stage.yml`, not in the shared pipeline this workflow invokes.'
        required: false
        type: choice
        options:
          - all
          - monolith-java
          - monolith-dotnet
          - monolith-typescript
          - multitier-java
          - multitier-dotnet
          - multitier-typescript
        default: 'monolith-typescript'
      skip-local:
        description: 'Skip Phase 0 (local stages) for debugging — Phase 1 and Phase 2 still run if level permits'
        required: false
        type: boolean
        default: true
      skip-commit:
        description: 'Skip Phase 1 (commit stages) — useful when iterating on workflow/test-only changes; Phase 2 reuses whatever images are already in GHCR'
        required: false
        type: boolean
        default: false
      skip-acceptance-legacy:
        description: 'Skip the legacy sample in local stages and the acceptance-stage-legacy job in Phase 2'
        required: false
        type: boolean
        default: true
      auto-trigger-stage:
        description: 'Automatically dispatch meta-prerelease-stage if the dry-run succeeds'
        required: false
        type: boolean
        default: true
      fail-fast:
        description: 'When true (default), the first failing matrix entry cancels its siblings. Set false to let every variant run to completion.'
        required: false
        type: boolean
        default: true
      pipeline-timeout-seconds:
        description: 'Hard timeout (seconds) for each Phase 2 variant pipeline run before giving up. Default 14400 (4h). Lower this when iterating on the dry-run to fail faster.'
        required: false
        type: string
        default: '14400'

# Shared concurrency group with meta-prerelease-stage so dry-runs and whole runs
# serialize rather than stepping on each other.
permissions: {}

concurrency:
  group: meta-prerelease-stage
  cancel-in-progress: false

jobs:
  run:
    uses: ./.github/workflows/_meta-prerelease-pipeline.yml
    secrets: inherit
    with:
      level: ${{ inputs.level }}
      variant: ${{ inputs.variant }}
      skip-local: ${{ inputs.skip-local }}
      skip-commit: ${{ inputs.skip-commit }}
      skip-acceptance-legacy: ${{ inputs.skip-acceptance-legacy }}
      fail-fast: ${{ inputs.fail-fast }}
      pipeline-timeout-seconds: ${{ inputs.pipeline-timeout-seconds }}

  # Fire-and-forget: on successful dry-run, dispatch the real meta-prerelease-stage.
  # Cannot trigger-and-wait because both workflows share the meta-prerelease-stage
  # concurrency group — waiting here would deadlock the stage run.
  trigger-stage:
    needs: run
    if: success() && inputs.auto-trigger-stage
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: |
            .github/workflows/scripts
          sparse-checkout-cone-mode: false
      - name: Dispatch meta-prerelease-stage
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          source "$GITHUB_WORKSPACE/.github/workflows/scripts/gh-retry.sh"
          gh_retry workflow run meta-prerelease-stage.yml --repo "${{ github.repository }}"
          {
            echo "## Dispatched meta-prerelease-stage"
            echo ""
            echo "- Trigger: dry-run succeeded"
            echo "- Target: [meta-prerelease-stage](https://github.com/${{ github.repository }}/actions/workflows/meta-prerelease-stage.yml)"
          } >> "$GITHUB_STEP_SUMMARY"
