name: multitier-java-acceptance-stage

on:
  schedule:
    - cron: '0 * * * *'  # Run every hour
  workflow_dispatch:
    inputs:
      commit-sha:
        description: 'Git SHA to test (leave empty for latest image)'
        required: false
        type: string

concurrency:
  group: multitier-java-acceptance-stage

env:
  COMMIT_SHA: ${{ inputs.commit-sha || github.sha }}

jobs:
  preflight:
    runs-on: ubuntu-latest
    permissions:
      packages: read
    outputs:
      artifacts-exist: ${{ steps.check-artifacts.outputs.exist }}
      skip-reason: ${{ steps.check-artifacts.outputs.exist != 'true' && 'No artifacts published yet — waiting for the commit stage to produce images.' || '' }}
    steps:
      - name: Check Container Packages Exist
        id: check-artifacts
        uses: optivem/actions/check-ghcr-packages-exist@v1
        with:
          image-urls: |
            ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}/multitier-frontend-react
            ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}/multitier-backend-java
          token: ${{ secrets.GHCR_TOKEN }}

  check:
    needs: preflight
    if: needs.preflight.outputs.artifacts-exist == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    outputs:
      should-run: ${{ steps.gate.outputs.should-run }}
      skip-reason: ${{ steps.gate.outputs.skip-reason }}
      image-digest-urls: ${{ steps.find-latest.outputs.image-digest-urls }}
      latest-updated-at: ${{ steps.find-latest.outputs.latest-updated-at }}
    steps:
      - name: Ensure Environment Variables Defined
        uses: optivem/actions/validate-env-vars-defined@v1
        with:
          names: |
            DOCKERHUB_USERNAME
            DOCKERHUB_TOKEN
            WORKFLOW_TOKEN
        env:
          DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          WORKFLOW_TOKEN: ${{ secrets.WORKFLOW_TOKEN }}

      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ env.COMMIT_SHA }}

      - name: Read Base Version
        id: read-base-version
        uses: optivem/actions/read-base-version@v1

      - name: Check System Release Already Published
        id: check-tag
        uses: optivem/actions/check-tag-exists@v1
        with:
          tag: multitier-java-v${{ steps.read-base-version.outputs.base-version }}

      - name: Log in to Docker Hub
        uses: Wandalen/wretry.action@v3
        with:
          action: docker/login-action@v4
          attempt_limit: 3
          attempt_delay: 10000
          with: |
            username: ${{ vars.DOCKERHUB_USERNAME }}
            password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        uses: Wandalen/wretry.action@v3
        with:
          action: docker/login-action@v4
          attempt_limit: 3
          attempt_delay: 10000
          with: |
            registry: ghcr.io
            username: ${{ github.repository_owner }}
            password: ${{ secrets.GHCR_TOKEN }}

      - name: Resolve Docker Image Digests
        id: find-latest
        uses: optivem/actions/resolve-docker-image-digests@v1
        with:
          base-image-urls: |
            ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}/multitier-frontend-react
            ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}/multitier-backend-java
          tag: ${{ inputs.commit-sha && format('sha-{0}', inputs.commit-sha) || 'latest' }}

      - name: Detect Source Changes Since Last RC
        id: changes
        uses: optivem/actions/check-changes-since-tag@v1
        with:
          tag-patterns: multitier-java-v*-rc.*
          paths: |
            system/multitier/backend-java
            system/multitier/frontend-react
            system-test/java
            docker/java/multitier
            .github/workflows/multitier-java-acceptance-stage.yml
            .github/workflows/multitier-backend-java-commit-stage.yml
            .github/workflows/multitier-frontend-react-commit-stage.yml
            :(exclude)system/multitier/backend-java/VERSION
            :(exclude)system/multitier/frontend-react/VERSION

      - name: Evaluate Run Gate
        id: gate
        uses: optivem/actions/evaluate-run-gate@v1
        with:
          skip-conditions: |
            [
              {"when": ${{ steps.check-tag.outputs.exists == 'true' }}, "reason": "Release in progress — version already tagged, awaiting post-release VERSION bump."},
              {"when": ${{ steps.changes.outputs.changed != 'true' }}, "reason": "No source changes since last RC tag (only VERSION bumps or unchanged)."}
            ]

  run:
    needs: check
    if: needs.check.outputs.should-run == 'true'
    runs-on: ubuntu-latest
    environment: multitier-java-acceptance
    permissions:
      contents: read
      packages: write
    outputs:
      version: ${{ steps.rc-version.outputs.version }}
      image-urls: ${{ steps.tag-images.outputs.tagged-image-urls }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ env.COMMIT_SHA }}

      - name: Log in to Docker Hub
        uses: Wandalen/wretry.action@v3
        with:
          action: docker/login-action@v4
          attempt_limit: 3
          attempt_delay: 10000
          with: |
            username: ${{ vars.DOCKERHUB_USERNAME }}
            password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        uses: Wandalen/wretry.action@v3
        with:
          action: docker/login-action@v4
          attempt_limit: 3
          attempt_delay: 10000
          with: |
            registry: ghcr.io
            username: ${{ github.repository_owner }}
            password: ${{ secrets.GHCR_TOKEN }}

      - name: Simulate Deployment (Real External Systems)
        uses: optivem/actions/deploy-docker-compose@v1
        with:
          environment: acceptance
          version: ${{ env.COMMIT_SHA }}
          image-urls: ${{ needs.check.outputs.image-digest-urls }}
          service-names: |
            frontend
            backend
          compose-file: docker-compose.pipeline.real.yml
          working-directory: docker/java/multitier

      - name: Wait for Systems (Simulate Deployment (Real External Systems))
        uses: optivem/actions/wait-for-endpoints@v1
        with:
          endpoints: |
            [
              { "name": "MyShop UI", "url": "http://localhost:3111/" },
              { "name": "MyShop API", "url": "http://localhost:8111/health" },
              { "name": "ERP", "url": "http://localhost:9111/erp/health" },
              { "name": "Clock", "url": "http://localhost:9111/clock/health" }
            ]
          compose-file: docker-compose.pipeline.real.yml
          working-directory: docker/java/multitier

      - name: Simulate Deployment (Stub External Systems)
        uses: optivem/actions/deploy-docker-compose@v1
        with:
          environment: acceptance
          version: ${{ env.COMMIT_SHA }}
          image-urls: ${{ needs.check.outputs.image-digest-urls }}
          service-names: |
            frontend
            backend
          compose-file: docker-compose.pipeline.stub.yml
          working-directory: docker/java/multitier

      - name: Wait for Systems (Simulate Deployment (Stub External Systems))
        uses: optivem/actions/wait-for-endpoints@v1
        with:
          endpoints: |
            [
              { "name": "MyShop UI", "url": "http://localhost:3112/" },
              { "name": "MyShop API", "url": "http://localhost:8112/health" },
              { "name": "ERP", "url": "http://localhost:9112/erp/health" },
              { "name": "Clock", "url": "http://localhost:9112/clock/health" }
            ]
          compose-file: docker-compose.pipeline.stub.yml
          working-directory: docker/java/multitier

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Pre-warm Gradle Wrapper (retry transient CDN flakes)
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 5
          max_attempts: 3
          command: cd system-test/java && ./gradlew --version

      - name: Cache Playwright Browsers
        id: cache-playwright
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('system-test/java/build.gradle') }}

      - name: Install Playwright Browsers
        timeout-minutes: 5
        if: steps.cache-playwright.outputs.cache-hit != 'true'
        run: npx playwright install chromium
        working-directory: system-test/java

      - name: Install Playwright System Dependencies
        timeout-minutes: 5
        run: npx playwright install-deps
        working-directory: system-test/java

      - name: Compile System Tests
        run: ./gradlew clean compileJava compileTestJava
        working-directory: system-test/java

      - name: Run Smoke Tests (Stub)
        run: ./gradlew test -Dversion=latest -Dtype=smoke -DexternalSystemMode=stub -Denvironment=acceptance
        working-directory: system-test/java

      - name: Run Smoke Tests (Real)
        run: ./gradlew test -Dversion=latest -Dtype=smoke -DexternalSystemMode=real -Denvironment=acceptance
        working-directory: system-test/java

      - name: Run Acceptance Tests - API Channel
        run: ./gradlew test -Dversion=latest -Dtype=acceptance -DexcludeTags=isolated -Dchannel=API -Denvironment=acceptance
        working-directory: system-test/java

      - name: Run Acceptance Tests - UI Channel
        run: ./gradlew test -Dversion=latest -Dtype=acceptance -DexcludeTags=isolated -Dchannel=UI -DchannelMode=static -Denvironment=acceptance
        working-directory: system-test/java

      - name: Run Acceptance Tests (Isolated) - API Channel
        run: ./gradlew test -Dversion=latest -Dtype=acceptance -DincludeTags=isolated -Dchannel=API -Denvironment=acceptance
        working-directory: system-test/java

      - name: Run Acceptance Tests (Isolated) - UI Channel
        run: ./gradlew test -Dversion=latest -Dtype=acceptance -DincludeTags=isolated -Dchannel=UI -DchannelMode=static -Denvironment=acceptance
        working-directory: system-test/java

      - name: Run Contract Tests (Stub)
        run: ./gradlew test -Dversion=latest -Dtype=contract -DexcludeTags=isolated -DexternalSystemMode=stub -Denvironment=acceptance
        working-directory: system-test/java

      - name: Run Contract Tests (Stub) (Isolated)
        run: ./gradlew test -Dversion=latest -Dtype=contract -DincludeTags=isolated -DexternalSystemMode=stub -Denvironment=acceptance
        working-directory: system-test/java

      - name: Run Contract Tests (Real)
        run: ./gradlew test -Dversion=latest -Dtype=contract -DexternalSystemMode=real -Denvironment=acceptance
        working-directory: system-test/java

      - name: Run E2E Tests - API Channel
        run: ./gradlew test -Dversion=latest -Dtype=e2e -Dchannel=API -Denvironment=acceptance
        working-directory: system-test/java

      - name: Run E2E Tests - UI Channel
        run: ./gradlew test -Dversion=latest -Dtype=e2e -Dchannel=UI -DchannelMode=static -Denvironment=acceptance
        working-directory: system-test/java

      - name: Read Base System Version
        id: read-version
        uses: optivem/actions/read-base-version@v1

      - name: Compose Prerelease Version
        id: rc-version
        uses: optivem/actions/compose-prerelease-version@v1
        with:
          base-version: ${{ steps.read-version.outputs.base-version }}
          suffix: rc
          build-number: ${{ github.run_number }}
          prefix: multitier-java

      - name: Tag Docker Images for Prerelease
        id: tag-images
        uses: optivem/actions/tag-docker-images@v1
        with:
          image-urls: ${{ needs.check.outputs.image-digest-urls }}
          tag: ${{ steps.rc-version.outputs.version }}
          registry-username: ${{ github.repository_owner }}
          token: ${{ secrets.GHCR_TOKEN }}

  publish-tag:
    needs: run
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          ref: ${{ env.COMMIT_SHA }}

      - name: Publish Git Tag
        uses: optivem/actions/publish-tag@v1
        with:
          tag: ${{ needs.run.outputs.version }}
          token: ${{ secrets.WORKFLOW_TOKEN }}

  sonar:
    needs: run
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ env.COMMIT_SHA }}

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Pre-warm Gradle Wrapper (retry transient CDN flakes)
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 5
          max_attempts: 3
          command: cd system-test/java && ./gradlew --version

      - name: Run Sonar Analysis
        working-directory: system-test/java
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: pwsh ./Run-Sonar.ps1

  summary:
    needs: [preflight, check, run, publish-tag, sonar]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
    - name: Summarize Stage
      uses: optivem/actions/render-system-stage-summary@v1
      with:
        stage-name: 'Acceptance Stage'
        stage-result: ${{ needs.publish-tag.result == 'failure' && 'failure' || needs.run.result }}
        environment: acceptance
        success-version: ${{ needs.run.outputs.version }}
        success-artifact-ids: ${{ needs.run.outputs.image-urls }}
        skipped-reason: ${{ needs.preflight.outputs.skip-reason || needs.check.outputs.skip-reason }}
        latest-artifact-ids: ${{ needs.check.outputs.image-digest-urls }}
        latest-updated-at: ${{ needs.check.outputs.latest-updated-at }}
