name: monolith-typescript-prod-stage-cloud

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Prerelease version to deploy (e.g., v1.0.0-rc.1)'
        required: true
        type: string

concurrency:
  group: monolith-typescript-prod-stage-cloud

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      image-urls: ${{ steps.resolve-images.outputs.image-urls }}
    steps:
      - name: Ensure Environment Variables Defined
        uses: optivem/actions/ensure-env-vars-defined@v1
        with:
          names: |
            DOCKERHUB_USERNAME
            DOCKERHUB_TOKEN
            GCP_PROJECT_ID
            GCP_REGION
            GCP_WORKLOAD_IDENTITY_PROVIDER
            GCP_SERVICE_ACCOUNT
            WORKFLOW_TOKEN
        env:
          DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          GCP_REGION: ${{ vars.GCP_REGION }}
          GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          GCP_SERVICE_ACCOUNT: ${{ vars.GCP_SERVICE_ACCOUNT }}
          WORKFLOW_TOKEN: ${{ secrets.WORKFLOW_TOKEN }}

      - name: Check RC Exists
        id: check-release
        uses: optivem/actions/ensure-tag-exists@v1
        with:
          tag: ${{ inputs.version }}

      - name: Check QA Approved
        uses: optivem/actions/ensure-tag-exists@v1
        with:
          tag: ${{ inputs.version }}-qa-approved

      - name: Generate Release Version
        id: release-version
        uses: optivem/actions/compose-release-version@v1
        with:
          prerelease-version: ${{ inputs.version }}

      - name: Verify Version Not Yet Released
        uses: optivem/actions/ensure-version-unreleased@v1
        with:
          version: ${{ steps.release-version.outputs.version }}

      - name: Compose Docker Image URLs
        id: resolve-images
        uses: optivem/actions/compose-docker-image-urls@v1
        with:
          tag: ${{ inputs.version }}
          base-image-urls: |
            ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}/monolith-system-typescript

  deploy-app:
    needs: check
    if: needs.check.result == 'success'
    runs-on: ubuntu-latest
    environment: monolith-typescript-production
    permissions:
      contents: read
      id-token: write
    outputs:
      app-url: ${{ steps.deploy.outputs.service-url }}
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Setup Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy App to Cloud Run
        id: deploy
        uses: optivem/actions/deploy-to-cloud-run@v1
        with:
          environment: production
          version: ${{ inputs.version }}
          image-url: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}/monolith-system-typescript:${{ inputs.version }}
          project-id: ${{ vars.GCP_PROJECT_ID }}
          region: ${{ vars.GCP_REGION }}
          service-name: monolith-typescript-production
          port: '8080'
          env-vars: |
            NODE_ENV=production
          secrets: |
            DATABASE_URL=db-connection-string:latest

  deploy-external-real:
    needs: check
    if: needs.check.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    outputs:
      external-url: ${{ steps.deploy.outputs.service-url }}
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Setup Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy External Real to Cloud Run
        id: deploy
        uses: optivem/actions/deploy-to-cloud-run@v1
        with:
          environment: production
          version: ${{ inputs.version }}
          image-url: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}/external-real-sim:latest
          project-id: ${{ vars.GCP_PROJECT_ID }}
          region: ${{ vars.GCP_REGION }}
          service-name: external-real-production
          port: '9000'

  promote:
    needs: [check, deploy-app, deploy-external-real]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    outputs:
      version: ${{ steps.promote.outputs.version }}
      image-urls: ${{ needs.check.outputs.image-urls }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.version }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate Release Version
        id: promote
        uses: optivem/actions/compose-release-version@v1
        with:
          prerelease-version: ${{ inputs.version }}

      - name: Tag Docker Images
        id: tag-images
        uses: optivem/actions/promote-docker-images@v1
        with:
          image-urls: ${{ needs.check.outputs.image-urls }}
          tag: ${{ steps.promote.outputs.version }}

      - name: Publish Release Tag
        uses: optivem/actions/publish-tag@v1
        with:
          tag: ${{ steps.promote.outputs.version }}
          token: ${{ secrets.WORKFLOW_TOKEN }}

      - name: Compose Release Notes
        id: release-notes
        uses: optivem/actions/compose-release-notes@v1
        with:
          base-version: ${{ inputs.version }}
          release-version: ${{ steps.promote.outputs.version }}
          environment: prod
          status: deployed
          artifact-urls: ${{ steps.tag-images.outputs.image-urls }}

      - name: Create GitHub Release
        uses: optivem/actions/create-github-release@v1
        with:
          tag: ${{ steps.promote.outputs.version }}
          title: ${{ steps.release-notes.outputs.title }}
          notes-file: ${{ steps.release-notes.outputs.notes-file }}
          is-prerelease: false

      - name: Create Component Tags
        uses: optivem/actions/create-component-tags@v1
        with:
          components: |
            monolith-system-typescript:system/monolith/typescript/VERSION
          token: ${{ secrets.WORKFLOW_TOKEN }}

  summary:
    needs: [check, promote]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v5

    - name: Log in to Docker Hub
      uses: docker/login-action@v4
      with:
        username: ${{ vars.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Summarize Stage
      uses: optivem/actions/render-system-stage-summary@v1
      with:
        stage-name: 'Production Stage (Cloud Run)'
        environment: production
        stage-result: ${{ needs.promote.result }}
        success-version: ${{ needs.promote.outputs.version }}
        success-artifact-ids: ${{ needs.promote.outputs.image-urls }}
