name: monolith-java-acceptance-stage

on:
  schedule:
    - cron: '0 * * * *'  # Run every hour
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git SHA to test (leave empty for latest image)'
        required: false
        type: string

concurrency:
  group: monolith-java-acceptance-stage

jobs:
  preflight:
    runs-on: ubuntu-latest
    permissions:
      packages: read
    outputs:
      artifacts-exist: ${{ steps.check-artifacts.outputs.exist }}
      skip-reason: ${{ steps.check-artifacts.outputs.exist != 'true' && 'No artifacts published yet — waiting for the commit stage to produce images.' || '' }}
    steps:
      - name: Check Container Packages Exist
        id: check-artifacts
        uses: optivem/actions/check-github-container-packages-exist@v1

  check:
    needs: preflight
    if: needs.preflight.outputs.artifacts-exist == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      should-run: ${{ steps.should-run.outputs.changed }}
      skip-reason: ${{ steps.should-run.outputs.changed != 'true' && 'No new artifacts since the last successful run.' || '' }}
      image-digest-urls: ${{ steps.find-latest.outputs.image-digest-urls }}
      latest-image-timestamp: ${{ steps.find-latest.outputs.latest-image-timestamp }}
      last-run-at: ${{ steps.should-run.outputs.last-run-at }}
    steps:
      - name: Ensure Environment Variables Defined
        uses: optivem/actions/ensure-env-vars-defined@v1
        with:
          names: |
            DOCKERHUB_USERNAME
            DOCKERHUB_TOKEN
        env:
          DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ inputs.ref || github.sha }}

      - name: Read Target Version
        id: read-target-version
        uses: optivem/actions/read-target-version@v1

      - name: Ensure Version Unreleased
        uses: optivem/actions/ensure-version-unreleased@v1
        with:
          version: monolith-java-v${{ steps.read-target-version.outputs.target-version }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Resolve Docker Image Digests
        id: find-latest
        uses: optivem/actions/resolve-docker-image-digests@v1
        with:
          image-urls: |
            ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}/monolith-system-java:${{ inputs.ref || 'latest' }}

      - name: Check for Docker Image Updates Since Last Run
        id: should-run
        uses: optivem/actions/has-update-since-last-github-workflow-run@v1
        with:
          last-updated-at: ${{ steps.find-latest.outputs.latest-image-timestamp }}
          workflow-name: ${{ github.workflow }}

  run:
    needs: check
    if: needs.check.outputs.should-run == 'true'
    runs-on: ubuntu-latest
    environment: monolith-java-acceptance
    permissions:
      contents: write
      packages: write
    outputs:
      version: ${{ steps.generate-version.outputs.version }}
      image-urls: ${{ steps.tag-images.outputs.image-urls }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ inputs.ref || github.sha }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Simulate Deployment (Real External Systems)
        uses: optivem/actions/deploy-docker-compose@v1
        with:
          environment: acceptance
          version: latest
          image-urls: ${{ needs.check.outputs.image-digest-urls }}
          compose-file: docker-compose.pipeline.monolith.real.yml
          working-directory: system-test/java

      - name: Wait for Systems (Simulate Deployment (Real External Systems))
        uses: optivem/actions/wait-for-urls@v1
        with:
          systems: |
            [
              { "name": "Shop UI", "url": "http://localhost:3111/" },
              { "name": "Shop API", "url": "http://localhost:8111/health" },
              { "name": "ERP", "url": "http://localhost:9111/erp/health" },
              { "name": "Clock", "url": "http://localhost:9111/clock/health" }
            ]
          compose-file: docker-compose.pipeline.monolith.real.yml
          working-directory: system-test/java

      - name: Simulate Deployment (Stub External Systems)
        uses: optivem/actions/deploy-docker-compose@v1
        with:
          environment: acceptance
          version: latest
          image-urls: ${{ needs.check.outputs.image-digest-urls }}
          compose-file: docker-compose.pipeline.monolith.stub.yml
          working-directory: system-test/java

      - name: Wait for Systems (Simulate Deployment (Stub External Systems))
        uses: optivem/actions/wait-for-urls@v1
        with:
          systems: |
            [
              { "name": "Shop UI", "url": "http://localhost:3112/" },
              { "name": "Shop API", "url": "http://localhost:8112/health" },
              { "name": "ERP", "url": "http://localhost:9112/erp/health" },
              { "name": "Clock", "url": "http://localhost:9112/clock/health" }
            ]
          compose-file: docker-compose.pipeline.monolith.stub.yml
          working-directory: system-test/java

      - name: Setup Java and Gradle
        uses: optivem/actions/setup-java-gradle@v1
        with:
          java-version: 21
          working-directory: system-test/java

      - name: Cache Playwright Browsers
        id: cache-playwright
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('system-test/java/build.gradle') }}

      - name: Install Playwright Browsers
        if: steps.cache-playwright.outputs.cache-hit != 'true'
        run: npx playwright install chromium
        working-directory: system-test/java

      - name: Install Playwright System Dependencies
        run: npx playwright install-deps chromium
        working-directory: system-test/java

      - name: Compile System Tests
        run: ./gradlew clean compileJava compileTestJava
        working-directory: system-test/java

      - name: Run Smoke Tests (Stub)
        run: ./gradlew test -Dversion=latest -Dtype=smoke -DexternalSystemMode=stub -Denvironment=acceptance
        working-directory: system-test/java

      - name: Run Smoke Tests (Real)
        run: ./gradlew test -Dversion=latest -Dtype=smoke -DexternalSystemMode=real -Denvironment=acceptance
        working-directory: system-test/java

      - name: Run Acceptance Tests - API Channel
        run: ./gradlew test -Dversion=latest -Dtype=acceptance -DexcludeTags=isolated -Dchannel=API -Denvironment=acceptance
        working-directory: system-test/java

      - name: Run Acceptance Tests - UI Channel
        run: ./gradlew test -Dversion=latest -Dtype=acceptance -DexcludeTags=isolated -Dchannel=UI -DchannelMode=static -Denvironment=acceptance
        working-directory: system-test/java

      - name: Run Acceptance Tests (Isolated) - API Channel
        run: ./gradlew test -Dversion=latest -Dtype=acceptance -DincludeTags=isolated -Dchannel=API -Denvironment=acceptance
        working-directory: system-test/java

      - name: Run Acceptance Tests (Isolated) - UI Channel
        run: ./gradlew test -Dversion=latest -Dtype=acceptance -DincludeTags=isolated -Dchannel=UI -DchannelMode=static -Denvironment=acceptance
        working-directory: system-test/java

      - name: Run Contract Tests (Stub)
        run: ./gradlew test -Dversion=latest -Dtype=contract -DexcludeTags=isolated -DexternalSystemMode=stub -Denvironment=acceptance
        working-directory: system-test/java

      - name: Run Contract Tests (Isolated) (Stub)
        run: ./gradlew test -Dversion=latest -Dtype=contract -DincludeTags=isolated -DexternalSystemMode=stub -Denvironment=acceptance
        working-directory: system-test/java

      - name: Run Contract Tests (Real)
        run: ./gradlew test -Dversion=latest -Dtype=contract -DexternalSystemMode=real -Denvironment=acceptance
        working-directory: system-test/java

      - name: Run E2E Tests - API Channel
        run: ./gradlew test -Dversion=latest -Dtype=e2e -Dchannel=API -Denvironment=acceptance
        working-directory: system-test/java

      - name: Run E2E Tests - UI Channel
        run: ./gradlew test -Dversion=latest -Dtype=e2e -Dchannel=UI -DchannelMode=static -Denvironment=acceptance
        working-directory: system-test/java

      - name: Read System Target Version
        id: read-version
        uses: optivem/actions/read-target-version@v1

      - name: Generate Prerelease Version
        id: generate-version
        uses: optivem/actions/generate-prerelease-version@v1
        with:
          target-version: ${{ steps.read-version.outputs.target-version }}
          prefix: monolith-java

      - name: Tag Docker Images for Prerelease
        id: tag-images
        uses: optivem/actions/tag-docker-images@v1
        with:
          image-urls: ${{ needs.check.outputs.image-digest-urls }}
          tag: ${{ steps.generate-version.outputs.version }}

      - name: Create and Push Git Tag
        uses: optivem/actions/create-and-push-tag@v1
        with:
          tag: ${{ steps.generate-version.outputs.version }}
          sha: ${{ inputs.ref || github.sha }}

  summary:
    needs: [preflight, check, run]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
    - name: Summarize Stage
      uses: optivem/actions/compose-system-stage-summary@v1
      with:
        stage-name: 'Acceptance Stage'
        environment: acceptance
        stage-result: ${{ needs.run.result }}
        success-version: ${{ needs.run.outputs.version }}
        success-artifact-ids: ${{ needs.run.outputs.image-urls }}
        skipped-reason: ${{ needs.preflight.outputs.skip-reason || needs.check.outputs.skip-reason }}
        latest-artifact-ids: ${{ needs.check.outputs.image-digest-urls }}
        latest-updated-at: ${{ needs.check.outputs.latest-image-timestamp }}
        last-run-at: ${{ needs.check.outputs.last-run-at }}
