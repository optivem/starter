name: monolith-typescript-acceptance-stage-cloud

on:
  workflow_dispatch:

concurrency:
  group: monolith-typescript-acceptance-stage-cloud

jobs:
  preflight:
    runs-on: ubuntu-latest
    permissions:
      packages: read
    outputs:
      artifacts-exist: ${{ steps.check-artifacts.outputs.exist }}
      skip-reason: ${{ steps.check-artifacts.outputs.exist != 'true' && 'No artifacts published yet — waiting for the commit stage to produce images.' || '' }}
    steps:
      - name: Check Container Packages Exist
        id: check-artifacts
        uses: optivem/actions/check-ghcr-packages-exist@v1

  check:
    needs: preflight
    if: needs.preflight.outputs.artifacts-exist == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      should-run: ${{ steps.should-run.outputs.changed }}
      skip-reason: ${{ steps.should-run.outputs.changed != 'true' && 'No new artifacts since the last successful run.' || '' }}
      image-digest-urls: ${{ steps.find-latest.outputs.image-digest-urls }}
      latest-updated-at: ${{ steps.find-latest.outputs.latest-updated-at }}
      last-run-at: ${{ steps.should-run.outputs.last-run-at }}
    steps:
      - name: Ensure Environment Variables Defined
        uses: optivem/actions/ensure-env-vars-defined@v1
        with:
          names: |
            DOCKERHUB_USERNAME
            DOCKERHUB_TOKEN
            GCP_PROJECT_ID
            GCP_REGION
            GCP_WORKLOAD_IDENTITY_PROVIDER
            GCP_SERVICE_ACCOUNT
        env:
          DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          GCP_REGION: ${{ vars.GCP_REGION }}
          GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          GCP_SERVICE_ACCOUNT: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Resolve Docker Image Digests
        id: find-latest
        uses: optivem/actions/resolve-docker-image-digests@v1
        with:
          image-urls: |
            ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}/monolith-system-typescript:latest

      - name: Check for Docker Image Updates Since Last Run
        id: should-run
        uses: optivem/actions/check-update-since-last-github-workflow-run@v1
        with:
          last-updated-at: ${{ steps.find-latest.outputs.latest-updated-at }}
          workflow-name: ${{ github.workflow }}

  deploy-app:
    needs: check
    if: needs.check.outputs.should-run == 'true'
    runs-on: ubuntu-latest
    environment: monolith-typescript-acceptance
    permissions:
      contents: read
      id-token: write
    outputs:
      app-url: ${{ steps.deploy.outputs.service-url }}
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Setup Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy App to Cloud Run
        id: deploy
        uses: optivem/actions/deploy-to-cloud-run@v1
        with:
          environment: acceptance
          version: latest
          image-url: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}/monolith-system-typescript:latest
          project-id: ${{ vars.GCP_PROJECT_ID }}
          region: ${{ vars.GCP_REGION }}
          service-name: monolith-typescript-acceptance
          port: '8080'
          env-vars: |
            NODE_ENV=production
          secrets: |
            DATABASE_URL=db-connection-string:latest

  deploy-external-real:
    needs: check
    if: needs.check.outputs.should-run == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    outputs:
      external-url: ${{ steps.deploy.outputs.service-url }}
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Setup Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy External Real to Cloud Run
        id: deploy
        uses: optivem/actions/deploy-to-cloud-run@v1
        with:
          environment: acceptance
          version: latest
          image-url: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}/external-real-sim:latest
          project-id: ${{ vars.GCP_PROJECT_ID }}
          region: ${{ vars.GCP_REGION }}
          service-name: external-real-acceptance
          port: '9000'

  deploy-external-stub:
    needs: check
    if: needs.check.outputs.should-run == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    outputs:
      external-url: ${{ steps.deploy.outputs.service-url }}
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Setup Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy External Stub to Cloud Run
        id: deploy
        uses: optivem/actions/deploy-to-cloud-run@v1
        with:
          environment: acceptance
          version: latest
          image-url: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}/external-stub:latest
          project-id: ${{ vars.GCP_PROJECT_ID }}
          region: ${{ vars.GCP_REGION }}
          service-name: external-stub-acceptance
          port: '8080'

  test-smoke-real:
    needs: [deploy-app, deploy-external-real]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Node
        uses: optivem/actions/setup-node@v1
        with:
          node-version: 22.x
          working-directory: system-test/typescript

      - name: Cache Playwright Browsers
        id: cache-playwright
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('system-test/typescript/package-lock.json') }}

      - name: Install Playwright Browsers
        if: steps.cache-playwright.outputs.cache-hit != 'true'
        working-directory: system-test/typescript
        run: npx playwright install chromium

      - name: Install Playwright System Dependencies
        working-directory: system-test/typescript
        run: npx playwright install-deps chromium

      - name: Run Smoke Tests (Real)
        working-directory: system-test/typescript
        run: npx playwright test --project=smoke-test tests/latest/smoke
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: real
          BASE_URL: ${{ needs.deploy-app.outputs.app-url }}
          EXTERNAL_BASE_URL: ${{ needs.deploy-external-real.outputs.external-url }}

  test-smoke-stub:
    needs: [deploy-app, deploy-external-stub]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Node
        uses: optivem/actions/setup-node@v1
        with:
          node-version: 22.x
          working-directory: system-test/typescript

      - name: Cache Playwright Browsers
        id: cache-playwright
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('system-test/typescript/package-lock.json') }}

      - name: Install Playwright Browsers
        if: steps.cache-playwright.outputs.cache-hit != 'true'
        working-directory: system-test/typescript
        run: npx playwright install chromium

      - name: Install Playwright System Dependencies
        working-directory: system-test/typescript
        run: npx playwright install-deps chromium

      - name: Run Smoke Tests (Stub)
        working-directory: system-test/typescript
        run: npx playwright test --project=smoke-test tests/latest/smoke
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: stub
          BASE_URL: ${{ needs.deploy-app.outputs.app-url }}
          EXTERNAL_BASE_URL: ${{ needs.deploy-external-stub.outputs.external-url }}

  test-acceptance-api:
    needs: [deploy-app, deploy-external-real]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Node
        uses: optivem/actions/setup-node@v1
        with:
          node-version: 22.x
          working-directory: system-test/typescript

      - name: Run Acceptance Tests - API Channel
        working-directory: system-test/typescript
        run: npx playwright test --project=acceptance-test tests/latest/acceptance --grep-invert "@isolated"
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: stub
          CHANNEL: api
          BASE_URL: ${{ needs.deploy-app.outputs.app-url }}
          EXTERNAL_BASE_URL: ${{ needs.deploy-external-real.outputs.external-url }}

  test-acceptance-ui:
    needs: [deploy-app, deploy-external-real]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Node
        uses: optivem/actions/setup-node@v1
        with:
          node-version: 22.x
          working-directory: system-test/typescript

      - name: Cache Playwright Browsers
        id: cache-playwright
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('system-test/typescript/package-lock.json') }}

      - name: Install Playwright Browsers
        if: steps.cache-playwright.outputs.cache-hit != 'true'
        working-directory: system-test/typescript
        run: npx playwright install chromium

      - name: Install Playwright System Dependencies
        working-directory: system-test/typescript
        run: npx playwright install-deps chromium

      - name: Run Acceptance Tests - UI Channel
        working-directory: system-test/typescript
        run: npx playwright test --project=acceptance-test tests/latest/acceptance --grep-invert "@isolated"
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: stub
          CHANNEL: ui
          CHANNEL_MODE: static
          BASE_URL: ${{ needs.deploy-app.outputs.app-url }}
          EXTERNAL_BASE_URL: ${{ needs.deploy-external-real.outputs.external-url }}

  test-acceptance-isolated-api:
    needs: [deploy-app, deploy-external-real]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Node
        uses: optivem/actions/setup-node@v1
        with:
          node-version: 22.x
          working-directory: system-test/typescript

      - name: Run Acceptance Tests (Isolated) - API Channel
        working-directory: system-test/typescript
        run: npx playwright test --project=acceptance-test tests/latest/acceptance --grep "@isolated" --workers=1
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: stub
          CHANNEL: api
          BASE_URL: ${{ needs.deploy-app.outputs.app-url }}
          EXTERNAL_BASE_URL: ${{ needs.deploy-external-real.outputs.external-url }}

  test-acceptance-isolated-ui:
    needs: [deploy-app, deploy-external-real]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Node
        uses: optivem/actions/setup-node@v1
        with:
          node-version: 22.x
          working-directory: system-test/typescript

      - name: Cache Playwright Browsers
        id: cache-playwright
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('system-test/typescript/package-lock.json') }}

      - name: Install Playwright Browsers
        if: steps.cache-playwright.outputs.cache-hit != 'true'
        working-directory: system-test/typescript
        run: npx playwright install chromium

      - name: Install Playwright System Dependencies
        working-directory: system-test/typescript
        run: npx playwright install-deps chromium

      - name: Run Acceptance Tests (Isolated) - UI Channel
        working-directory: system-test/typescript
        run: npx playwright test --project=acceptance-test tests/latest/acceptance --grep "@isolated" --workers=1
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: stub
          CHANNEL: ui
          CHANNEL_MODE: static
          BASE_URL: ${{ needs.deploy-app.outputs.app-url }}
          EXTERNAL_BASE_URL: ${{ needs.deploy-external-real.outputs.external-url }}

  test-contract-stub:
    needs: [deploy-app, deploy-external-stub]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Node
        uses: optivem/actions/setup-node@v1
        with:
          node-version: 22.x
          working-directory: system-test/typescript

      - name: Run Contract Tests (Stub)
        working-directory: system-test/typescript
        run: npx playwright test --project=external-system-contract-test tests/latest/contract --grep-invert "@isolated" --workers=1
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: stub
          BASE_URL: ${{ needs.deploy-app.outputs.app-url }}
          EXTERNAL_BASE_URL: ${{ needs.deploy-external-stub.outputs.external-url }}

  test-contract-isolated-stub:
    needs: [deploy-app, deploy-external-stub]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Node
        uses: optivem/actions/setup-node@v1
        with:
          node-version: 22.x
          working-directory: system-test/typescript

      - name: Run Contract Tests (Isolated) (Stub)
        working-directory: system-test/typescript
        run: npx playwright test --project=external-system-contract-test tests/latest/contract --grep "@isolated" --workers=1
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: stub
          BASE_URL: ${{ needs.deploy-app.outputs.app-url }}
          EXTERNAL_BASE_URL: ${{ needs.deploy-external-stub.outputs.external-url }}

  test-contract-real:
    needs: [deploy-app, deploy-external-real]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Node
        uses: optivem/actions/setup-node@v1
        with:
          node-version: 22.x
          working-directory: system-test/typescript

      - name: Run Contract Tests (Real)
        working-directory: system-test/typescript
        run: npx playwright test --project=external-system-contract-test "tests/latest/contract/.*-real-.*\.spec\.ts" --workers=1
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: real
          BASE_URL: ${{ needs.deploy-app.outputs.app-url }}
          EXTERNAL_BASE_URL: ${{ needs.deploy-external-real.outputs.external-url }}

  test-e2e-api:
    needs: [deploy-app, deploy-external-real]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Node
        uses: optivem/actions/setup-node@v1
        with:
          node-version: 22.x
          working-directory: system-test/typescript

      - name: Run E2E Tests - API Channel
        working-directory: system-test/typescript
        run: npx playwright test --project=e2e-test tests/latest/e2e
        env:
          ENVIRONMENT: acceptance
          CHANNEL: api
          BASE_URL: ${{ needs.deploy-app.outputs.app-url }}
          EXTERNAL_BASE_URL: ${{ needs.deploy-external-real.outputs.external-url }}

  test-e2e-ui:
    needs: [deploy-app, deploy-external-real]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Node
        uses: optivem/actions/setup-node@v1
        with:
          node-version: 22.x
          working-directory: system-test/typescript

      - name: Cache Playwright Browsers
        id: cache-playwright
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('system-test/typescript/package-lock.json') }}

      - name: Install Playwright Browsers
        if: steps.cache-playwright.outputs.cache-hit != 'true'
        working-directory: system-test/typescript
        run: npx playwright install chromium

      - name: Install Playwright System Dependencies
        working-directory: system-test/typescript
        run: npx playwright install-deps chromium

      - name: Run E2E Tests - UI Channel
        working-directory: system-test/typescript
        run: npx playwright test --project=e2e-test tests/latest/e2e
        env:
          ENVIRONMENT: acceptance
          CHANNEL: ui
          CHANNEL_MODE: static
          BASE_URL: ${{ needs.deploy-app.outputs.app-url }}
          EXTERNAL_BASE_URL: ${{ needs.deploy-external-real.outputs.external-url }}

  promote:
    needs: [check, deploy-app, test-smoke-real, test-smoke-stub, test-acceptance-api, test-acceptance-ui, test-acceptance-isolated-api, test-acceptance-isolated-ui, test-contract-stub, test-contract-isolated-stub, test-contract-real, test-e2e-api, test-e2e-ui]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      version: ${{ steps.generate-version.outputs.version }}
      image-urls: ${{ steps.tag-images.outputs.image-urls }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Read Target System Version
        id: read-version
        uses: optivem/actions/read-target-version@v1

      - name: Generate Prerelease Version
        id: generate-version
        uses: optivem/actions/compose-prerelease-version@v1
        with:
          target-version: ${{ steps.read-version.outputs.target-version }}
          suffix: rc
          number: ${{ github.run_number }}
          prefix: monolith-typescript-cloud

      - name: Tag Docker Images for Prerelease
        id: tag-images
        uses: optivem/actions/promote-docker-images@v1
        with:
          image-urls: ${{ needs.check.outputs.image-digest-urls }}
          tag: ${{ steps.generate-version.outputs.version }}

  publish-tag:
    needs: promote
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Publish Git Tag
        uses: optivem/actions/publish-tag@v1
        with:
          tag: ${{ needs.promote.outputs.version }}
          token: ${{ secrets.WORKFLOW_TOKEN }}

  summary:
    needs: [preflight, check, promote, publish-tag]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
    - name: Summarize Stage
      uses: optivem/actions/render-system-stage-summary@v1
      with:
        stage-name: 'Acceptance Stage (Cloud Run)'
        environment: acceptance
        stage-result: ${{ needs.publish-tag.result == 'failure' && 'failure' || needs.promote.result }}
        success-version: ${{ needs.promote.outputs.version }}
        success-artifact-ids: ${{ needs.promote.outputs.image-urls }}
        skipped-reason: ${{ needs.preflight.outputs.skip-reason || needs.check.outputs.skip-reason }}
        latest-artifact-ids: ${{ needs.check.outputs.image-digest-urls }}
        latest-updated-at: ${{ needs.check.outputs.latest-updated-at }}
        last-run-at: ${{ needs.check.outputs.last-run-at }}
