name: _meta-prerelease-pipeline

on:
  workflow_call:
    inputs:
      level:
        description: 'Verification level: local, commit, acceptance, or qa'
        required: false
        type: string
        default: 'qa'
      variant:
        description: 'Variant to run (all = full matrix; any single variant = dry-run; dry-runs do NOT produce a meta-rc tag)'
        required: false
        type: string
        default: 'all'
      skip-local:
        description: 'Skip Phase 0 (local stages) for debugging — Phase 1 and Phase 2 still run if level permits'
        required: false
        type: boolean
        default: false
      skip-acceptance-legacy:
        description: 'Skip the legacy sample in local stages and the acceptance-stage-legacy job in Phase 2'
        required: false
        type: boolean
        default: false
      is-release-run:
        description: 'When true, tag-meta-rc runs on success and produces a meta-rc tag (which triggers meta-release-stage). Dry-run callers must leave this false to prevent accidentally promoting a dry-run to production.'
        required: false
        type: boolean
        default: false

jobs:
  # Single gate before any downstream jobs:
  #   1. Print inputs for visibility.
  #   2. On scheduled runs, skip the pipeline if nothing meaningful has changed since
  #      the last build — comparing HEAD against the latest meta-rc at this VERSION
  #      (falling back to the latest meta-v release). Only changes under
  #      .github/workflows/, system/, or system-test/ count as meaningful; VERSION
  #      bumps, docs, plans, and reports do not. workflow_dispatch always proceeds.
  #   3. Fail fast if any VERSION file's version has already been released.
  #      Each VERSION file has one release signal (matching bump-versions.yml):
  #      top-level VERSION probes the meta GitHub Release; every other VERSION
  #      file probes its corresponding GHCR image tag. Otherwise we'd only
  #      discover the collision deep into the downstream pipeline acceptance stages.
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      should_run: ${{ steps.decide.outputs.should_run }}
    steps:
      - name: Print input parameters
        run: |
          echo "=== Workflow Inputs ==="
          echo "Level: ${{ inputs.level }}"
          echo "Variant: ${{ inputs.variant }}"
          echo "Skip local: ${{ inputs.skip-local }}"
          echo "Skip acceptance-legacy: ${{ inputs.skip-acceptance-legacy }}"
          echo "Triggered by: ${{ github.event_name }} ${{ github.event.schedule }}"
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Read VERSION
        id: version
        shell: bash
        run: echo "value=$(tr -d '[:space:]' < VERSION)" >> "$GITHUB_OUTPUT"
      - name: Detect meaningful changes since last build
        id: changes
        uses: optivem/actions/check-changes-since-tag@v1
        with:
          tag-patterns: |
            meta-v${{ steps.version.outputs.value }}-rc.*
            meta-v[0-9]*.[0-9]*.[0-9]*
          paths: |
            .github/workflows/
            system/
            system-test/
      - name: Decide whether to run
        id: decide
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          CHANGED: ${{ steps.changes.outputs.changed }}
          BASELINE_TAG: ${{ steps.changes.outputs.baseline-tag }}
          CHANGED_FILES: ${{ steps.changes.outputs.changed-files }}
        run: |
          set -euo pipefail
          if [[ "$EVENT_NAME" != "schedule" ]]; then
            echo "Triggered by $EVENT_NAME — always run."
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "$CHANGED" == "true" ]]; then
            echo "Meaningful changes detected — running pipeline."
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            TAG_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/releases/tag/${BASELINE_TAG}"
            {
              echo "## Skipped — no meaningful changes"
              echo ""
              echo "No changes in \`.github/workflows/\`, \`system/\`, or \`system-test/\` since [\`${BASELINE_TAG}\`](${TAG_URL})."
              echo ""
              echo "Runs again on next schedule tick, or trigger manually via workflow_dispatch to force a rebuild."
            } >> "$GITHUB_STEP_SUMMARY"
            echo "No meaningful changes — skipping run."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Read VERSION values
        id: read-versions
        if: ${{ steps.decide.outputs.should_run == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "meta=$(tr -d '[:space:]' < VERSION)"
            echo "mono_dotnet=$(tr -d '[:space:]' < system/monolith/dotnet/VERSION)"
            echo "mono_java=$(tr -d '[:space:]' < system/monolith/java/VERSION)"
            echo "mono_typescript=$(tr -d '[:space:]' < system/monolith/typescript/VERSION)"
            echo "mt_be_dotnet=$(tr -d '[:space:]' < system/multitier/backend-dotnet/VERSION)"
            echo "mt_be_java=$(tr -d '[:space:]' < system/multitier/backend-java/VERSION)"
            echo "mt_be_typescript=$(tr -d '[:space:]' < system/multitier/backend-typescript/VERSION)"
            echo "mt_fe_react=$(tr -d '[:space:]' < system/multitier/frontend-react/VERSION)"
          } >> "$GITHUB_OUTPUT"

      - name: Probe Meta System Release
        id: probe-release
        if: ${{ steps.decide.outputs.should_run == 'true' }}
        uses: optivem/actions/check-tag-exists@v1
        with:
          tag: meta-v${{ steps.read-versions.outputs.meta }}

      - name: Probe Component + Monolith Image Tags
        id: probe-images
        if: ${{ steps.decide.outputs.should_run == 'true' }}
        uses: optivem/actions/check-ghcr-image-tag-exists@v1
        with:
          images: |
            [
              {"key": "monolith-system-dotnet:v${{ steps.read-versions.outputs.mono_dotnet }} (from system/monolith/dotnet/VERSION)",         "image-url": "ghcr.io/${{ github.repository }}/monolith-system-dotnet",         "tag": "v${{ steps.read-versions.outputs.mono_dotnet }}"},
              {"key": "monolith-system-java:v${{ steps.read-versions.outputs.mono_java }} (from system/monolith/java/VERSION)",               "image-url": "ghcr.io/${{ github.repository }}/monolith-system-java",           "tag": "v${{ steps.read-versions.outputs.mono_java }}"},
              {"key": "monolith-system-typescript:v${{ steps.read-versions.outputs.mono_typescript }} (from system/monolith/typescript/VERSION)", "image-url": "ghcr.io/${{ github.repository }}/monolith-system-typescript", "tag": "v${{ steps.read-versions.outputs.mono_typescript }}"},
              {"key": "multitier-backend-dotnet:v${{ steps.read-versions.outputs.mt_be_dotnet }} (from system/multitier/backend-dotnet/VERSION)",     "image-url": "ghcr.io/${{ github.repository }}/multitier-backend-dotnet",     "tag": "v${{ steps.read-versions.outputs.mt_be_dotnet }}"},
              {"key": "multitier-backend-java:v${{ steps.read-versions.outputs.mt_be_java }} (from system/multitier/backend-java/VERSION)",           "image-url": "ghcr.io/${{ github.repository }}/multitier-backend-java",       "tag": "v${{ steps.read-versions.outputs.mt_be_java }}"},
              {"key": "multitier-backend-typescript:v${{ steps.read-versions.outputs.mt_be_typescript }} (from system/multitier/backend-typescript/VERSION)", "image-url": "ghcr.io/${{ github.repository }}/multitier-backend-typescript", "tag": "v${{ steps.read-versions.outputs.mt_be_typescript }}"},
              {"key": "multitier-frontend-react:v${{ steps.read-versions.outputs.mt_fe_react }} (from system/multitier/frontend-react/VERSION)",       "image-url": "ghcr.io/${{ github.repository }}/multitier-frontend-react",     "tag": "v${{ steps.read-versions.outputs.mt_fe_react }}"}
            ]

      - name: Verify System Release + Component Images Not Yet Published
        if: ${{ steps.decide.outputs.should_run == 'true' }}
        shell: bash
        env:
          META_EXISTS: ${{ steps.probe-release.outputs.exists }}
          META_KEY: meta-v${{ steps.read-versions.outputs.meta }} (from VERSION)
          IMAGE_RESULTS: ${{ steps.probe-images.outputs.results }}
        run: |
          set -euo pipefail
          found=$(jq -c '[.[] | select(.exists == true) | .key]' <<< "$IMAGE_RESULTS")
          if [[ "$META_EXISTS" == "true" ]]; then
            found=$(jq -c --arg k "$META_KEY" '. + [$k]' <<< "$found")
          fi
          if [[ "$(jq 'length' <<< "$found")" -gt 0 ]]; then
            BUMP_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/workflows/auto-bump-patch.yml"
            {
              echo "## Version already released"
              echo ""
              echo "The following artifacts already exist:"
              echo ""
              jq -r '.[] | "- `\(.)`"' <<< "$found"
              echo ""
              echo "Run the [auto-bump-patch workflow](${BUMP_URL}) to bump VERSION files, then re-run this workflow."
            } >> "$GITHUB_STEP_SUMMARY"
            found_flat=$(jq -r 'join(", ")' <<< "$found")
            echo "::error::Version already released: ${found_flat}. Run the auto-bump-patch workflow to bump VERSION files, then re-run this workflow: ${BUMP_URL}"
            exit 1
          fi
          echo "All artifacts available for current VERSION values across meta + monoliths + components. OK to proceed."

  # Phase 0: Run all local stages in parallel. fail-fast cancels siblings on first failure.
  local:
    needs: check
    if: ${{ needs.check.outputs.should_run == 'true' && !inputs.skip-local }}
    strategy:
      fail-fast: true
      matrix:
        variant: [monolith-java, monolith-dotnet, monolith-typescript, multitier-java, multitier-dotnet, multitier-typescript]
    runs-on: ubuntu-latest
    steps:
      - if: ${{ inputs.variant == 'all' || inputs.variant == matrix.variant }}
        uses: optivem/actions/trigger-and-wait-for-github-workflow@v1
        with:
          workflow: prerelease-pipeline-${{ matrix.variant }}.yml
          workflow-inputs: '{"level": "local", "skip-commit-stage": "true", "skip-acceptance-legacy": "${{ inputs.skip-acceptance-legacy }}", "commit-sha": "${{ github.sha }}"}'

  # Phase 1: Run all commit stages in parallel (deduplicated — frontend-react is shared
  # across multitier variants). fail-fast cancels siblings on first failure.
  commit:
    needs: local
    if: ${{ always() && !failure() && !cancelled() && contains(fromJSON('["commit","acceptance","qa"]'), inputs.level) }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - stage: monolith-java
            workflow: monolith-java-commit-stage.yml
            variants: '["all","monolith-java"]'
          - stage: monolith-dotnet
            workflow: monolith-dotnet-commit-stage.yml
            variants: '["all","monolith-dotnet"]'
          - stage: monolith-typescript
            workflow: monolith-typescript-commit-stage.yml
            variants: '["all","monolith-typescript"]'
          - stage: multitier-backend-java
            workflow: multitier-backend-java-commit-stage.yml
            variants: '["all","multitier-java"]'
          - stage: multitier-backend-dotnet
            workflow: multitier-backend-dotnet-commit-stage.yml
            variants: '["all","multitier-dotnet"]'
          - stage: multitier-backend-typescript
            workflow: multitier-backend-typescript-commit-stage.yml
            variants: '["all","multitier-typescript"]'
          - stage: multitier-frontend-react
            workflow: multitier-frontend-react-commit-stage.yml
            variants: '["all","multitier-java","multitier-dotnet","multitier-typescript"]'
    runs-on: ubuntu-latest
    steps:
      - if: ${{ contains(fromJSON(matrix.variants), inputs.variant) }}
        uses: optivem/actions/trigger-and-wait-for-github-workflow@v1
        with:
          workflow: ${{ matrix.workflow }}
          workflow-inputs: '{"commit-sha": "${{ github.sha }}"}'

  # Phase 2: Run all pipelines in parallel. Each pipeline produces RC tags namespaced
  # by its prefix (e.g. monolith-java-v1.0.0-rc.N), so there are no shared-counter collisions.
  # fail-fast cancels siblings on first failure.
  pipeline:
    needs: commit
    if: ${{ always() && !failure() && !cancelled() && contains(fromJSON('["acceptance","qa"]'), inputs.level) }}
    strategy:
      fail-fast: true
      matrix:
        variant: [monolith-java, monolith-dotnet, monolith-typescript, multitier-java, multitier-dotnet, multitier-typescript]
    runs-on: ubuntu-latest
    steps:
      - if: ${{ inputs.variant == 'all' || inputs.variant == matrix.variant }}
        uses: optivem/actions/trigger-and-wait-for-github-workflow@v1
        with:
          workflow: prerelease-pipeline-${{ matrix.variant }}.yml
          timeout-seconds: '14400'
          workflow-inputs: '{"level": "${{ inputs.level }}", "skip-local-stage": "true", "skip-commit-stage": "true", "skip-acceptance-legacy": "${{ inputs.skip-acceptance-legacy }}", "commit-sha": "${{ github.sha }}"}'

  # Final: tag SHA as meta-rc — only when the caller opts in via is-release-run AND
  # level is qa, variant is all, and all 6 language×architecture combos passed.
  # is-release-run defaults to false, so meta-prerelease-dry-run never tags even if
  # invoked with variant=all — preventing accidental promotion to a real release.
  tag-meta-rc:
    needs: pipeline
    if: ${{ success() && inputs.is-release-run && inputs.level == 'qa' && inputs.variant == 'all' && !inputs.skip-acceptance-legacy }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.VERIFY_TOKEN }}
      - name: Tag meta-rc
        run: |
          set -euo pipefail
          VERSION=$(tr -d '[:space:]' < VERSION)
          TAG="meta-v${VERSION}-rc.${{ github.run_number }}"
          echo "Creating tag ${TAG} on ${{ github.sha }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "$TAG" "${{ github.sha }}"
          git push origin "$TAG"
          echo "Tagged ${{ github.sha }} as ${TAG}"
          TAG_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/releases/tag/${TAG}"
          {
            echo "## Meta RC tagged"
            echo ""
            echo "- Tag: [\`${TAG}\`](${TAG_URL})"
            echo "- Commit: [\`${GITHUB_SHA::7}\`](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/commit/${GITHUB_SHA})"
          } >> "$GITHUB_STEP_SUMMARY"
