name: monolith-java-qa-signoff

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version that was tested in QA (e.g., v1.0.0-rc.1)'
        required: true
        type: string
      result:
        description: 'QA testing result'
        required: true
        type: choice
        options:
          - approved
          - rejected

concurrency:
  group: monolith-java-qa-signoff

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check RC Exists
        uses: optivem/actions/ensure-tag-exists@v1
        with:
          tag: ${{ inputs.version }}

  run:
    needs: check
    if: needs.check.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.promote.outputs.tag }}
      stage-result: ${{ steps.determine-result.outputs.stage-result }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Determine Stage Result
        id: determine-result
        uses: optivem/actions/map-signoff-to-stage-result@v1
        with:
          result: ${{ inputs.result }}

      - name: Generate QA Signoff Tag
        id: promote
        uses: optivem/actions/compose-prerelease-status@v1
        with:
          prerelease-version: ${{ inputs.version }}
          environment: qa
          status: ${{ inputs.result }}

      - name: Create QA Signoff Tag
        uses: optivem/actions/create-and-push-tag@v1
        with:
          tag: ${{ steps.promote.outputs.tag }}

  summary:
    needs: [check, run]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v5

    - name: Summarize Stage
      uses: optivem/actions/summarize-system-stage@v1
      with:
        stage-name: 'QA Signoff'
        environment: qa
        stage-result: ${{ needs.run.outputs.stage-result }}
        success-version: ${{ needs.run.outputs.version }}
