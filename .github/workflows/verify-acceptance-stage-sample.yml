name: verify-acceptance-stage-sample

on:
  workflow_dispatch:
    inputs:
      skip-commit-stage:
        description: 'Skip commit stage (if already green)'
        required: false
        type: boolean
        default: false

jobs:
  # Phase 1: Run all monolith commit stages in parallel
  commit-monolith-java:
    if: ${{ !inputs.skip-commit-stage }}
    runs-on: ubuntu-latest
    steps:
      - uses: optivem/actions/trigger-and-wait@main
        with:
          workflow: monolith-java-commit-stage.yml

  commit-monolith-dotnet:
    if: ${{ !inputs.skip-commit-stage }}
    runs-on: ubuntu-latest
    steps:
      - uses: optivem/actions/trigger-and-wait@main
        with:
          workflow: monolith-dotnet-commit-stage.yml

  commit-monolith-typescript:
    if: ${{ !inputs.skip-commit-stage }}
    runs-on: ubuntu-latest
    steps:
      - uses: optivem/actions/trigger-and-wait@main
        with:
          workflow: monolith-typescript-commit-stage.yml

  # Phase 2: Run acceptance stage sample tests sequentially (one language at a time)
  acceptance-sample-java:
    needs: [commit-monolith-java, commit-monolith-dotnet, commit-monolith-typescript]
    if: ${{ always() && (inputs.skip-commit-stage || (!failure() && !cancelled())) }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Setup Runtime
        uses: optivem/actions/setup-java-gradle@v1
        with:
          java-version: 21
          working-directory: system-test/java

      - name: Run Sample Tests
        working-directory: system-test/java
        run: pwsh ./Run-SystemTests.ps1 -Architecture monolith -Sample -Mode pipeline

  acceptance-sample-dotnet:
    needs: acceptance-sample-java
    if: ${{ always() && !failure() && !cancelled() }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Setup Runtime
        uses: optivem/actions/setup-dotnet@v1
        with:
          dotnet-version: 8.0.x

      - name: Run Sample Tests
        working-directory: system-test/dotnet
        run: pwsh ./Run-SystemTests.ps1 -Architecture monolith -Sample -Mode pipeline

  acceptance-sample-typescript:
    needs: acceptance-sample-dotnet
    if: ${{ always() && !failure() && !cancelled() }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Setup Runtime
        uses: optivem/actions/setup-node@v1
        with:
          node-version: 22.x
          working-directory: system-test/typescript

      - name: Run Sample Tests
        working-directory: system-test/typescript
        run: pwsh ./Run-SystemTests.ps1 -Architecture monolith -Sample -Mode pipeline
