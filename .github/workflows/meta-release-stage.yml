name: meta-release-stage

# Promotes a meta-rc to a final meta release by:
#   1. Resolving the meta-rc tag and extracting its version + SHA
#   2. Finding each flavor's latest QA-approved RC at that version
#   3. Triggering all 6 flavor prod-stages in parallel to release each flavor
#   4. After all flavor releases succeed, creating the final meta-v{VERSION} tag
#   5. Calling auto-bump-patch to bump all VERSION files for the next cycle
#
# This is the single canonical release path. Pipeline workflows only run through QA;
# actual production release happens here (or via direct dispatch on a flavor-prod-stage.yml).

on:
  # Auto-trigger when _meta-prerelease-pipeline's tag-meta-rc job pushes a new RC tag.
  # Tag push is effectively equivalent to "tag-meta-rc succeeded" — the tag is only
  # pushed at the end of that job, so this fires exactly when a releasable RC exists.
  push:
    tags:
      - 'meta-v*-rc.*'
  workflow_dispatch:
    inputs:
      meta_rc_tag:
        description: 'Meta-rc tag to promote (e.g. meta-v1.0.14-rc.47). Leave empty to promote latest meta-rc for current VERSION.'
        required: false
        default: ''
        type: string

concurrency:
  group: meta-release-stage
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      meta_rc_tag: ${{ steps.rc.outputs.rc_tag }}
      commit-sha: ${{ steps.resolve.outputs.commit-sha }}
      version: ${{ steps.resolve.outputs.version }}
      release_tag: ${{ steps.resolve.outputs.release_tag }}
      monolith-java-rc: ${{ steps.flavor-rcs.outputs.monolith-java-rc }}
      monolith-dotnet-rc: ${{ steps.flavor-rcs.outputs.monolith-dotnet-rc }}
      monolith-typescript-rc: ${{ steps.flavor-rcs.outputs.monolith-typescript-rc }}
      multitier-java-rc: ${{ steps.flavor-rcs.outputs.multitier-java-rc }}
      multitier-dotnet-rc: ${{ steps.flavor-rcs.outputs.multitier-dotnet-rc }}
      multitier-typescript-rc: ${{ steps.flavor-rcs.outputs.multitier-typescript-rc }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve meta-rc tag
        id: rc
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_TAG: ${{ inputs.meta_rc_tag }}
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if [[ "${EVENT_NAME}" == "push" ]]; then
            RC_TAG="${REF_NAME}"
            echo "Triggered by tag push: ${RC_TAG}"
          elif [[ -n "${INPUT_TAG}" ]]; then
            RC_TAG="${INPUT_TAG}"
            echo "Using provided rc tag: ${RC_TAG}"
          else
            VERSION=$(tr -d '[:space:]' < VERSION)
            echo "VERSION on main: ${VERSION}"
            RC_TAG=$(git tag --list "meta-v${VERSION}-rc.*" \
              | awk -F'-rc\\.' '{print $2 " " $0}' \
              | sort -k1,1 -n \
              | tail -n 1 \
              | awk '{print $2}')
            if [[ -z "${RC_TAG}" ]]; then
              PRERELEASE_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/workflows/meta-prerelease-stage.yml"
              {
                echo "## No meta-rc to promote"
                echo ""
                echo "VERSION on main is \`${VERSION}\` but no \`meta-v${VERSION}-rc.*\` tags exist yet."
                echo ""
                echo "Run the [meta-prerelease-stage workflow](${PRERELEASE_URL}) to build an RC for this version, then re-run this workflow."
              } >> "$GITHUB_STEP_SUMMARY"
              echo "::error::No meta-rc tags found for VERSION ${VERSION}. Run meta-prerelease-stage first to build an RC: ${PRERELEASE_URL}"
              exit 1
            fi
            echo "Resolved latest rc tag: ${RC_TAG}"
          fi
          if [[ ! "${RC_TAG}" =~ ^meta-v[0-9]+\.[0-9]+\.[0-9]+-rc\.[0-9]+$ ]]; then
            echo "::error::Tag ${RC_TAG} does not match pattern meta-v<X.Y.Z>-rc.<N>"
            exit 1
          fi
          echo "rc_tag=${RC_TAG}" >> "$GITHUB_OUTPUT"

      - name: Resolve SHA and version
        id: resolve
        env:
          RC_TAG: ${{ steps.rc.outputs.rc_tag }}
        run: |
          set -euo pipefail
          git fetch origin "refs/tags/${RC_TAG}:refs/tags/${RC_TAG}" || true
          SHA=$(git rev-list -n 1 "${RC_TAG}")
          if [[ -z "${SHA}" ]]; then
            echo "::error::Could not resolve SHA for tag ${RC_TAG}"
            exit 1
          fi
          TAG_VERSION=$(git show "${SHA}:VERSION" | tr -d '[:space:]')
          EMBEDDED_VERSION=$(echo "${RC_TAG}" | sed -E 's/^meta-v([0-9]+\.[0-9]+\.[0-9]+)-rc\.[0-9]+$/\1/')
          if [[ "${TAG_VERSION}" != "${EMBEDDED_VERSION}" ]]; then
            echo "::error::VERSION at tag SHA (${TAG_VERSION}) does not match version embedded in tag name (${EMBEDDED_VERSION})"
            exit 1
          fi
          RELEASE_TAG="meta-v${TAG_VERSION}"
          echo "commit-sha=${SHA}" >> "$GITHUB_OUTPUT"
          echo "version=${TAG_VERSION}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Verify meta release tag does not already exist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.resolve.outputs.release_tag }}
        run: |
          set -euo pipefail
          if gh api "repos/${{ github.repository }}/git/ref/tags/${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "::error::Release tag ${RELEASE_TAG} already exists — cannot overwrite"
            exit 1
          fi
          echo "Release tag ${RELEASE_TAG} is available"

      - name: Find flavor QA-approved RCs
        id: flavor-rcs
        env:
          VERSION: ${{ steps.resolve.outputs.version }}
        run: |
          set -euo pipefail
          # For each flavor, find the highest-numbered RC whose QA-approved tag exists at this VERSION.
          # The flavor prod-stage takes the RC version (without the -qa-approved suffix) as input.
          for flavor in monolith-java monolith-dotnet monolith-typescript multitier-java multitier-dotnet multitier-typescript; do
            rc=$(git tag --list "${flavor}-v${VERSION}-rc.*-qa-approved" \
              | sed -E 's/-qa-approved$//' \
              | awk -F'-rc\.' '{print $2 " " $0}' \
              | sort -k1,1 -n \
              | tail -n 1 \
              | awk '{print $2}')
            if [[ -z "$rc" ]]; then
              echo "::error::No QA-approved RC found for ${flavor} at v${VERSION}. Was the acceptance pipeline run to completion?"
              exit 1
            fi
            echo "${flavor}-rc=${rc}" >> "$GITHUB_OUTPUT"
            echo "Found: ${rc}"
          done

  promote-monolith-java:
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: optivem/actions/trigger-and-wait-for-workflow@v1
        with:
          workflow: monolith-java-prod-stage.yml
          timeout-seconds: '3600'
          workflow-inputs: '{"version": "${{ needs.check.outputs.monolith-java-rc }}"}'

  promote-monolith-dotnet:
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: optivem/actions/trigger-and-wait-for-workflow@v1
        with:
          workflow: monolith-dotnet-prod-stage.yml
          timeout-seconds: '3600'
          workflow-inputs: '{"version": "${{ needs.check.outputs.monolith-dotnet-rc }}"}'

  promote-monolith-typescript:
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: optivem/actions/trigger-and-wait-for-workflow@v1
        with:
          workflow: monolith-typescript-prod-stage.yml
          timeout-seconds: '3600'
          workflow-inputs: '{"version": "${{ needs.check.outputs.monolith-typescript-rc }}"}'

  promote-multitier-java:
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: optivem/actions/trigger-and-wait-for-workflow@v1
        with:
          workflow: multitier-java-prod-stage.yml
          timeout-seconds: '3600'
          workflow-inputs: '{"version": "${{ needs.check.outputs.multitier-java-rc }}"}'

  promote-multitier-dotnet:
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: optivem/actions/trigger-and-wait-for-workflow@v1
        with:
          workflow: multitier-dotnet-prod-stage.yml
          timeout-seconds: '3600'
          workflow-inputs: '{"version": "${{ needs.check.outputs.multitier-dotnet-rc }}"}'

  promote-multitier-typescript:
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: optivem/actions/trigger-and-wait-for-workflow@v1
        with:
          workflow: multitier-typescript-prod-stage.yml
          timeout-seconds: '3600'
          workflow-inputs: '{"version": "${{ needs.check.outputs.multitier-typescript-rc }}"}'

  tag-meta-release:
    needs: [check, promote-monolith-java, promote-monolith-dotnet, promote-monolith-typescript, promote-multitier-java, promote-multitier-dotnet, promote-multitier-typescript]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.VERIFY_TOKEN }}
      - name: Create meta release tag and GitHub release
        env:
          GH_TOKEN: ${{ secrets.VERIFY_TOKEN }}
          RELEASE_TAG: ${{ needs.check.outputs.release_tag }}
          SHA: ${{ needs.check.outputs.commit-sha }}
        run: |
          set -euo pipefail
          echo "Creating tag ${RELEASE_TAG} on ${SHA}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "$RELEASE_TAG" "$SHA"
          git push origin "$RELEASE_TAG"
          echo "Creating GitHub release ${RELEASE_TAG}"
          gh release create "$RELEASE_TAG" \
            --target "$SHA" \
            --title "$RELEASE_TAG" \
            --notes "Meta release aggregating all flavor releases at this version."
          echo "Created tag and release ${RELEASE_TAG}"

      - name: Summary
        env:
          RC_TAG: ${{ needs.check.outputs.meta_rc_tag }}
          RELEASE_TAG: ${{ needs.check.outputs.release_tag }}
          SHA: ${{ needs.check.outputs.commit-sha }}
          MONOLITH_JAVA_RC: ${{ needs.check.outputs.monolith-java-rc }}
          MONOLITH_DOTNET_RC: ${{ needs.check.outputs.monolith-dotnet-rc }}
          MONOLITH_TYPESCRIPT_RC: ${{ needs.check.outputs.monolith-typescript-rc }}
          MULTITIER_JAVA_RC: ${{ needs.check.outputs.multitier-java-rc }}
          MULTITIER_DOTNET_RC: ${{ needs.check.outputs.multitier-dotnet-rc }}
          MULTITIER_TYPESCRIPT_RC: ${{ needs.check.outputs.multitier-typescript-rc }}
        run: |
          BASE="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}"
          tag_link() { echo "[\`$1\`](${BASE}/releases/tag/$1)"; }
          {
            echo "## Meta release promoted"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| RC tag | $(tag_link "${RC_TAG}") |"
            echo "| Release tag | $(tag_link "${RELEASE_TAG}") |"
            echo "| Commit | [\`${SHA::7}\`](${BASE}/commit/${SHA}) |"
            echo ""
            echo "### Flavor RCs promoted"
            echo "| Flavor | RC version |"
            echo "|---|---|"
            echo "| monolith-java | $(tag_link "${MONOLITH_JAVA_RC}") |"
            echo "| monolith-dotnet | $(tag_link "${MONOLITH_DOTNET_RC}") |"
            echo "| monolith-typescript | $(tag_link "${MONOLITH_TYPESCRIPT_RC}") |"
            echo "| multitier-java | $(tag_link "${MULTITIER_JAVA_RC}") |"
            echo "| multitier-dotnet | $(tag_link "${MULTITIER_DOTNET_RC}") |"
            echo "| multitier-typescript | $(tag_link "${MULTITIER_TYPESCRIPT_RC}") |"
          } >> "$GITHUB_STEP_SUMMARY"

  auto-bump-patch:
    needs: tag-meta-release
    uses: ./.github/workflows/auto-bump-patch.yml
    secrets: inherit

  # Fire-and-forget: kick off post-release acceptance testing in optivem/gh-optivem
  # against the just-published meta-v* tag. We do not wait for it to finish —
  # gh-acceptance-stage verifies the release, it does not gate it. The target
  # workflow idempotently skips already-verified SHAs, so re-dispatches are safe.
  trigger-gh-acceptance:
    needs: [check, tag-meta-release]
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch gh-acceptance-stage in optivem/gh-optivem
        env:
          GH_TOKEN: ${{ secrets.REPO_TOKEN }}
          SHOP_TAG: ${{ needs.check.outputs.release_tag }}
        run: |
          set -euo pipefail
          echo "Dispatching gh-acceptance-stage.yml with shop-tag=${SHOP_TAG}"
          gh workflow run gh-acceptance-stage.yml \
            --repo optivem/gh-optivem \
            -f shop-tag="${SHOP_TAG}" \
            -f verify-level=release
          {
            echo "## Dispatched gh-acceptance-stage"
            echo ""
            echo "- Target repo: [optivem/gh-optivem](https://github.com/optivem/gh-optivem/actions/workflows/gh-acceptance-stage.yml)"
            echo "- shop-tag: \`${SHOP_TAG}\`"
            echo "- verify-level: \`release\`"
          } >> "$GITHUB_STEP_SUMMARY"
