name: meta-release-stage

# Promotes a meta-rc to a final meta release by:
#   1. Resolving the meta-rc tag and extracting its version + SHA
#   2. Finding each flavor's latest QA-approved RC at that version
#   3. Triggering all 6 flavor prod-stages in parallel to release each flavor
#   4. After all flavor releases succeed, creating the final meta-v{VERSION} tag
#   5. Calling auto-bump-patch to bump all VERSION files for the next cycle
#
# This is the single canonical release path. Pipeline workflows only run through QA;
# actual production release happens here (or via direct dispatch on a flavor-prod-stage.yml).

on:
  workflow_dispatch:
    inputs:
      meta_rc_tag:
        description: 'Meta-rc tag to promote (e.g. meta-v1.0.14-rc.47). Leave empty to promote latest meta-rc for current VERSION.'
        required: false
        default: ''
        type: string

jobs:
  resolve:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      meta_rc_tag: ${{ steps.rc.outputs.rc_tag }}
      sha: ${{ steps.resolve.outputs.sha }}
      version: ${{ steps.resolve.outputs.version }}
      release_tag: ${{ steps.resolve.outputs.release_tag }}
      monolith-java-rc: ${{ steps.flavor-rcs.outputs.monolith-java-rc }}
      monolith-dotnet-rc: ${{ steps.flavor-rcs.outputs.monolith-dotnet-rc }}
      monolith-typescript-rc: ${{ steps.flavor-rcs.outputs.monolith-typescript-rc }}
      multitier-java-rc: ${{ steps.flavor-rcs.outputs.multitier-java-rc }}
      multitier-dotnet-rc: ${{ steps.flavor-rcs.outputs.multitier-dotnet-rc }}
      multitier-typescript-rc: ${{ steps.flavor-rcs.outputs.multitier-typescript-rc }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve meta-rc tag
        id: rc
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_TAG: ${{ inputs.meta_rc_tag }}
        run: |
          set -euo pipefail
          if [[ -n "${INPUT_TAG}" ]]; then
            RC_TAG="${INPUT_TAG}"
            echo "Using provided rc tag: ${RC_TAG}"
          else
            VERSION=$(tr -d '[:space:]' < VERSION)
            echo "VERSION on main: ${VERSION}"
            RC_TAG=$(git tag --list "meta-v${VERSION}-rc.*" \
              | awk -F'-rc\\.' '{print $2 " " $0}' \
              | sort -k1,1 -n \
              | tail -n 1 \
              | awk '{print $2}')
            if [[ -z "${RC_TAG}" ]]; then
              echo "::error::No meta-rc tags found for VERSION ${VERSION}"
              exit 1
            fi
            echo "Resolved latest rc tag: ${RC_TAG}"
          fi
          if [[ ! "${RC_TAG}" =~ ^meta-v[0-9]+\.[0-9]+\.[0-9]+-rc\.[0-9]+$ ]]; then
            echo "::error::Tag ${RC_TAG} does not match pattern meta-v<X.Y.Z>-rc.<N>"
            exit 1
          fi
          echo "rc_tag=${RC_TAG}" >> "$GITHUB_OUTPUT"

      - name: Resolve SHA and version
        id: resolve
        env:
          RC_TAG: ${{ steps.rc.outputs.rc_tag }}
        run: |
          set -euo pipefail
          git fetch origin "refs/tags/${RC_TAG}:refs/tags/${RC_TAG}" || true
          SHA=$(git rev-list -n 1 "${RC_TAG}")
          if [[ -z "${SHA}" ]]; then
            echo "::error::Could not resolve SHA for tag ${RC_TAG}"
            exit 1
          fi
          TAG_VERSION=$(git show "${SHA}:VERSION" | tr -d '[:space:]')
          EMBEDDED_VERSION=$(echo "${RC_TAG}" | sed -E 's/^meta-v([0-9]+\.[0-9]+\.[0-9]+)-rc\.[0-9]+$/\1/')
          if [[ "${TAG_VERSION}" != "${EMBEDDED_VERSION}" ]]; then
            echo "::error::VERSION at tag SHA (${TAG_VERSION}) does not match version embedded in tag name (${EMBEDDED_VERSION})"
            exit 1
          fi
          RELEASE_TAG="meta-v${TAG_VERSION}"
          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"
          echo "version=${TAG_VERSION}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Verify meta release tag does not already exist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.resolve.outputs.release_tag }}
        run: |
          set -euo pipefail
          if gh api "repos/${{ github.repository }}/git/refs/tags/${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "::error::Release tag ${RELEASE_TAG} already exists — cannot overwrite"
            exit 1
          fi
          echo "Release tag ${RELEASE_TAG} is available"

      - name: Find flavor QA-approved RCs
        id: flavor-rcs
        env:
          VERSION: ${{ steps.resolve.outputs.version }}
        run: |
          set -euo pipefail
          # For each flavor, find the highest-numbered RC whose QA-approved tag exists at this VERSION.
          # The flavor prod-stage takes the RC version (without the -qa-approved suffix) as input.
          for flavor in monolith-java monolith-dotnet monolith-typescript multitier-java multitier-dotnet multitier-typescript; do
            rc=$(git tag --list "${flavor}-v${VERSION}-rc.*-qa-approved" \
              | sed -E 's/-qa-approved$//' \
              | awk -F'-rc\.' '{print $2 " " $0}' \
              | sort -k1,1 -n \
              | tail -n 1 \
              | awk '{print $2}')
            if [[ -z "$rc" ]]; then
              echo "::error::No QA-approved RC found for ${flavor} at v${VERSION}. Was the acceptance pipeline run to completion?"
              exit 1
            fi
            echo "${flavor}-rc=${rc}" >> "$GITHUB_OUTPUT"
            echo "Found: ${rc}"
          done

  promote-monolith-java:
    needs: resolve
    runs-on: ubuntu-latest
    steps:
      - uses: optivem/actions/trigger-and-wait@main
        with:
          workflow: monolith-java-prod-stage.yml
          inputs: '{"version": "${{ needs.resolve.outputs.monolith-java-rc }}"}'

  promote-monolith-dotnet:
    needs: resolve
    runs-on: ubuntu-latest
    steps:
      - uses: optivem/actions/trigger-and-wait@main
        with:
          workflow: monolith-dotnet-prod-stage.yml
          inputs: '{"version": "${{ needs.resolve.outputs.monolith-dotnet-rc }}"}'

  promote-monolith-typescript:
    needs: resolve
    runs-on: ubuntu-latest
    steps:
      - uses: optivem/actions/trigger-and-wait@main
        with:
          workflow: monolith-typescript-prod-stage.yml
          inputs: '{"version": "${{ needs.resolve.outputs.monolith-typescript-rc }}"}'

  promote-multitier-java:
    needs: resolve
    runs-on: ubuntu-latest
    steps:
      - uses: optivem/actions/trigger-and-wait@main
        with:
          workflow: multitier-java-prod-stage.yml
          inputs: '{"version": "${{ needs.resolve.outputs.multitier-java-rc }}"}'

  promote-multitier-dotnet:
    needs: resolve
    runs-on: ubuntu-latest
    steps:
      - uses: optivem/actions/trigger-and-wait@main
        with:
          workflow: multitier-dotnet-prod-stage.yml
          inputs: '{"version": "${{ needs.resolve.outputs.multitier-dotnet-rc }}"}'

  promote-multitier-typescript:
    needs: resolve
    runs-on: ubuntu-latest
    steps:
      - uses: optivem/actions/trigger-and-wait@main
        with:
          workflow: multitier-typescript-prod-stage.yml
          inputs: '{"version": "${{ needs.resolve.outputs.multitier-typescript-rc }}"}'

  tag-meta-release:
    needs: [resolve, promote-monolith-java, promote-monolith-dotnet, promote-monolith-typescript, promote-multitier-java, promote-multitier-dotnet, promote-multitier-typescript]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Create meta release tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.resolve.outputs.release_tag }}
          SHA: ${{ needs.resolve.outputs.sha }}
        run: |
          set -euo pipefail
          gh api \
            --method POST \
            "repos/${{ github.repository }}/git/refs" \
            -f ref="refs/tags/${RELEASE_TAG}" \
            -f sha="${SHA}"
          echo "Created tag ${RELEASE_TAG} on ${SHA}"

      - name: Summary
        env:
          RC_TAG: ${{ needs.resolve.outputs.meta_rc_tag }}
          RELEASE_TAG: ${{ needs.resolve.outputs.release_tag }}
          SHA: ${{ needs.resolve.outputs.sha }}
        run: |
          {
            echo "## Meta release promoted"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| RC tag | \`${RC_TAG}\` |"
            echo "| Release tag | \`${RELEASE_TAG}\` |"
            echo "| SHA | \`${SHA}\` |"
            echo ""
            echo "### Flavor RCs promoted"
            echo "| Flavor | RC version |"
            echo "|---|---|"
            echo "| monolith-java | \`${{ needs.resolve.outputs.monolith-java-rc }}\` |"
            echo "| monolith-dotnet | \`${{ needs.resolve.outputs.monolith-dotnet-rc }}\` |"
            echo "| monolith-typescript | \`${{ needs.resolve.outputs.monolith-typescript-rc }}\` |"
            echo "| multitier-java | \`${{ needs.resolve.outputs.multitier-java-rc }}\` |"
            echo "| multitier-dotnet | \`${{ needs.resolve.outputs.multitier-dotnet-rc }}\` |"
            echo "| multitier-typescript | \`${{ needs.resolve.outputs.multitier-typescript-rc }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"

  auto-bump-patch:
    needs: tag-meta-release
    uses: ./.github/workflows/auto-bump-patch.yml
    secrets: inherit
