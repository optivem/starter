name: monolith-dotnet-commit-stage

on:
  push:
    branches: [ "main" ]
    paths:
        - 'system/monolith/dotnet/**'
        - '.github/workflows/monolith-dotnet-commit-stage.yml'
  pull_request:
    branches: [ "main" ]
    paths:
        - 'system/monolith/dotnet/**'
        - '.github/workflows/monolith-dotnet-commit-stage.yml'
  workflow_dispatch:
    inputs:
      sha:
        description: 'Git SHA to build (leave empty for HEAD)'
        required: false
        type: string

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Ensure Environment Variables Defined
        uses: optivem/actions/ensure-env-vars-defined@v1
        with:
          names: |
            DOCKERHUB_USERNAME
            DOCKERHUB_TOKEN
        env:
          DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.sha || github.sha }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

  run:
    needs: check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    outputs:
      image-digest-url: ${{ steps.push.outputs.image-digest-url }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.sha || github.sha }}
          fetch-depth: 0

      - name: Verify Built SHA Is On Main
        id: verify-main
        uses: optivem/actions/check-sha-on-branch@v1
        with:
          sha: ${{ inputs.sha || github.sha }}

      - name: Setup .NET
        uses: optivem/actions/setup-dotnet@v1
        with:
          dotnet-version: 8.0.x

      - name: Compile Code
        run: dotnet build
        working-directory: system/monolith/dotnet

      # TODO: Implement
      - name: Run Unit Tests
        run: echo "TODO - not yet implemented"

      # TODO: Implement
      - name: Run Narrow Integration Tests
        run: echo "TODO - not yet implemented"

      # TODO: Implement
      - name: Run Component Tests
        run: echo "TODO - not yet implemented"

      # TODO: Implement
      - name: Run Contract Tests
        run: echo "TODO - not yet implemented"

      - name: Run Linter
        run: dotnet format Optivem.Shop.Monolith.sln --verify-no-changes
        working-directory: system/monolith/dotnet

      - name: Run Code Analysis
        if: steps.verify-main.outputs.on-branch == 'true' && env.SONAR_TOKEN != ''
        run: |
          dotnet tool install --global dotnet-sonarscanner
          dotnet sonarscanner begin /k:"optivem_shop-monolith-dotnet" /n:"shop-monolith-dotnet" /o:"optivem" /d:sonar.token="${SONAR_TOKEN}" /d:sonar.issue.ignore.multicriteria=e1,e2,e3,e4,e5,e6,e7 /d:sonar.issue.ignore.multicriteria.e1.ruleKey=csharpsquid:S2699 /d:sonar.issue.ignore.multicriteria.e1.resourceKey="Tests/**" /d:sonar.issue.ignore.multicriteria.e2.ruleKey=csharpsquid:S1118 /d:sonar.issue.ignore.multicriteria.e2.resourceKey="Program.cs" /d:sonar.issue.ignore.multicriteria.e3.ruleKey=csharpsquid:S2068 /d:sonar.issue.ignore.multicriteria.e3.resourceKey="appsettings.json" /d:sonar.issue.ignore.multicriteria.e4.ruleKey=css:S4654 /d:sonar.issue.ignore.multicriteria.e4.resourceKey="wwwroot/**" /d:sonar.issue.ignore.multicriteria.e5.ruleKey=csharpsquid:S1186 /d:sonar.issue.ignore.multicriteria.e5.resourceKey="Pages/**" /d:sonar.issue.ignore.multicriteria.e6.ruleKey=csharpsquid:S1075 /d:sonar.issue.ignore.multicriteria.e6.resourceKey="**/*" /d:sonar.issue.ignore.multicriteria.e7.ruleKey=csharpsquid:S3267 /d:sonar.issue.ignore.multicriteria.e7.resourceKey="**/*"
          dotnet build
          dotnet sonarscanner end /d:sonar.token="${SONAR_TOKEN}"
        working-directory: system/monolith/dotnet

      - name: Read Component Target Version
        if: steps.verify-main.outputs.on-branch == 'true'
        id: read-version
        uses: optivem/actions/read-target-version@v1
        with:
          file: system/monolith/dotnet/VERSION

      - name: Build Artifact
        if: steps.verify-main.outputs.on-branch == 'true'
        id: build
        uses: optivem/actions/build-docker-image@v1
        with:
          working-directory: system/monolith/dotnet
          image-name: monolith-system-dotnet
          commit-sha: ${{ inputs.sha || github.sha }}
          dockerfile: Dockerfile

      - name: Compose Dev Version
        if: steps.verify-main.outputs.on-branch == 'true'
        id: dev-version
        uses: optivem/actions/compose-prerelease-version@v1
        with:
          target-version: ${{ steps.read-version.outputs.target-version }}
          suffix: dev
          number: ${{ github.run_number }}

      - name: Tag Docker Image
        if: steps.verify-main.outputs.on-branch == 'true'
        id: tag
        uses: optivem/actions/tag-docker-image@v1
        with:
          source: ${{ steps.build.outputs.local-image-ref }}
          image-name: monolith-system-dotnet
          tags: |
            ${{ inputs.sha || github.sha }}
            latest
            ${{ steps.dev-version.outputs.version }}

      - name: Push Artifact
        if: steps.verify-main.outputs.on-branch == 'true'
        id: push
        uses: optivem/actions/push-docker-images@v1
        with:
          image-sha-tag: ${{ fromJSON(steps.tag.outputs.image-urls)[0] }}
          image-latest-url: ${{ fromJSON(steps.tag.outputs.image-urls)[1] }}
          image-version-tag: ${{ fromJSON(steps.tag.outputs.image-urls)[2] }}

  summary:
    needs: [check, run]
    if: always()
    runs-on: ubuntu-latest
    steps:
    - name: Summarize Stage
      uses: optivem/actions/compose-commit-stage-summary@v1
      with:
        stage-result: ${{ needs.run.result }}
        success-artifact-url: ${{ needs.run.outputs.image-digest-url }}
