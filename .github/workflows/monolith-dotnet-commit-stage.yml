name: monolith-dotnet-commit-stage

on:
  push:
    branches: [ "main" ]
    paths:
        - 'system/monolith/dotnet/**'
        - '.github/workflows/monolith-dotnet-commit-stage.yml'
  pull_request:
    branches: [ "main" ]
    paths:
        - 'system/monolith/dotnet/**'
        - '.github/workflows/monolith-dotnet-commit-stage.yml'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Validate Config
        uses: optivem/actions/validate-config@v1
        with:
          names: |
            DOCKERHUB_USERNAME
            DOCKERHUB_TOKEN
        env:
          DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

  run:
    needs: check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    outputs:
      image-digest-url: ${{ steps.push.outputs.image-digest-url }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Runtime
        uses: optivem/actions/setup-dotnet@v1
        with:
          dotnet-version: 8.0.x

      - name: Compile Code
        run: dotnet build
        working-directory: system/monolith/dotnet

      # TODO: Implement
      - name: Run Unit Tests
        run: echo "TODO - not yet implemented"

      # TODO: Implement
      - name: Run Narrow Integration Tests
        run: echo "TODO - not yet implemented"

      # TODO: Implement
      - name: Run Component Tests
        run: echo "TODO - not yet implemented"

      # TODO: Implement
      - name: Run Contract Tests
        run: echo "TODO - not yet implemented"

      - name: Run Linter
        run: dotnet format Optivem.Shop.Monolith.sln --verify-no-changes
        working-directory: system/monolith/dotnet

      - name: Run Code Analysis
        if: github.ref == 'refs/heads/main' && env.SONAR_TOKEN != ''
        run: |
          dotnet tool install --global dotnet-sonarscanner
          dotnet sonarscanner begin /k:"optivem_shop-monolith-dotnet" /n:"shop-monolith-dotnet" /o:"optivem" /d:sonar.token="${SONAR_TOKEN}" /d:sonar.issue.ignore.multicriteria=e1,e2,e3,e4,e5,e6,e7 /d:sonar.issue.ignore.multicriteria.e1.ruleKey=csharpsquid:S2699 /d:sonar.issue.ignore.multicriteria.e1.resourceKey="Tests/**" /d:sonar.issue.ignore.multicriteria.e2.ruleKey=csharpsquid:S1118 /d:sonar.issue.ignore.multicriteria.e2.resourceKey="Program.cs" /d:sonar.issue.ignore.multicriteria.e3.ruleKey=csharpsquid:S2068 /d:sonar.issue.ignore.multicriteria.e3.resourceKey="appsettings.json" /d:sonar.issue.ignore.multicriteria.e4.ruleKey=css:S4654 /d:sonar.issue.ignore.multicriteria.e4.resourceKey="wwwroot/**" /d:sonar.issue.ignore.multicriteria.e5.ruleKey=csharpsquid:S1186 /d:sonar.issue.ignore.multicriteria.e5.resourceKey="Pages/**" /d:sonar.issue.ignore.multicriteria.e6.ruleKey=csharpsquid:S1075 /d:sonar.issue.ignore.multicriteria.e6.resourceKey="**/*" /d:sonar.issue.ignore.multicriteria.e7.ruleKey=csharpsquid:S3267 /d:sonar.issue.ignore.multicriteria.e7.resourceKey="**/*"
          dotnet build
          dotnet sonarscanner end /d:sonar.token="${SONAR_TOKEN}"
        working-directory: system/monolith/dotnet

      - name: Read Component Target Version
        if: github.ref == 'refs/heads/main'
        id: read-version
        uses: optivem/actions/read-target-version@v1
        with:
          file: system/monolith/dotnet/VERSION

      - name: Build Artifact
        if: github.ref == 'refs/heads/main'
        id: build
        uses: optivem/actions/build-docker-image@v1
        with:
          working-directory: system/monolith/dotnet
          image-name: monolith-system-dotnet
          image-namespace: ${{ github.repository }}
          commit-sha: ${{ github.sha }}
          dockerfile: Dockerfile
          component-version: ${{ steps.read-version.outputs.target-version }}
          build-number: ${{ github.run_number }}

      - name: Push Artifact
        if: github.ref == 'refs/heads/main'
        id: push
        uses: optivem/actions/push-docker-image@v1
        with:
          image-sha-tag: ${{ steps.build.outputs.image-sha-tag }}
          image-latest-url: ${{ steps.build.outputs.image-latest-url }}
          image-version-tag: ${{ steps.build.outputs.image-version-tag }}
        env:
          REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}

  summary:
    needs: [check, run]
    if: always()
    runs-on: ubuntu-latest
    steps:
    - name: Summarize Stage
      uses: optivem/actions/summarize-commit-stage@v1
      with:
        stage-result: ${{ needs.run.result }}
        success-artifact-url: ${{ needs.run.outputs.image-digest-url }}
