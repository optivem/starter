name: pipeline-monolith-java

on:
  workflow_dispatch:
    inputs:
      level:
        description: 'Verification level'
        required: false
        type: choice
        options:
          - local
          - commit
          - acceptance
          - release
        default: 'release'
      skip-local-stage:
        description: 'Skip local stage'
        required: false
        type: boolean
        default: false
      skip-commit-stage:
        description: 'Skip commit stage'
        required: false
        type: boolean
        default: false

jobs:
  verify:
    uses: ./.github/workflows/_pipeline.yml
    secrets: inherit
    with:
      prefix: monolith-java
      architecture: monolith
      language: java
      commit-workflows: '["monolith-java-commit-stage.yml"]'
      level: ${{ inputs.level || 'release' }}
      skip-local-stage: ${{ inputs.skip-local-stage == true }}
      skip-commit-stage: ${{ inputs.skip-commit-stage == true }}
