name: multitier-java-prod-stage

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Prerelease version to deploy (e.g., v1.0.0-rc.1)'
        required: true
        type: string

concurrency:
  group: multitier-java-prod-stage

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      image-urls: ${{ steps.resolve-images.outputs.image-urls }}
    steps:
      - name: Ensure Environment Variables Defined
        uses: optivem/actions/ensure-env-vars-defined@v1
        with:
          names: |
            DOCKERHUB_USERNAME
            DOCKERHUB_TOKEN
            WORKFLOW_TOKEN
        env:
          DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          WORKFLOW_TOKEN: ${{ secrets.WORKFLOW_TOKEN }}

      - name: Check RC Exists
        id: check-release
        uses: optivem/actions/ensure-tag-exists@v1
        with:
          tag: ${{ inputs.version }}

      - name: Check QA Approved
        uses: optivem/actions/ensure-tag-exists@v1
        with:
          tag: ${{ inputs.version }}-qa-approved

      - name: Generate Release Version
        id: release-version
        uses: optivem/actions/compose-release-version@v1
        with:
          prerelease-version: ${{ inputs.version }}

      - name: Verify Version Not Yet Released
        uses: optivem/actions/ensure-version-unreleased@v1
        with:
          version: ${{ steps.release-version.outputs.version }}

      - name: Compose Docker Image URLs
        id: resolve-images
        uses: optivem/actions/compose-docker-image-urls@v1
        with:
          tag: ${{ inputs.version }}
          base-image-urls: |
            ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}/multitier-frontend-react
            ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}/multitier-backend-java

  run:
    needs: check
    if: needs.check.result == 'success'
    runs-on: ubuntu-latest
    environment: multitier-java-production
    permissions:
      contents: write
      packages: write
    outputs:
      version: ${{ steps.promote.outputs.version }}
      image-urls: ${{ needs.check.outputs.image-urls }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.version }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Simulate Deployment (Production Environment)
        id: deploy
        uses: optivem/actions/deploy-docker-compose@v1
        with:
          environment: production
          version: ${{ inputs.version }}
          image-urls: ${{ needs.check.outputs.image-urls }}
          compose-file: docker-compose.pipeline.multitier.real.yml
          working-directory: system-test/java

      - name: Wait for Systems (Simulate Deployment (Production Environment))
        uses: optivem/actions/wait-for-urls@v1
        with:
          systems: |
            [
              { "name": "Shop UI", "url": "http://localhost:3111/" },
              { "name": "Shop API", "url": "http://localhost:8111/health" },
              { "name": "ERP", "url": "http://localhost:9111/erp/health" },
              { "name": "Clock", "url": "http://localhost:9111/clock/health" }
            ]
          compose-file: docker-compose.pipeline.multitier.real.yml
          working-directory: system-test/java

      - name: Generate Release Version
        id: promote
        uses: optivem/actions/compose-release-version@v1
        with:
          prerelease-version: ${{ inputs.version }}

      - name: Tag Docker Images
        id: tag-images
        uses: optivem/actions/promote-docker-images@v1
        with:
          image-urls: ${{ needs.check.outputs.image-urls }}
          tag: ${{ steps.promote.outputs.version }}

      - name: Publish Release Tag
        uses: optivem/actions/publish-tag@v1
        with:
          tag: ${{ steps.promote.outputs.version }}
          token: ${{ secrets.WORKFLOW_TOKEN }}

      - name: Compose Release Notes
        id: release-notes
        uses: optivem/actions/compose-release-notes@v1
        with:
          base-version: ${{ inputs.version }}
          release-version: ${{ steps.promote.outputs.version }}
          environment: prod
          status: deployed
          artifact-urls: ${{ steps.tag-images.outputs.image-urls }}

      - name: Create GitHub Release
        uses: optivem/actions/create-github-release@v1
        with:
          tag: ${{ steps.promote.outputs.version }}
          title: ${{ steps.release-notes.outputs.title }}
          notes-file: ${{ steps.release-notes.outputs.notes-file }}
          is-prerelease: false

      - name: Create Component Tags
        uses: optivem/actions/create-component-tags@v1
        with:
          components: |
            multitier-backend-java:system/multitier/backend-java/VERSION
            multitier-frontend-react:system/multitier/frontend-react/VERSION
          token: ${{ secrets.WORKFLOW_TOKEN }}

  summary:
    needs: [check, run]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v5

    - name: Log in to Docker Hub
      uses: docker/login-action@v4
      with:
        username: ${{ vars.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Summarize Stage
      uses: optivem/actions/render-system-stage-summary@v1
      with:
        stage-name: 'Production Stage'
        stage-result: ${{ needs.run.result }}
        environment: production
        success-version: ${{ needs.run.outputs.version }}
        success-artifact-ids: ${{ needs.run.outputs.image-urls }}
