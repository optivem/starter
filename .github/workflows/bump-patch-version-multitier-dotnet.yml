name: multitier-dotnet-bump-patch-version

# Per-flavor bumper for multitier-dotnet. Bumps system/multitier/dotnet/VERSION
# (system bundle) and cascades to backend-dotnet + frontend-react component
# VERSIONs when their respective tags advance. Triggered by
# multitier-dotnet-prod-stage (post-release) and meta-bump-all (recovery).
# Frontend-react is shared across multitier flavors so it may bump up to 3×
# per round of releases. Doubles as a scaffold source for gh-optivem.
# Race-safe (Contents API with SHA preconditions). Idempotent.

on:
  workflow_call:
  workflow_dispatch:

permissions: {}

concurrency:
  group: multitier-dotnet-bump-patch-version

jobs:
  bump:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Compute Patch Bumps
        id: bump
        uses: optivem/actions/bump-patch-versions@v1
        with:
          version-files: |
            [
              {"path": "system/multitier/dotnet/VERSION",          "value": "multitier-dotnet-v"},
              {"path": "system/multitier/backend-dotnet/VERSION",  "value": "multitier-backend-dotnet-v"},
              {"path": "system/multitier/frontend-react/VERSION",  "value": "multitier-frontend-react-v"}
            ]

      - name: Build Commit Payload
        id: payload
        if: steps.bump.outputs.bumped == 'true'
        shell: bash
        env:
          BUMPS: ${{ steps.bump.outputs.bumps }}
        run: |
          set -euo pipefail
          files=$(jq -c '[.[] | {
            path: .path,
            content: ("\(.["new-version"])\n"),
            message: "Bump \(.path) \(.["old-version"]) -> \(.["new-version"]) (post \(.["release-signal"]))"
          }]' <<< "$BUMPS")
          echo "files=$files" >> "$GITHUB_OUTPUT"

      - name: Commit Bumped VERSION Files
        if: steps.bump.outputs.bumped == 'true'
        uses: optivem/actions/commit-files@v1
        with:
          files: ${{ steps.payload.outputs.files }}
          branch: main
          token: ${{ secrets.GITHUB_TOKEN }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
