name: multitier-typescript-qa-stage

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Prerelease version to deploy (e.g., v1.0.0-rc.1)'
        required: true
        type: string

concurrency:
  group: multitier-typescript-qa-stage

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      image-urls: ${{ steps.resolve-images.outputs.image-urls }}
    steps:
      - name: Ensure Environment Variables Defined
        uses: optivem/actions/ensure-env-vars-defined@v1
        with:
          names: |
            DOCKERHUB_USERNAME
            DOCKERHUB_TOKEN
        env:
          DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Check RC Exists
        id: check-release
        uses: optivem/actions/ensure-tag-exists@v1
        with:
          tag: ${{ inputs.version }}

      - name: Resolve Artifacts
        id: resolve-images
        uses: optivem/actions/resolve-docker-images@v1
        with:
          tag: ${{ inputs.version }}
          base-image-urls: |
            ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}/multitier-frontend-react
            ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}/multitier-backend-typescript

  run:
    needs: check
    if: needs.check.result == 'success'
    runs-on: ubuntu-latest
    environment: multitier-typescript-qa
    permissions:
      contents: write
    outputs:
      version: ${{ steps.promote.outputs.version }}
      image-urls: ${{ needs.check.outputs.image-urls }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Simulate Deployment (QA Environment)
        id: deploy
        uses: optivem/actions/run-docker-compose@v1
        with:
          environment: qa
          version: ${{ inputs.version }}
          image-urls: ${{ needs.check.outputs.image-urls }}
          compose-file: docker-compose.pipeline.multitier.real.yml
          systems: |
            [
              { "name": "Shop UI", "url": "http://localhost:3311/" },
              { "name": "Shop API", "url": "http://localhost:8311/health" },
              { "name": "ERP", "url": "http://localhost:9311/erp/health" },
              { "name": "Clock", "url": "http://localhost:9311/clock/health" }
            ]
          working-directory: system-test/typescript

      - name: Promote Prerelease (QA Deployed)
        id: promote
        uses: optivem/actions/promote-prerelease@v1
        with:
          version: ${{ inputs.version }}
          environment: qa
          status: deployed
          artifact-urls: ${{ needs.check.outputs.image-urls }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  summary:
    needs: [check, run]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v5

    - name: Log in to Docker Hub
      uses: docker/login-action@v4
      with:
        username: ${{ vars.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Summarize Stage
      uses: optivem/actions/summarize-system-stage@v1
      with:
        stage-name: 'QA Stage'
        environment: qa
        stage-result: ${{ needs.run.result }}
        success-version: ${{ needs.run.outputs.version }}
        success-artifact-ids: ${{ needs.run.outputs.image-urls }}
