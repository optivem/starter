name: multitier-typescript-qa-stage

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Prerelease version to deploy (e.g., multitier-typescript-v1.0.0-rc.1). Leave empty to deploy the latest available RC.'
        required: false
        type: string
        default: ''

concurrency:
  group: multitier-typescript-qa-stage

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ inputs.version || steps.resolve-latest.outputs.tag }}
      image-urls: ${{ steps.resolve-images.outputs.image-urls }}
    steps:
      - name: Ensure Environment Variables Defined
        uses: optivem/actions/ensure-env-vars-defined@v1
        with:
          names: |
            DOCKERHUB_USERNAME
            DOCKERHUB_TOKEN
        env:
          DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Resolve Latest RC
        id: resolve-latest
        if: inputs.version == ''
        uses: optivem/actions/resolve-latest-prerelease-tag@v1
        with:
          tag-prefix: multitier-typescript-v

      - name: Check RC Exists
        if: inputs.version != ''
        uses: optivem/actions/ensure-tag-exists@v1
        with:
          tag: ${{ inputs.version }}

      - name: Compose Docker Image URLs
        id: resolve-images
        uses: optivem/actions/compose-docker-image-urls@v1
        with:
          tag: ${{ inputs.version || steps.resolve-latest.outputs.tag }}
          base-image-urls: |
            ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}/multitier-frontend-react
            ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}/multitier-backend-typescript

  run:
    needs: check
    if: needs.check.result == 'success'
    runs-on: ubuntu-latest
    environment: multitier-typescript-qa
    permissions:
      contents: write
    outputs:
      version: ${{ steps.promote.outputs.tag }}
      image-urls: ${{ needs.check.outputs.image-urls }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.check.outputs.version }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Simulate Deployment (QA Environment)
        id: deploy
        uses: optivem/actions/deploy-docker-compose@v1
        with:
          environment: qa
          version: ${{ needs.check.outputs.version }}
          image-urls: ${{ needs.check.outputs.image-urls }}
          compose-file: docker-compose.pipeline.multitier.real.yml
          working-directory: system-test/typescript

      - name: Wait for Systems (Simulate Deployment (QA Environment))
        uses: optivem/actions/wait-for-urls@v1
        with:
          systems: |
            [
              { "name": "Shop UI", "url": "http://localhost:3311/" },
              { "name": "Shop API", "url": "http://localhost:8311/health" },
              { "name": "ERP", "url": "http://localhost:9311/erp/health" },
              { "name": "Clock", "url": "http://localhost:9311/clock/health" }
            ]
          compose-file: docker-compose.pipeline.multitier.real.yml
          working-directory: system-test/typescript

      - name: Generate QA Deployed Tag
        id: promote
        uses: optivem/actions/compose-prerelease-status@v1
        with:
          prerelease-version: ${{ needs.check.outputs.version }}
          environment: qa
          status: deployed

      - name: Create QA Deployed Tag
        uses: optivem/actions/create-and-push-tag@v1
        with:
          tag: ${{ steps.promote.outputs.tag }}

  summary:
    needs: [check, run]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v5

    - name: Log in to Docker Hub
      uses: docker/login-action@v4
      with:
        username: ${{ vars.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Summarize Stage
      uses: optivem/actions/compose-system-stage-summary@v1
      with:
        stage-name: 'QA Stage'
        environment: qa
        stage-result: ${{ needs.run.result }}
        success-version: ${{ needs.run.outputs.version }}
        success-artifact-ids: ${{ needs.run.outputs.image-urls }}
