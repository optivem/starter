name: monolith-dotnet-acceptance-stage-legacy

on:
  schedule:
    - cron: '0 * * * *'  # Run every hour
  workflow_dispatch:
    inputs:
      commit-sha:
        description: 'Git SHA to test (leave empty for latest image)'
        required: false
        type: string

concurrency:
  group: monolith-dotnet-acceptance-stage-legacy

env:
  COMMIT_SHA: ${{ inputs.commit-sha || github.sha }}

jobs:
  preflight:
    runs-on: ubuntu-latest
    permissions:
      packages: read
    outputs:
      artifacts-exist: ${{ steps.check-artifacts.outputs.exist }}
      skip-reason: ${{ steps.check-artifacts.outputs.exist != 'true' && 'No artifacts published yet — waiting for the commit stage to produce images.' || '' }}
    steps:
      - name: Check Container Packages Exist
        id: check-artifacts
        uses: optivem/actions/check-ghcr-packages-exist@v1
        with:
          image-urls: |
            ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}/monolith-system-dotnet

  check:
    needs: preflight
    if: needs.preflight.outputs.artifacts-exist == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      should-run: ${{ steps.should-run.outputs.newer }}
      skip-reason: ${{ steps.should-run.outputs.newer != 'true' && 'No new artifacts since the last successful run.' || '' }}
      image-digest-urls: ${{ steps.find-latest.outputs.image-digest-urls }}
      latest-updated-at: ${{ steps.find-latest.outputs.latest-updated-at }}
      last-run-at: ${{ steps.last-run.outputs.timestamp }}
    steps:
      - name: Ensure Environment Variables Defined
        uses: optivem/actions/validate-env-vars-defined@v1
        with:
          names: |
            DOCKERHUB_USERNAME
            DOCKERHUB_TOKEN
        env:
          DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ env.COMMIT_SHA }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Resolve Docker Image Digests
        id: find-latest
        uses: optivem/actions/resolve-docker-image-digests@v1
        with:
          base-image-urls: |
            ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}/monolith-system-dotnet
          commit-sha: ${{ inputs.commit-sha }}

      - name: Get Last Successful Workflow Run Timestamp
        id: last-run
        uses: optivem/actions/get-last-successful-github-workflow-run-timestamp@v1
        with:
          workflow-name: ${{ github.workflow }}

      - name: Check for Docker Image Updates Since Last Run
        id: should-run
        uses: optivem/actions/check-timestamp-newer@v1
        with:
          subject: ${{ steps.find-latest.outputs.latest-updated-at }}
          baseline: ${{ steps.last-run.outputs.timestamp }}

  run:
    needs: check
    if: needs.check.outputs.should-run == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ env.COMMIT_SHA }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Simulate Deployment (Real External Systems)
        uses: optivem/actions/deploy-docker-compose@v1
        with:
          environment: acceptance
          version: latest
          image-urls: ${{ needs.check.outputs.image-digest-urls }}
          compose-file: docker-compose.pipeline.monolith.real.yml
          working-directory: system-test/dotnet

      - name: Wait for Systems (Simulate Deployment (Real External Systems))
        uses: optivem/actions/wait-for-endpoints@v1
        with:
          endpoints: |
            [
              { "name": "Shop UI", "url": "http://localhost:3211/" },
              { "name": "Shop API", "url": "http://localhost:8211/health" },
              { "name": "ERP", "url": "http://localhost:9211/erp/health" },
              { "name": "Clock", "url": "http://localhost:9211/clock/health" }
            ]
          compose-file: docker-compose.pipeline.monolith.real.yml
          working-directory: system-test/dotnet

      - name: Simulate Deployment (Stub External Systems)
        uses: optivem/actions/deploy-docker-compose@v1
        with:
          environment: acceptance
          version: latest
          image-urls: ${{ needs.check.outputs.image-digest-urls }}
          compose-file: docker-compose.pipeline.monolith.stub.yml
          working-directory: system-test/dotnet

      - name: Wait for Systems (Simulate Deployment (Stub External Systems))
        uses: optivem/actions/wait-for-endpoints@v1
        with:
          endpoints: |
            [
              { "name": "Shop UI", "url": "http://localhost:3212/" },
              { "name": "Shop API", "url": "http://localhost:8212/health" },
              { "name": "ERP", "url": "http://localhost:9212/erp/health" },
              { "name": "Clock", "url": "http://localhost:9212/clock/health" }
            ]
          compose-file: docker-compose.pipeline.monolith.stub.yml
          working-directory: system-test/dotnet

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Cache NuGet Packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('system-test/dotnet/**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Compile System Tests
        run: dotnet build
        working-directory: system-test/dotnet

      - name: Cache Playwright Browsers
        id: cache-playwright
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('system-test/dotnet/**/*.csproj') }}

      - name: Install Playwright Browsers
        timeout-minutes: 5
        if: steps.cache-playwright.outputs.cache-hit != 'true'
        run: pwsh SystemTests/bin/Debug/net8.0/playwright.ps1 install chromium
        working-directory: system-test/dotnet

      - name: Install Playwright System Dependencies
        timeout-minutes: 5
        run: pwsh SystemTests/bin/Debug/net8.0/playwright.ps1 install-deps chromium
        working-directory: system-test/dotnet

      - name: mod02 - Run Smoke Tests
        run: dotnet test --filter "FullyQualifiedName~.Legacy.Mod02.SmokeTests" --verbosity normal
        working-directory: system-test/dotnet
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: real

      - name: mod03 - Run E2E Tests
        run: dotnet test --filter "FullyQualifiedName~.Legacy.Mod03.E2eTests" --verbosity normal
        working-directory: system-test/dotnet
        env:
          ENVIRONMENT: acceptance

      - name: mod04 - Run Smoke Tests
        run: dotnet test --filter "FullyQualifiedName~.Legacy.Mod04.SmokeTests" --verbosity normal
        working-directory: system-test/dotnet
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: real

      - name: mod04 - Run E2E Tests
        run: dotnet test --filter "FullyQualifiedName~.Legacy.Mod04.E2eTests" --verbosity normal
        working-directory: system-test/dotnet
        env:
          ENVIRONMENT: acceptance

      - name: mod05 - Run Smoke Tests
        run: dotnet test --filter "FullyQualifiedName~.Legacy.Mod05.SmokeTests" --verbosity normal
        working-directory: system-test/dotnet
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: real

      - name: mod05 - Run E2E Tests
        run: dotnet test --filter "FullyQualifiedName~.Legacy.Mod05.E2eTests" --verbosity normal
        working-directory: system-test/dotnet
        env:
          ENVIRONMENT: acceptance

      - name: mod06 - Run Smoke Tests
        run: dotnet test --filter "FullyQualifiedName~.Legacy.Mod06.SmokeTests" --verbosity normal
        working-directory: system-test/dotnet
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: real

      - name: mod06 - Run E2E Tests - API Channel
        run: dotnet test --filter "FullyQualifiedName~.Legacy.Mod06.E2eTests" --verbosity normal
        working-directory: system-test/dotnet
        env:
          ENVIRONMENT: acceptance
          CHANNEL: API

      - name: mod06 - Run E2E Tests - UI Channel
        run: dotnet test --filter "FullyQualifiedName~.Legacy.Mod06.E2eTests" --verbosity normal
        working-directory: system-test/dotnet
        env:
          ENVIRONMENT: acceptance
          CHANNEL: UI

      - name: mod07 - Run Smoke Tests
        run: dotnet test --filter "FullyQualifiedName~.Legacy.Mod07.SmokeTests" --verbosity normal
        working-directory: system-test/dotnet
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: real

      - name: mod07 - Run E2E Tests - API Channel
        run: dotnet test --filter "FullyQualifiedName~.Legacy.Mod07.E2eTests" --verbosity normal
        working-directory: system-test/dotnet
        env:
          ENVIRONMENT: acceptance
          CHANNEL: API

      - name: mod07 - Run E2E Tests - UI Channel
        run: dotnet test --filter "FullyQualifiedName~.Legacy.Mod07.E2eTests" --verbosity normal
        working-directory: system-test/dotnet
        env:
          ENVIRONMENT: acceptance
          CHANNEL: UI

      - name: mod08 - Run Smoke Tests
        run: dotnet test --filter "FullyQualifiedName~.Legacy.Mod08.SmokeTests" --verbosity normal
        working-directory: system-test/dotnet
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: real

      - name: mod08 - Run E2E Tests - API Channel
        run: dotnet test --filter "FullyQualifiedName~.Legacy.Mod08.E2eTests" --verbosity normal
        working-directory: system-test/dotnet
        env:
          ENVIRONMENT: acceptance
          CHANNEL: API

      - name: mod08 - Run E2E Tests - UI Channel
        run: dotnet test --filter "FullyQualifiedName~.Legacy.Mod08.E2eTests" --verbosity normal
        working-directory: system-test/dotnet
        env:
          ENVIRONMENT: acceptance
          CHANNEL: UI

      - name: mod09 - Run Smoke Tests (Stub)
        run: dotnet test --filter "FullyQualifiedName~.Legacy.Mod09.SmokeTests" --verbosity normal
        working-directory: system-test/dotnet
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: stub

      - name: mod09 - Run Smoke Tests (Real)
        run: dotnet test --filter "FullyQualifiedName~.Legacy.Mod09.SmokeTests" --verbosity normal
        working-directory: system-test/dotnet
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: real

      - name: mod10 - Run Acceptance Tests - API Channel
        run: dotnet test --filter "FullyQualifiedName~.Legacy.Mod10.AcceptanceTests&Category!=isolated" --verbosity normal
        working-directory: system-test/dotnet
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: stub
          CHANNEL: API

      - name: mod10 - Run Acceptance Tests - UI Channel
        run: dotnet test --filter "FullyQualifiedName~.Legacy.Mod10.AcceptanceTests&Category!=isolated" --verbosity normal
        working-directory: system-test/dotnet
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: stub
          CHANNEL: UI

      - name: mod10 - Run Acceptance Tests (Isolated) - API Channel
        run: dotnet test --filter "FullyQualifiedName~.Legacy.Mod10.AcceptanceTests&Category=isolated" --verbosity normal
        working-directory: system-test/dotnet
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: stub
          CHANNEL: API

      - name: mod10 - Run Acceptance Tests (Isolated) - UI Channel
        run: dotnet test --filter "FullyQualifiedName~.Legacy.Mod10.AcceptanceTests&Category=isolated" --verbosity normal
        working-directory: system-test/dotnet
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: stub
          CHANNEL: UI

      - name: mod11 - Run Contract Tests (Stub)
        run: dotnet test --filter "FullyQualifiedName~.Legacy.Mod11.ExternalSystemContractTests&FullyQualifiedName~Stub&Category!=isolated" --verbosity normal
        working-directory: system-test/dotnet
        env:
          ENVIRONMENT: acceptance

      - name: mod11 - Run Contract Tests (Isolated) (Stub)
        run: dotnet test --filter "FullyQualifiedName~.Legacy.Mod11.ExternalSystemContractTests&FullyQualifiedName~Stub&Category=isolated" --verbosity normal
        working-directory: system-test/dotnet
        env:
          ENVIRONMENT: acceptance

      - name: mod11 - Run Contract Tests (Real)
        run: dotnet test --filter "FullyQualifiedName~.Legacy.Mod11.ExternalSystemContractTests&FullyQualifiedName~Real" --verbosity normal
        working-directory: system-test/dotnet
        env:
          ENVIRONMENT: acceptance

      - name: mod11 - Run E2E Tests - API Channel
        run: dotnet test --filter "FullyQualifiedName~.Legacy.Mod11.E2eTests" --verbosity normal
        working-directory: system-test/dotnet
        env:
          ENVIRONMENT: acceptance
          CHANNEL: API

      - name: mod11 - Run E2E Tests - UI Channel
        run: dotnet test --filter "FullyQualifiedName~.Legacy.Mod11.E2eTests" --verbosity normal
        working-directory: system-test/dotnet
        env:
          ENVIRONMENT: acceptance
          CHANNEL: UI

  summary:
    needs: [preflight, check, run]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
    - name: Summarize Stage
      uses: optivem/actions/render-system-stage-summary@v1
      with:
        stage-name: 'Acceptance Stage'
        stage-result: ${{ needs.run.result }}
        environment: acceptance
        success-version: latest
        skipped-reason: ${{ needs.preflight.outputs.skip-reason || needs.check.outputs.skip-reason }}
        latest-artifact-ids: ${{ needs.check.outputs.image-digest-urls }}
        latest-updated-at: ${{ needs.check.outputs.latest-updated-at }}
        last-run-at: ${{ needs.check.outputs.last-run-at }}
