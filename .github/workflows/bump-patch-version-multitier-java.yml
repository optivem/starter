name: bump-patch-version-multitier-java

# Per-flavor scaffold source for bump-patch-version (multitier-java, backend java + frontend react).
#
# Used by gh-optivem during `gh optivem init` to provide the bump-patch-version
# workflow for multitier-java student repos. After scaffold, this file is
# renamed to `bump-patch-version.yml` and content rewrites collapse the flavor
# prefix and image names (`multitier-backend-java` -> `backend`,
# `multitier-frontend-react` -> `frontend`), and the version-file paths
# (`system/multitier/backend-java` -> `backend`,
# `system/multitier/frontend-react` -> `frontend`).
#
# Triggered automatically at the end of prod-stage when a release is cut, or
# manually via workflow_dispatch to recover from a missed auto-run.
# Race-safe (Contents API with SHA preconditions). Idempotent: only bumps a
# VERSION file if its matching image tag is greater than the file's value.

on:
  workflow_call:
  workflow_dispatch:

concurrency:
  group: multitier-java-bump-patch-version

jobs:
  bump:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Compute Patch Bumps
        id: bump
        uses: optivem/actions/bump-patch-versions@v1
        with:
          version-files: |
            [
              {"path": "system/multitier/backend-java/VERSION",    "signal": "ghcr-image", "value": "ghcr.io/${{ github.repository }}/multitier-backend-java"},
              {"path": "system/multitier/frontend-react/VERSION",  "signal": "ghcr-image", "value": "ghcr.io/${{ github.repository }}/multitier-frontend-react"}
            ]

      - name: Build Commit Payload
        id: payload
        if: steps.bump.outputs.bumped == 'true'
        shell: bash
        env:
          BUMPS: ${{ steps.bump.outputs.bumps }}
        run: |
          set -euo pipefail
          files=$(jq -c '[.[] | {
            path: .path,
            content: ("\(.["new-version"])\n"),
            message: "Bump \(.path) \(.["old-version"]) -> \(.["new-version"]) (post \(.["release-signal"]))"
          }]' <<< "$BUMPS")
          echo "files=$files" >> "$GITHUB_OUTPUT"

      - name: Commit Bumped VERSION Files
        if: steps.bump.outputs.bumped == 'true'
        uses: optivem/actions/commit-files@v1
        with:
          files: ${{ steps.payload.outputs.files }}
          branch: main
          token: ${{ secrets.GITHUB_TOKEN }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
