name: monolith-java-bump-patch-version

# Per-flavor bumper for monolith-java. Bumps system/monolith/java/VERSION
# when monolith-java-v<n> advances. Triggered by monolith-java-prod-stage
# (post-release) and meta-bump-all (recovery). Doubles as a scaffold source
# for gh-optivem; after scaffold the path collapses to root VERSION.
# Race-safe (Contents API with SHA preconditions). Idempotent.

on:
  workflow_call:
  workflow_dispatch:

concurrency:
  group: monolith-java-bump-patch-version

jobs:
  bump:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Compute Patch Bumps
        id: bump
        uses: optivem/actions/bump-patch-versions@v1
        with:
          version-files: |
            [
              {"path": "system/monolith/java/VERSION", "value": "monolith-java-v"}
            ]

      - name: Build Commit Payload
        id: payload
        if: steps.bump.outputs.bumped == 'true'
        shell: bash
        env:
          BUMPS: ${{ steps.bump.outputs.bumps }}
        run: |
          set -euo pipefail
          files=$(jq -c '[.[] | {
            path: .path,
            content: ("\(.["new-version"])\n"),
            message: "Bump \(.path) \(.["old-version"]) -> \(.["new-version"]) (post \(.["release-signal"]))"
          }]' <<< "$BUMPS")
          echo "files=$files" >> "$GITHUB_OUTPUT"

      - name: Commit Bumped VERSION Files
        if: steps.bump.outputs.bumped == 'true'
        uses: optivem/actions/commit-files@v1
        with:
          files: ${{ steps.payload.outputs.files }}
          branch: main
          token: ${{ secrets.GITHUB_TOKEN }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
