name: multitier-dotnet-prod-stage

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Prerelease version to deploy (e.g., multitier-dotnet-v1.0.0-rc.1). Leave empty to deploy the latest QA-approved RC.'
        required: false
        type: string
        default: ''

concurrency:
  group: multitier-dotnet-prod-stage

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ inputs.version || steps.resolve-latest.outputs.base-tag }}
      image-urls: ${{ steps.resolve-images.outputs.image-urls }}
    steps:
      - name: Ensure Environment Variables Defined
        uses: optivem/actions/validate-env-vars-defined@v1
        with:
          names: |
            DOCKERHUB_USERNAME
            DOCKERHUB_TOKEN
            WORKFLOW_TOKEN
        env:
          DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          WORKFLOW_TOKEN: ${{ secrets.WORKFLOW_TOKEN }}

      - name: Resolve Latest QA-Approved RC
        id: resolve-latest
        if: inputs.version == ''
        uses: optivem/actions/resolve-latest-prerelease-tag@v1
        with:
          tag-prefix: multitier-dotnet-v
          tag-suffix: -qa-approved

      - name: Check RC Exists
        if: inputs.version != ''
        uses: optivem/actions/validate-tag-exists@v1
        with:
          tag: ${{ inputs.version }}

      - name: Check QA Approved
        if: inputs.version != ''
        uses: optivem/actions/validate-tag-exists@v1
        with:
          tag: ${{ inputs.version }}-qa-approved

      - name: Generate Release Version
        id: release-version
        uses: optivem/actions/compose-release-version@v1
        with:
          prerelease-version: ${{ inputs.version || steps.resolve-latest.outputs.base-tag }}

      - name: Check Version Already Released
        id: check-release-tag
        uses: optivem/actions/check-tag-exists@v1
        with:
          tag: ${{ steps.release-version.outputs.version }}

      - name: Verify Version Not Yet Released
        if: steps.check-release-tag.outputs.exists == 'true'
        shell: bash
        env:
          TAG: ${{ steps.release-version.outputs.version }}
        run: |
          echo "::error::Version $TAG is already released. Bump the VERSION file and create a new RC."
          exit 1

      - name: Compose Docker Image URLs
        id: resolve-images
        uses: optivem/actions/compose-docker-image-urls@v1
        with:
          tag: ${{ inputs.version || steps.resolve-latest.outputs.base-tag }}
          base-image-urls: |
            ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}/multitier-frontend-react
            ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}/multitier-backend-dotnet

  run:
    needs: check
    if: needs.check.result == 'success'
    runs-on: ubuntu-latest
    environment: multitier-dotnet-production
    permissions:
      contents: write
      packages: write
    outputs:
      version: ${{ steps.promote.outputs.version }}
      image-urls: ${{ needs.check.outputs.image-urls }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.check.outputs.version }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Simulate Deployment (Production Environment)
        id: deploy
        uses: optivem/actions/deploy-docker-compose@v1
        with:
          environment: production
          version: ${{ needs.check.outputs.version }}
          image-urls: ${{ needs.check.outputs.image-urls }}
          compose-file: docker-compose.pipeline.multitier.real.yml
          working-directory: system-test/dotnet

      - name: Wait for Systems (Simulate Deployment (Production Environment))
        uses: optivem/actions/wait-for-endpoints@v1
        with:
          endpoints: |
            [
              { "name": "Shop UI", "url": "http://localhost:3211/" },
              { "name": "Shop API", "url": "http://localhost:8211/health" },
              { "name": "ERP", "url": "http://localhost:9211/erp/health" },
              { "name": "Clock", "url": "http://localhost:9211/clock/health" }
            ]
          compose-file: docker-compose.pipeline.multitier.real.yml
          working-directory: system-test/dotnet

      - name: Generate Release Version
        id: promote
        uses: optivem/actions/compose-release-version@v1
        with:
          prerelease-version: ${{ needs.check.outputs.version }}

      - name: Tag Docker Images with System Release Version
        id: tag-images
        uses: optivem/actions/tag-docker-images@v1
        with:
          image-urls: ${{ needs.check.outputs.image-urls }}
          tag: ${{ steps.promote.outputs.version }}

      - name: Publish Release Tag
        uses: optivem/actions/publish-tag@v1
        with:
          tag: ${{ steps.promote.outputs.version }}
          token: ${{ secrets.WORKFLOW_TOKEN }}

      - name: Generate Release Notes
        id: release-notes
        uses: optivem/actions/generate-release-notes@v1
        with:
          prerelease-version: ${{ needs.check.outputs.version }}
          release-version: ${{ steps.promote.outputs.version }}
          artifact-urls: ${{ steps.tag-images.outputs.tagged-image-urls }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.promote.outputs.version }}
          name: ${{ steps.release-notes.outputs.title }}
          body_path: ${{ steps.release-notes.outputs.notes-file }}
          prerelease: false

      - name: Create Component Tags
        uses: optivem/actions/create-component-tags@v1
        with:
          components: |
            multitier-backend-dotnet:system/multitier/backend-dotnet/VERSION
            multitier-frontend-react:system/multitier/frontend-react/VERSION
          token: ${{ secrets.WORKFLOW_TOKEN }}

      - name: Read Component Base Versions
        id: read-component-versions
        uses: optivem/actions/read-base-versions@v1
        with:
          entries: |
            [
              {"key": "ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}/multitier-backend-dotnet:${{ needs.check.outputs.version }}",
               "file": "system/multitier/backend-dotnet/VERSION"},
              {"key": "ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}/multitier-frontend-react:${{ needs.check.outputs.version }}",
               "file": "system/multitier/frontend-react/VERSION"}
            ]

      - name: Compose Component Tags
        id: compose-component-tags
        uses: optivem/actions/compose-tags@v1
        with:
          versions: ${{ steps.read-component-versions.outputs.versions }}

      - name: Tag Docker Images with Component Release Versions
        uses: optivem/actions/tag-docker-images@v1
        with:
          image-tags: ${{ steps.compose-component-tags.outputs.tags }}

  summary:
    needs: [check, run]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
    - name: Summarize Stage
      uses: optivem/actions/render-system-stage-summary@v1
      with:
        stage-name: 'Production Stage'
        stage-result: ${{ needs.run.result }}
        environment: production
        success-version: ${{ needs.run.outputs.version }}
        success-artifact-ids: ${{ needs.run.outputs.image-urls }}
