name: monolith-typescript-qa-signoff

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version that was tested in QA (e.g., monolith-typescript-v1.0.0-rc.1). Leave empty to sign off on the latest RC deployed to QA.'
        required: false
        type: string
        default: ''
      result:
        description: 'QA testing result'
        required: true
        type: choice
        options:
          - approved
          - rejected

concurrency:
  group: monolith-typescript-qa-signoff

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ inputs.version || steps.resolve-latest.outputs.ref }}
    steps:
      - name: Ensure Environment Variables Defined
        uses: optivem/actions/validate-env-vars-defined@v1
        with:
          names: |
            WORKFLOW_TOKEN
        env:
          WORKFLOW_TOKEN: ${{ secrets.WORKFLOW_TOKEN }}

      - name: Resolve Latest QA-Deployed RC
        id: resolve-latest
        if: inputs.version == ''
        uses: optivem/actions/resolve-latest-deployed-prerelease@v1
        with:
          environment: monolith-typescript-qa
          ref-prefix: monolith-typescript-v
          token: ${{ secrets.WORKFLOW_TOKEN }}

      - name: Check RC Exists
        if: inputs.version != ''
        uses: optivem/actions/validate-tag-exists@v1
        with:
          tag: ${{ inputs.version }}

  run:
    needs: check
    if: needs.check.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ needs.check.outputs.version }}
      stage-result: ${{ inputs.result == 'approved' && 'success' || 'failure' }}
    steps:
      - name: Record QA Signoff Check Run
        uses: optivem/actions/create-check-run@v1
        with:
          ref: ${{ needs.check.outputs.version }}
          name: qa/signoff
          conclusion: ${{ inputs.result == 'approved' && 'success' || 'failure' }}
          title: QA ${{ inputs.result == 'approved' && 'Approved' || 'Rejected' }}
          summary: Manual QA tester ${{ inputs.result }} ${{ needs.check.outputs.version }}
          token: ${{ secrets.WORKFLOW_TOKEN }}

  summary:
    needs: [check, run]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v6

    - name: Summarize Stage
      uses: optivem/actions/render-system-stage-summary@v1
      with:
        stage-name: 'QA Signoff'
        stage-result: ${{ needs.run.outputs.stage-result }}
        environment: qa
        success-version: ${{ needs.run.outputs.version }}
