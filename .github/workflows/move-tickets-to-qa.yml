name: move-tickets-to-qa

# Advances every project board ticket in "In Acceptance" to "In QA"
# whenever meta-prerelease-stage finishes successfully. The meta-rc tag
# produced by that run is the cross-lang-green proof for whatever is on
# main, so any ticket a dev had moved to "In Acceptance" (signalling
# "code is on main, awaiting verification") is now verified by this run.
#
# On failure the workflow does nothing — tickets stay in In Acceptance
# and the failed meta-prerelease-stage run is visible in the Actions tab
# for devs to investigate.
#
# The default GITHUB_TOKEN cannot write to organization-level projects,
# so this workflow uses WORKFLOW_TOKEN (PAT). The PAT needs `project`
# scope (read+write) on the optivem org.

on:
  workflow_run:
    workflows: ["meta-prerelease-stage"]
    types: [completed]

concurrency:
  group: move-tickets-to-qa
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  move:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Advance "In Acceptance" tickets to "In QA"
        env:
          GH_TOKEN: ${{ secrets.WORKFLOW_TOKEN }}
          PROJECT_ID: PVT_kwDOAMwK8c4BT1wk
          STATUS_FIELD_ID: PVTSSF_lADOAMwK8c4BT1wkzhBB4qY
          IN_ACCEPTANCE_OPTION_ID: ea49776a
          IN_QA_OPTION_ID: 6c7ccd07
          SOURCE_RUN_NUMBER: ${{ github.event.workflow_run.run_number }}
          SOURCE_RUN_URL: ${{ github.event.workflow_run.html_url }}
        run: |
          set -euo pipefail

          moved=0
          cursor=""

          while :; do
            if [[ -z "$cursor" ]]; then
              AFTER='null'
            else
              AFTER="\"$cursor\""
            fi

            response=$(gh api graphql -f query="
              query {
                node(id: \"$PROJECT_ID\") {
                  ... on ProjectV2 {
                    items(first: 100, after: $AFTER) {
                      pageInfo { hasNextPage endCursor }
                      nodes {
                        id
                        content {
                          ... on Issue       { number title }
                          ... on PullRequest { number title }
                        }
                        fieldValueByName(name: \"Status\") {
                          ... on ProjectV2ItemFieldSingleSelectValue {
                            optionId
                          }
                        }
                      }
                    }
                  }
                }
              }
            ")

            mapfile -t to_move < <(
              echo "$response" | jq -r \
                --arg opt "$IN_ACCEPTANCE_OPTION_ID" '
                  .data.node.items.nodes[]
                  | select(.fieldValueByName.optionId == $opt)
                  | "\(.id)\t#\(.content.number // "?") \(.content.title // "(untitled)")"
                '
            )

            for entry in "${to_move[@]}"; do
              [[ -z "$entry" ]] && continue
              item_id="${entry%%$'\t'*}"
              label="${entry#*$'\t'}"
              echo "Advancing $label  (item $item_id)"
              gh api graphql \
                -F projectId="$PROJECT_ID" \
                -F itemId="$item_id" \
                -F fieldId="$STATUS_FIELD_ID" \
                -F optionId="$IN_QA_OPTION_ID" \
                -f query='
                  mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $optionId: String!) {
                    updateProjectV2ItemFieldValue(input: {
                      projectId: $projectId,
                      itemId: $itemId,
                      fieldId: $fieldId,
                      value: { singleSelectOptionId: $optionId }
                    }) {
                      projectV2Item { id }
                    }
                  }' > /dev/null
              moved=$((moved + 1))
            done

            has_next=$(echo "$response" | jq -r '.data.node.items.pageInfo.hasNextPage')
            cursor=$(echo "$response" | jq -r '.data.node.items.pageInfo.endCursor')
            [[ "$has_next" == "true" ]] || break
          done

          echo "Moved $moved ticket(s) from 'In Acceptance' to 'In QA'."
          {
            echo "## Tickets advanced to In QA"
            echo ""
            echo "- Source: meta-prerelease-stage run [#${SOURCE_RUN_NUMBER}](${SOURCE_RUN_URL}) (success)"
            echo "- Tickets moved: **${moved}**"
          } >> "$GITHUB_STEP_SUMMARY"
