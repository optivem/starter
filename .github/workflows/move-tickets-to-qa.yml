name: move-tickets-to-qa

# Advances every project board ticket in "In Acceptance" to "In QA"
# whenever meta-prerelease-stage finishes successfully. The meta-rc tag
# produced by that run is the cross-lang-green proof for whatever is on
# main, so any ticket a dev had moved to "In Acceptance" (signalling
# "code is on main, awaiting verification") is now verified by this run.
#
# On failure the workflow does nothing — tickets stay in In Acceptance
# and the failed meta-prerelease-stage run is visible in the Actions tab
# for devs to investigate.
#
# The default GITHUB_TOKEN cannot write to organization-level projects,
# so this workflow uses PROJECT_TOKEN (PAT). The PAT needs `project`
# scope (read+write) on the optivem org.

on:
  workflow_run:
    workflows: ["meta-prerelease-stage"]
    types: [completed]

concurrency:
  group: move-tickets-to-qa
  cancel-in-progress: false

permissions:
  contents: read

env:
  PROJECT_TITLE: "Shop Project"
  STATUS_FIELD: "Status"
  FROM_OPTION: "In Acceptance"
  TO_OPTION: "In QA"

jobs:
  move:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Resolve project / field / option IDs
        id: resolve
        uses: optivem/actions/resolve-project-status-field@v1
        with:
          project-title: ${{ env.PROJECT_TITLE }}
          field-name: ${{ env.STATUS_FIELD }}
          token: ${{ secrets.PROJECT_TOKEN }}

      - name: Pick from/to option IDs
        id: pick
        env:
          OPTIONS_JSON: ${{ steps.resolve.outputs.options-json }}
          FROM_OPTION: ${{ env.FROM_OPTION }}
          TO_OPTION: ${{ env.TO_OPTION }}
        run: |
          set -euo pipefail
          from=$(echo "$OPTIONS_JSON" | jq -r --arg n "$FROM_OPTION" '.[$n] // empty')
          to=$(echo "$OPTIONS_JSON" | jq -r --arg n "$TO_OPTION"   '.[$n] // empty')
          if [[ -z "$from" ]]; then
            echo "::error::No option named '$FROM_OPTION' on field '$STATUS_FIELD'."
            exit 1
          fi
          if [[ -z "$to" ]]; then
            echo "::error::No option named '$TO_OPTION' on field '$STATUS_FIELD'."
            exit 1
          fi
          echo "from-option-id=$from" >> "$GITHUB_OUTPUT"
          echo "to-option-id=$to" >> "$GITHUB_OUTPUT"

      - name: Advance "In Acceptance" tickets to "In QA"
        id: advance
        uses: optivem/actions/bulk-update-project-item-status@v1
        with:
          project-id: ${{ steps.resolve.outputs.project-id }}
          field-id: ${{ steps.resolve.outputs.field-id }}
          from-option-id: ${{ steps.pick.outputs.from-option-id }}
          to-option-id: ${{ steps.pick.outputs.to-option-id }}
          token: ${{ secrets.PROJECT_TOKEN }}

      - name: Summary
        env:
          MOVED: ${{ steps.advance.outputs.items-moved }}
          SOURCE_RUN_NUMBER: ${{ github.event.workflow_run.run_number }}
          SOURCE_RUN_URL: ${{ github.event.workflow_run.html_url }}
        run: |
          {
            echo "## Tickets advanced to ${TO_OPTION}"
            echo ""
            echo "- Source: meta-prerelease-stage run [#${SOURCE_RUN_NUMBER}](${SOURCE_RUN_URL}) (success)"
            echo "- Tickets moved: **${MOVED}**"
          } >> "$GITHUB_STEP_SUMMARY"
