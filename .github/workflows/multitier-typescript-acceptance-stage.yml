name: multitier-typescript-acceptance-stage

on:
  schedule:
    - cron: '0 * * * *'  # Run every hour
  workflow_dispatch:
    inputs:
      sha:
        description: 'Git SHA to test (leave empty for latest image)'
        required: false
        type: string

concurrency:
  group: multitier-typescript-acceptance-stage

jobs:
  preflight:
    runs-on: ubuntu-latest
    permissions:
      packages: read
    outputs:
      artifacts-exist: ${{ steps.check-artifacts.outputs.exist }}
      skip-reason: ${{ steps.check-artifacts.outputs.exist != 'true' && 'No artifacts published yet — waiting for the commit stage to produce images.' || '' }}
    steps:
      - name: Check Container Packages Exist
        id: check-artifacts
        uses: optivem/actions/check-ghcr-packages-exist@v1

  check:
    needs: preflight
    if: needs.preflight.outputs.artifacts-exist == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      should-run: ${{ steps.should-run.outputs.changed }}
      skip-reason: ${{ steps.should-run.outputs.changed != 'true' && 'No new artifacts since the last successful run.' || '' }}
      image-digest-urls: ${{ steps.find-latest.outputs.image-digest-urls }}
      latest-updated-at: ${{ steps.find-latest.outputs.latest-updated-at }}
      last-run-at: ${{ steps.should-run.outputs.last-run-at }}
    steps:
      - name: Ensure Environment Variables Defined
        uses: optivem/actions/ensure-env-vars-defined@v1
        with:
          names: |
            DOCKERHUB_USERNAME
            DOCKERHUB_TOKEN
        env:
          DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ inputs.sha || github.sha }}

      - name: Read Target Version
        id: read-target-version
        uses: optivem/actions/read-target-version@v1

      - name: Ensure Version Unreleased
        uses: optivem/actions/ensure-version-unreleased@v1
        with:
          version: multitier-typescript-v${{ steps.read-target-version.outputs.target-version }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Resolve Docker Image Digests
        id: find-latest
        uses: optivem/actions/resolve-docker-image-digests@v1
        with:
          image-urls: |
            ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}/multitier-frontend-react:${{ inputs.sha || 'latest' }}
            ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}/multitier-backend-typescript:${{ inputs.sha || 'latest' }}

      - name: Check for Docker Image Updates Since Last Run
        id: should-run
        uses: optivem/actions/check-update-since-last-github-workflow-run@v1
        with:
          last-updated-at: ${{ steps.find-latest.outputs.latest-updated-at }}
          workflow-name: ${{ github.workflow }}

  run:
    needs: check
    if: needs.check.outputs.should-run == 'true'
    runs-on: ubuntu-latest
    environment: multitier-typescript-acceptance
    permissions:
      contents: read
      packages: write
    outputs:
      version: ${{ steps.generate-version.outputs.version }}
      image-urls: ${{ steps.tag-images.outputs.image-urls }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ inputs.sha || github.sha }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Simulate Deployment (Real External Systems)
        uses: optivem/actions/deploy-docker-compose@v1
        with:
          environment: acceptance
          version: latest
          image-urls: ${{ needs.check.outputs.image-digest-urls }}
          compose-file: docker-compose.pipeline.multitier.real.yml
          working-directory: system-test/typescript

      - name: Wait for Systems (Simulate Deployment (Real External Systems))
        uses: optivem/actions/wait-for-urls@v1
        with:
          systems: |
            [
              { "name": "Shop UI", "url": "http://localhost:3311/" },
              { "name": "Shop API", "url": "http://localhost:8311/health" },
              { "name": "ERP", "url": "http://localhost:9311/erp/health" },
              { "name": "Clock", "url": "http://localhost:9311/clock/health" }
            ]
          compose-file: docker-compose.pipeline.multitier.real.yml
          working-directory: system-test/typescript

      - name: Simulate Deployment (Stub External Systems)
        uses: optivem/actions/deploy-docker-compose@v1
        with:
          environment: acceptance
          version: latest
          image-urls: ${{ needs.check.outputs.image-digest-urls }}
          compose-file: docker-compose.pipeline.multitier.stub.yml
          working-directory: system-test/typescript

      - name: Wait for Systems (Simulate Deployment (Stub External Systems))
        uses: optivem/actions/wait-for-urls@v1
        with:
          systems: |
            [
              { "name": "Shop UI", "url": "http://localhost:3312/" },
              { "name": "Shop API", "url": "http://localhost:8312/health" },
              { "name": "ERP", "url": "http://localhost:9312/erp/health" },
              { "name": "Clock", "url": "http://localhost:9312/clock/health" }
            ]
          compose-file: docker-compose.pipeline.multitier.stub.yml
          working-directory: system-test/typescript

      - name: Setup Node
        uses: optivem/actions/setup-node@v1
        with:
          node-version: 22.x
          working-directory: system-test/typescript

      - name: Cache Playwright Browsers
        id: cache-playwright
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('system-test/typescript/package-lock.json') }}

      - name: Install Playwright Browsers
        if: steps.cache-playwright.outputs.cache-hit != 'true'
        working-directory: system-test/typescript
        run: npx playwright install chromium

      - name: Install Playwright System Dependencies
        working-directory: system-test/typescript
        run: npx playwright install-deps chromium

      # TODO(debug-smoke-0-tests): temporary diagnostic scaffolding — remove once the
      # "Total tests: 0" failure on CI is resolved. Isolates whether the custom
      # channel-list-reporter or Playwright core is responsible for 0 discovered tests.
      - name: Debug Smoke Discovery
        working-directory: system-test/typescript
        run: |
          echo "--- pwd ---"
          pwd
          echo "--- tree tests/latest/smoke ---"
          ls -laR tests/latest/smoke
          echo "--- playwright --list (default reporter, via project) ---"
          npx playwright test --project=smoke-test tests/latest/smoke --list || true
          echo "--- playwright --list (line reporter, bypass custom channel-list-reporter) ---"
          npx playwright test --reporter=line tests/latest/smoke --list || true
          echo "--- playwright.config.ts ---"
          cat playwright.config.ts || true
          echo "--- file(1) on smoke spec files (encoding/line-ending check) ---"
          for f in tests/latest/smoke/**/*.spec.ts tests/latest/smoke/*.spec.ts; do
            if [ -e "$f" ]; then
              file "$f" || true
            fi
          done
          echo "--- playwright version ---"
          npx playwright --version
          echo "--- optivem-testing package.json presence ---"
          ls node_modules/@optivem/optivem-testing/package.json || true
          echo "--- installed playwright packages ---"
          npm ls --all 2>/dev/null | grep -iE "playwright|optivem-testing" || true

      - name: Run Smoke Tests (Stub)
        working-directory: system-test/typescript
        run: npx playwright test --project=smoke-test tests/latest/smoke
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: stub

      - name: Run Smoke Tests (Real)
        working-directory: system-test/typescript
        run: npx playwright test --project=smoke-test tests/latest/smoke
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: real

      - name: Run Acceptance Tests - API Channel
        working-directory: system-test/typescript
        run: npx playwright test --project=acceptance-test tests/latest/acceptance --grep-invert "@isolated"
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: stub
          CHANNEL: api

      - name: Run Acceptance Tests - UI Channel
        working-directory: system-test/typescript
        run: npx playwright test --project=acceptance-test tests/latest/acceptance --grep-invert "@isolated"
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: stub
          CHANNEL: ui
          CHANNEL_MODE: static

      - name: Run Acceptance Tests (Isolated) - API Channel
        working-directory: system-test/typescript
        run: npx playwright test --project=acceptance-test tests/latest/acceptance --grep "@isolated" --workers=1
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: stub
          CHANNEL: api

      - name: Run Acceptance Tests (Isolated) - UI Channel
        working-directory: system-test/typescript
        run: npx playwright test --project=acceptance-test tests/latest/acceptance --grep "@isolated" --workers=1
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: stub
          CHANNEL: ui
          CHANNEL_MODE: static

      - name: Run Contract Tests (Stub)
        working-directory: system-test/typescript
        run: npx playwright test --project=external-system-contract-test tests/latest/contract --grep-invert "@isolated" --workers=1
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: stub

      - name: Run Contract Tests (Isolated) (Stub)
        working-directory: system-test/typescript
        run: npx playwright test --project=external-system-contract-test tests/latest/contract --grep "@isolated" --workers=1
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: stub

      - name: Run Contract Tests (Real)
        working-directory: system-test/typescript
        run: npx playwright test --project=external-system-contract-test "tests/latest/contract/.*-real-.*\.spec\.ts" --workers=1
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: real

      - name: Run E2E Tests - API Channel
        working-directory: system-test/typescript
        run: npx playwright test --project=e2e-test tests/latest/e2e
        env:
          ENVIRONMENT: acceptance
          CHANNEL: api

      - name: Run E2E Tests - UI Channel
        working-directory: system-test/typescript
        run: npx playwright test --project=e2e-test tests/latest/e2e
        env:
          ENVIRONMENT: acceptance
          CHANNEL: ui
          CHANNEL_MODE: static

      - name: Read Target System Version
        id: read-version
        uses: optivem/actions/read-target-version@v1

      - name: Generate Prerelease Version
        id: generate-version
        uses: optivem/actions/compose-prerelease-version@v1
        with:
          target-version: ${{ steps.read-version.outputs.target-version }}
          suffix: rc
          number: ${{ github.run_number }}
          prefix: multitier-typescript

      - name: Tag Docker Images for Prerelease
        id: tag-images
        uses: optivem/actions/promote-docker-images@v1
        with:
          image-urls: ${{ needs.check.outputs.image-digest-urls }}
          tag: ${{ steps.generate-version.outputs.version }}

  publish-tag:
    needs: run
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.sha || github.sha }}

      - name: Publish Git Tag
        uses: optivem/actions/publish-tag@v1
        with:
          tag: ${{ needs.run.outputs.version }}
          token: ${{ secrets.WORKFLOW_TOKEN }}

  summary:
    needs: [preflight, check, run, publish-tag]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
    - name: Summarize Stage
      uses: optivem/actions/render-system-stage-summary@v1
      with:
        stage-name: 'Acceptance Stage'
        environment: acceptance
        stage-result: ${{ needs.publish-tag.result == 'failure' && 'failure' || needs.run.result }}
        success-version: ${{ needs.run.outputs.version }}
        success-artifact-ids: ${{ needs.run.outputs.image-urls }}
        skipped-reason: ${{ needs.preflight.outputs.skip-reason || needs.check.outputs.skip-reason }}
        latest-artifact-ids: ${{ needs.check.outputs.image-digest-urls }}
        latest-updated-at: ${{ needs.check.outputs.latest-updated-at }}
        last-run-at: ${{ needs.check.outputs.last-run-at }}
