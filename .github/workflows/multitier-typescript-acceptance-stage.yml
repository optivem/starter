name: multitier-typescript-acceptance-stage

on:
  schedule:
    - cron: '0 * * * *'  # Run every hour
  workflow_dispatch:

concurrency:
  group: multitier-typescript-acceptance-stage

jobs:
  preflight:
    runs-on: ubuntu-latest
    permissions:
      packages: read
    outputs:
      artifacts-exist: ${{ steps.check-artifacts.outputs.exist }}
    steps:
      - name: Check Artifacts Exist
        id: check-artifacts
        uses: optivem/actions/check-artifacts-exist@v1

  check:
    needs: preflight
    if: needs.preflight.outputs.artifacts-exist == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      should-run: ${{ steps.should-run.outputs.should-run }}
      image-digest-urls: ${{ steps.find-latest.outputs.image-digest-urls }}
    steps:
      - name: Validate Config
        uses: optivem/actions/validate-config@v1
        with:
          names: |
            DOCKERHUB_USERNAME
            DOCKERHUB_TOKEN
        env:
          DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Check Target Version Exists
        uses: optivem/actions/check-target-version-exists@v1

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Find Latest Artifacts
        id: find-latest
        uses: optivem/actions/find-latest-docker-images@v1
        with:
          image-urls: |
            ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}/multitier-frontend-react:latest
            ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}/multitier-backend-typescript:latest

      - name: Check Run Conditions
        id: should-run
        uses: optivem/actions/should-run-acceptance-stage@v1
        with:
          latest-image-timestamp: ${{ steps.find-latest.outputs.latest-image-timestamp }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  run:
    needs: check
    if: needs.check.outputs.should-run == 'true'
    runs-on: ubuntu-latest
    environment: multitier-typescript-acceptance
    permissions:
      contents: write
      packages: write
    outputs:
      version: ${{ steps.promote-to-rc.outputs.version }}
      image-urls: ${{ steps.promote-to-rc.outputs.image-urls }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Deploy System (Real External Systems)
        uses: optivem/actions/simulate-deployment@v1
        with:
          environment: acceptance
          version: latest
          image-urls: ${{ needs.check.outputs.image-digest-urls }}
          compose-file: docker-compose.pipeline.multitier.real.yml
          systems: |
            [
              { "name": "Shop UI", "url": "http://localhost:3311/" },
              { "name": "Shop API", "url": "http://localhost:8311/health" },
              { "name": "ERP", "url": "http://localhost:9311/erp/health" },
              { "name": "Clock", "url": "http://localhost:9311/clock/health" }
            ]
          working-directory: system-test/typescript

      - name: Deploy System (Stub External Systems)
        uses: optivem/actions/simulate-deployment@v1
        with:
          environment: acceptance
          version: latest
          image-urls: ${{ needs.check.outputs.image-digest-urls }}
          compose-file: docker-compose.pipeline.multitier.stub.yml
          systems: |
            [
              { "name": "Shop UI", "url": "http://localhost:3312/" },
              { "name": "Shop API", "url": "http://localhost:8312/health" },
              { "name": "ERP", "url": "http://localhost:9312/erp/health" },
              { "name": "Clock", "url": "http://localhost:9312/clock/health" }
            ]
          working-directory: system-test/typescript

      - name: Setup Runtime
        uses: optivem/actions/setup-node@v1
        with:
          node-version: 22.x
          working-directory: system-test/typescript

      - name: Cache Playwright Browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('system-test/typescript/package-lock.json') }}

      - name: Install Playwright Dependencies
        working-directory: system-test/typescript
        run: npx playwright install --with-deps chromium

      - name: Run Smoke Tests (Stub)
        working-directory: system-test/typescript
        run: npm test -- test/latest/smoke
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: stub

      - name: Run Smoke Tests (Real)
        working-directory: system-test/typescript
        run: npm test -- test/latest/smoke
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: real

      - name: Run Acceptance Tests - API Channel
        working-directory: system-test/typescript
        run: npm test -- test/latest/acceptance --testPathIgnorePatterns=isolated
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: stub
          CHANNEL: API

      - name: Run Acceptance Tests - UI Channel
        working-directory: system-test/typescript
        run: npm test -- test/latest/acceptance --testPathIgnorePatterns=isolated
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: stub
          CHANNEL: UI
          CHANNEL_MODE: static

      - name: Run Acceptance Tests (Isolated) - API Channel
        working-directory: system-test/typescript
        run: npm test -- "test/latest/acceptance/.*isolated" --runInBand
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: stub
          CHANNEL: API

      - name: Run Acceptance Tests (Isolated) - UI Channel
        working-directory: system-test/typescript
        run: npm test -- "test/latest/acceptance/.*isolated" --runInBand
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: stub
          CHANNEL: UI
          CHANNEL_MODE: static

      - name: Run Contract Tests (Stub)
        working-directory: system-test/typescript
        run: npm test -- test/latest/contract --testPathIgnorePatterns=isolated
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: stub

      - name: Run Contract Tests (Isolated) (Stub)
        working-directory: system-test/typescript
        run: npm test -- "test/latest/contract/.*isolated" --runInBand
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: stub

      - name: Run Contract Tests (Real)
        working-directory: system-test/typescript
        run: npm test -- test/latest/contract
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: real

      - name: Run E2E Tests - API Channel
        working-directory: system-test/typescript
        run: npm test -- test/latest/e2e
        env:
          ENVIRONMENT: acceptance
          CHANNEL: API

      - name: Run E2E Tests - UI Channel
        working-directory: system-test/typescript
        run: npm test -- test/latest/e2e
        env:
          ENVIRONMENT: acceptance
          CHANNEL: UI
          CHANNEL_MODE: static

      - name: Read Target Version
        id: read-version
        uses: optivem/actions/read-target-version@v1

      - name: Promote to RC
        id: promote-to-rc
        uses: optivem/actions/promote-to-rc@v1
        with:
          target-version: ${{ steps.read-version.outputs.target-version }}
          image-urls: ${{ needs.check.outputs.image-digest-urls }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  summary:
    needs: [check, run]
    if: always()
    runs-on: ubuntu-latest
    steps:
    - name: Summarize Stage
      uses: optivem/actions/summarize-system-stage@v1
      with:
        stage-name: 'Acceptance Stage'
        environment: acceptance
        stage-result: ${{ needs.run.result }}
        success-version: ${{ needs.run.outputs.version }}
        success-artifact-ids: ${{ needs.run.outputs.image-urls }}
