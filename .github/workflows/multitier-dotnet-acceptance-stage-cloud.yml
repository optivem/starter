name: multitier-dotnet-acceptance-stage-cloud

on:
  workflow_dispatch:

concurrency:
  group: multitier-dotnet-acceptance-stage-cloud

jobs:
  preflight:
    runs-on: ubuntu-latest
    permissions:
      packages: read
    outputs:
      artifacts-exist: ${{ steps.check-artifacts.outputs.exist }}
    steps:
      - name: Check Artifacts Exist
        id: check-artifacts
        uses: optivem/actions/check-artifacts-exist@v1

  check:
    needs: preflight
    if: needs.preflight.outputs.artifacts-exist == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      should-run: ${{ steps.should-run.outputs.should-run }}
      image-digest-urls: ${{ steps.find-latest.outputs.image-digest-urls }}
    steps:
      - name: Validate Config
        uses: optivem/actions/validate-config@v1
        with:
          names: |
            DOCKERHUB_USERNAME
            DOCKERHUB_TOKEN
            GCP_PROJECT_ID
            GCP_REGION
            GCP_WORKLOAD_IDENTITY_PROVIDER
            GCP_SERVICE_ACCOUNT
        env:
          DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          GCP_REGION: ${{ vars.GCP_REGION }}
          GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          GCP_SERVICE_ACCOUNT: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Check Target Version Exists
        uses: optivem/actions/check-target-version-exists@v1

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Find Latest Artifacts
        id: find-latest
        uses: optivem/actions/find-latest-docker-images@v1
        with:
          image-urls: |
            ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}/multitier-frontend-react:latest
            ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}/multitier-backend-dotnet:latest

      - name: Check Run Conditions
        id: should-run
        uses: optivem/actions/should-run-acceptance-stage@v1
        with:
          latest-image-timestamp: ${{ steps.find-latest.outputs.latest-image-timestamp }}
          workflow-name: ${{ github.workflow }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy-frontend:
    needs: check
    if: needs.check.outputs.should-run == 'true'
    runs-on: ubuntu-latest
    environment: multitier-dotnet-acceptance
    permissions:
      contents: read
      id-token: write
    outputs:
      app-url: ${{ steps.deploy.outputs.service-url }}
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Setup Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy Frontend to Cloud Run
        id: deploy
        uses: optivem/actions/deploy-to-cloud-run@v1
        with:
          environment: acceptance
          version: latest
          image-url: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}/multitier-frontend-react:latest
          project-id: ${{ vars.GCP_PROJECT_ID }}
          region: ${{ vars.GCP_REGION }}
          service-name: multitier-dotnet-frontend
          port: '3000'

  deploy-backend:
    needs: check
    if: needs.check.outputs.should-run == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    outputs:
      app-url: ${{ steps.deploy.outputs.service-url }}
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Setup Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy Backend to Cloud Run
        id: deploy
        uses: optivem/actions/deploy-to-cloud-run@v1
        with:
          environment: acceptance
          version: latest
          image-url: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}/multitier-backend-dotnet:latest
          project-id: ${{ vars.GCP_PROJECT_ID }}
          region: ${{ vars.GCP_REGION }}
          service-name: multitier-dotnet-backend
          port: '8080'
          env-vars: |
            ASPNETCORE_ENVIRONMENT=Cloud
          secrets: |
            DATABASE_URL=db-connection-string:latest

  deploy-external-real:
    needs: check
    if: needs.check.outputs.should-run == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    outputs:
      external-url: ${{ steps.deploy.outputs.service-url }}
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Setup Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy External Real to Cloud Run
        id: deploy
        uses: optivem/actions/deploy-to-cloud-run@v1
        with:
          environment: acceptance
          version: latest
          image-url: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}/external-real-sim:latest
          project-id: ${{ vars.GCP_PROJECT_ID }}
          region: ${{ vars.GCP_REGION }}
          service-name: external-real
          port: '9000'

  deploy-external-stub:
    needs: check
    if: needs.check.outputs.should-run == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    outputs:
      external-url: ${{ steps.deploy.outputs.service-url }}
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Setup Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy External Stub to Cloud Run
        id: deploy
        uses: optivem/actions/deploy-to-cloud-run@v1
        with:
          environment: acceptance
          version: latest
          image-url: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}/external-stub:latest
          project-id: ${{ vars.GCP_PROJECT_ID }}
          region: ${{ vars.GCP_REGION }}
          service-name: external-stub
          port: '8080'

  test-smoke-real:
    needs: [deploy-frontend, deploy-backend, deploy-external-real]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Runtime
        uses: optivem/actions/setup-dotnet@v1
        with:
          dotnet-version: 8.0.x

      - name: Cache NuGet Packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('system-test/dotnet/**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Build Test Project
        run: dotnet build
        working-directory: system-test/dotnet

      - name: Run Smoke Tests (Real)
        run: dotnet test --filter "FullyQualifiedName~.Latest.SmokeTests" --verbosity normal
        working-directory: system-test/dotnet
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: real
          BASE_URL: ${{ needs.deploy-frontend.outputs.app-url }}
          EXTERNAL_BASE_URL: ${{ needs.deploy-external-real.outputs.external-url }}

  test-smoke-stub:
    needs: [deploy-frontend, deploy-backend, deploy-external-stub]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Runtime
        uses: optivem/actions/setup-dotnet@v1
        with:
          dotnet-version: 8.0.x

      - name: Cache NuGet Packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('system-test/dotnet/**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Build Test Project
        run: dotnet build
        working-directory: system-test/dotnet

      - name: Run Smoke Tests (Stub)
        run: dotnet test --filter "FullyQualifiedName~.Latest.SmokeTests" --verbosity normal
        working-directory: system-test/dotnet
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: stub
          BASE_URL: ${{ needs.deploy-frontend.outputs.app-url }}
          EXTERNAL_BASE_URL: ${{ needs.deploy-external-stub.outputs.external-url }}

  test-acceptance-api:
    needs: [deploy-frontend, deploy-backend, deploy-external-real]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Runtime
        uses: optivem/actions/setup-dotnet@v1
        with:
          dotnet-version: 8.0.x

      - name: Cache NuGet Packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('system-test/dotnet/**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Build Test Project
        run: dotnet build
        working-directory: system-test/dotnet

      - name: Run Acceptance Tests - API Channel
        run: dotnet test --filter "FullyQualifiedName~.Latest.AcceptanceTests&Category!=isolated" --verbosity normal
        working-directory: system-test/dotnet
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: stub
          CHANNEL: API
          BASE_URL: ${{ needs.deploy-frontend.outputs.app-url }}
          EXTERNAL_BASE_URL: ${{ needs.deploy-external-real.outputs.external-url }}

  test-acceptance-ui:
    needs: [deploy-frontend, deploy-backend, deploy-external-real]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Runtime
        uses: optivem/actions/setup-dotnet@v1
        with:
          dotnet-version: 8.0.x

      - name: Cache NuGet Packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('system-test/dotnet/**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Build Test Project
        run: dotnet build
        working-directory: system-test/dotnet

      - name: Cache Playwright Browsers
        id: cache-playwright
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('system-test/dotnet/**/*.csproj') }}

      - name: Install Playwright Dependencies
        if: steps.cache-playwright.outputs.cache-hit != 'true'
        run: |
          pwsh SystemTests/bin/Debug/net8.0/playwright.ps1 install --with-deps chromium
        working-directory: system-test/dotnet

      - name: Run Acceptance Tests - UI Channel
        run: dotnet test --filter "FullyQualifiedName~.Latest.AcceptanceTests&Category!=isolated" --verbosity normal
        working-directory: system-test/dotnet
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: stub
          CHANNEL: UI
          CHANNEL_MODE: static
          BASE_URL: ${{ needs.deploy-frontend.outputs.app-url }}
          EXTERNAL_BASE_URL: ${{ needs.deploy-external-real.outputs.external-url }}

  test-acceptance-isolated-api:
    needs: [deploy-frontend, deploy-backend, deploy-external-real]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Runtime
        uses: optivem/actions/setup-dotnet@v1
        with:
          dotnet-version: 8.0.x

      - name: Cache NuGet Packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('system-test/dotnet/**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Build Test Project
        run: dotnet build
        working-directory: system-test/dotnet

      - name: Run Acceptance Tests (Isolated) - API Channel
        run: dotnet test --filter "FullyQualifiedName~.Latest.AcceptanceTests&Category=isolated" --verbosity normal
        working-directory: system-test/dotnet
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: stub
          CHANNEL: API
          BASE_URL: ${{ needs.deploy-frontend.outputs.app-url }}
          EXTERNAL_BASE_URL: ${{ needs.deploy-external-real.outputs.external-url }}

  test-acceptance-isolated-ui:
    needs: [deploy-frontend, deploy-backend, deploy-external-real]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Runtime
        uses: optivem/actions/setup-dotnet@v1
        with:
          dotnet-version: 8.0.x

      - name: Cache NuGet Packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('system-test/dotnet/**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Build Test Project
        run: dotnet build
        working-directory: system-test/dotnet

      - name: Cache Playwright Browsers
        id: cache-playwright
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('system-test/dotnet/**/*.csproj') }}

      - name: Install Playwright Dependencies
        if: steps.cache-playwright.outputs.cache-hit != 'true'
        run: |
          pwsh SystemTests/bin/Debug/net8.0/playwright.ps1 install --with-deps chromium
        working-directory: system-test/dotnet

      - name: Run Acceptance Tests (Isolated) - UI Channel
        run: dotnet test --filter "FullyQualifiedName~.Latest.AcceptanceTests&Category=isolated" --verbosity normal
        working-directory: system-test/dotnet
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: stub
          CHANNEL: UI
          CHANNEL_MODE: static
          BASE_URL: ${{ needs.deploy-frontend.outputs.app-url }}
          EXTERNAL_BASE_URL: ${{ needs.deploy-external-real.outputs.external-url }}

  test-contract-stub:
    needs: [deploy-frontend, deploy-backend, deploy-external-stub]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Runtime
        uses: optivem/actions/setup-dotnet@v1
        with:
          dotnet-version: 8.0.x

      - name: Cache NuGet Packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('system-test/dotnet/**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Build Test Project
        run: dotnet build
        working-directory: system-test/dotnet

      - name: Run Contract Tests (Stub)
        run: dotnet test --filter "FullyQualifiedName~.Latest.ExternalSystemContractTests&Category!=isolated" --verbosity normal
        working-directory: system-test/dotnet
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: stub
          BASE_URL: ${{ needs.deploy-frontend.outputs.app-url }}
          EXTERNAL_BASE_URL: ${{ needs.deploy-external-stub.outputs.external-url }}

  test-contract-isolated-stub:
    needs: [deploy-frontend, deploy-backend, deploy-external-stub]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Runtime
        uses: optivem/actions/setup-dotnet@v1
        with:
          dotnet-version: 8.0.x

      - name: Cache NuGet Packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('system-test/dotnet/**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Build Test Project
        run: dotnet build
        working-directory: system-test/dotnet

      - name: Run Contract Tests (Isolated) (Stub)
        run: dotnet test --filter "FullyQualifiedName~.Latest.ExternalSystemContractTests&Category=isolated" --verbosity normal
        working-directory: system-test/dotnet
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: stub
          BASE_URL: ${{ needs.deploy-frontend.outputs.app-url }}
          EXTERNAL_BASE_URL: ${{ needs.deploy-external-stub.outputs.external-url }}

  test-contract-real:
    needs: [deploy-frontend, deploy-backend, deploy-external-real]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Runtime
        uses: optivem/actions/setup-dotnet@v1
        with:
          dotnet-version: 8.0.x

      - name: Cache NuGet Packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('system-test/dotnet/**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Build Test Project
        run: dotnet build
        working-directory: system-test/dotnet

      - name: Run Contract Tests (Real)
        run: dotnet test --filter "FullyQualifiedName~.Latest.ExternalSystemContractTests&FullyQualifiedName~Real" --verbosity normal
        working-directory: system-test/dotnet
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: real
          BASE_URL: ${{ needs.deploy-frontend.outputs.app-url }}
          EXTERNAL_BASE_URL: ${{ needs.deploy-external-real.outputs.external-url }}

  test-e2e-api:
    needs: [deploy-frontend, deploy-backend, deploy-external-real]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Runtime
        uses: optivem/actions/setup-dotnet@v1
        with:
          dotnet-version: 8.0.x

      - name: Cache NuGet Packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('system-test/dotnet/**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Build Test Project
        run: dotnet build
        working-directory: system-test/dotnet

      - name: Run E2E Tests - API Channel
        run: dotnet test --filter "FullyQualifiedName~.Latest.E2eTests" --verbosity normal
        working-directory: system-test/dotnet
        env:
          ENVIRONMENT: acceptance
          CHANNEL: API
          BASE_URL: ${{ needs.deploy-frontend.outputs.app-url }}
          EXTERNAL_BASE_URL: ${{ needs.deploy-external-real.outputs.external-url }}

  test-e2e-ui:
    needs: [deploy-frontend, deploy-backend, deploy-external-real]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Runtime
        uses: optivem/actions/setup-dotnet@v1
        with:
          dotnet-version: 8.0.x

      - name: Cache NuGet Packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('system-test/dotnet/**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Build Test Project
        run: dotnet build
        working-directory: system-test/dotnet

      - name: Cache Playwright Browsers
        id: cache-playwright
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('system-test/dotnet/**/*.csproj') }}

      - name: Install Playwright Dependencies
        if: steps.cache-playwright.outputs.cache-hit != 'true'
        run: |
          pwsh SystemTests/bin/Debug/net8.0/playwright.ps1 install --with-deps chromium
        working-directory: system-test/dotnet

      - name: Run E2E Tests - UI Channel
        run: dotnet test --filter "FullyQualifiedName~.Latest.E2eTests" --verbosity normal
        working-directory: system-test/dotnet
        env:
          ENVIRONMENT: acceptance
          CHANNEL: UI
          CHANNEL_MODE: static
          BASE_URL: ${{ needs.deploy-frontend.outputs.app-url }}
          EXTERNAL_BASE_URL: ${{ needs.deploy-external-real.outputs.external-url }}

  promote:
    needs: [check, deploy-frontend, deploy-backend, test-smoke-real, test-smoke-stub, test-acceptance-api, test-acceptance-ui, test-acceptance-isolated-api, test-acceptance-isolated-ui, test-contract-stub, test-contract-isolated-stub, test-contract-real, test-e2e-api, test-e2e-ui]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    outputs:
      version: ${{ steps.promote-to-rc.outputs.version }}
      image-urls: ${{ steps.promote-to-rc.outputs.image-urls }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Read System Target Version
        id: read-version
        uses: optivem/actions/read-target-version@v1

      - name: Promote to RC
        id: promote-to-rc
        uses: optivem/actions/promote-to-rc@v1
        with:
          target-version: ${{ steps.read-version.outputs.target-version }}
          image-urls: ${{ needs.check.outputs.image-digest-urls }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  summary:
    needs: [check, promote]
    if: always()
    runs-on: ubuntu-latest
    steps:
    - name: Summarize Stage
      uses: optivem/actions/summarize-system-stage@v1
      with:
        stage-name: 'Acceptance Stage (Cloud Run)'
        environment: acceptance
        stage-result: ${{ needs.promote.result }}
        success-version: ${{ needs.promote.outputs.version }}
        success-artifact-ids: ${{ needs.promote.outputs.image-urls }}
