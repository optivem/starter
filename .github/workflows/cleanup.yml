name: cleanup

on:
  schedule:
    - cron: '0 23 * * *'  # Run daily at midnight CET (23:00 UTC)
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      deployments: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Authenticate GitHub CLI
        run: |
          echo "${{ secrets.VERIFY_TOKEN }}" | gh auth login --with-token

      # Deployments first: Scenario 1 (released-RC deployments) needs
      # the RC git tags to resolve SHAs; cleanup-prereleases deletes those.
      - name: Cleanup Deployments
        uses: optivem/actions/cleanup-deployments@v1
        env:
          GITHUB_TOKEN: ${{ secrets.VERIFY_TOKEN }}

      - name: Cleanup Prereleases
        uses: optivem/actions/cleanup-prereleases@v1
        env:
          GITHUB_TOKEN: ${{ secrets.VERIFY_TOKEN }}
