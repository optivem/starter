name: cleanup

on:
  schedule:
    - cron: '0 23 * * *'  # Run daily at midnight CET (23:00 UTC)
  workflow_dispatch:
    inputs:
      retention-days:
        description: 'Delete items older than N days (cutoff = now - N days)'
        required: false
        default: '30'
      dry-run:
        description: 'Log what would be deleted without deleting'
        type: boolean
        required: false
        default: false

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      deployments: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      # Deployments first: Scenario 1 (released-RC deployments) needs
      # the RC git tags to resolve SHAs; cleanup-prereleases deletes those.
      - name: Cleanup Deployments
        uses: optivem/actions/cleanup-deployments@v1
        with:
          retention-days: ${{ inputs.retention-days || '30' }}
          dry-run: ${{ inputs.dry-run || false }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup Prereleases
        uses: optivem/actions/cleanup-prereleases@v1
        with:
          retention-days: ${{ inputs.retention-days || '30' }}
          dry-run: ${{ inputs.dry-run || false }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
