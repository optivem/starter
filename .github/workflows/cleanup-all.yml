name: cleanup-all

on:
  schedule:
    - cron: '0 23 * * *'  # Run daily at midnight CET (23:00 UTC)
  workflow_dispatch:

jobs:
  cleanup-prereleases:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Authenticate GitHub CLI
        run: |
          echo "${{ secrets.VERIFY_TOKEN }}" | gh auth login --with-token

      - name: Cleanup Prerelease Versions
        uses: optivem/actions/cleanup-prereleases@v1
        env:
          GITHUB_TOKEN: ${{ secrets.VERIFY_TOKEN }}
