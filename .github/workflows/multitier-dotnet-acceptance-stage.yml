name: multitier-dotnet-acceptance-stage

on:
  schedule:
    - cron: '0 * * * *'  # Run every hour
  workflow_dispatch:
    inputs:
      commit-sha:
        description: 'Git SHA to test (leave empty for latest image)'
        required: false
        type: string

concurrency:
  group: multitier-dotnet-acceptance-stage

env:
  COMMIT_SHA: ${{ inputs.commit-sha || github.sha }}

jobs:
  preflight:
    runs-on: ubuntu-latest
    permissions:
      packages: read
    outputs:
      artifacts-exist: ${{ steps.check-artifacts.outputs.exist }}
      skip-reason: ${{ steps.check-artifacts.outputs.exist != 'true' && 'No artifacts published yet — waiting for the commit stage to produce images.' || '' }}
    steps:
      - name: Check Container Packages Exist
        id: check-artifacts
        uses: optivem/actions/check-ghcr-packages-exist@v1

  check:
    needs: preflight
    if: needs.preflight.outputs.artifacts-exist == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      should-run: ${{ steps.should-run.outputs.changed }}
      skip-reason: ${{ steps.should-run.outputs.changed != 'true' && 'No new artifacts since the last successful run.' || '' }}
      image-digest-urls: ${{ steps.find-latest.outputs.image-digest-urls }}
      latest-updated-at: ${{ steps.find-latest.outputs.latest-updated-at }}
      last-run-at: ${{ steps.should-run.outputs.last-run-at }}
    steps:
      - name: Ensure Environment Variables Defined
        uses: optivem/actions/ensure-env-vars-defined@v1
        with:
          names: |
            DOCKERHUB_USERNAME
            DOCKERHUB_TOKEN
            WORKFLOW_TOKEN
        env:
          DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          WORKFLOW_TOKEN: ${{ secrets.WORKFLOW_TOKEN }}

      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ env.COMMIT_SHA }}

      - name: Read Base Version
        id: read-base-version
        uses: optivem/actions/read-base-version@v1

      - name: Ensure Version Unreleased
        uses: optivem/actions/ensure-version-unreleased@v1
        with:
          version: multitier-dotnet-v${{ steps.read-base-version.outputs.base-version }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Resolve Docker Image Digests
        id: find-latest
        uses: optivem/actions/resolve-docker-image-digests@v1
        with:
          image-urls: |
            ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}/multitier-frontend-react:${{ inputs.commit-sha || 'latest' }}
            ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}/multitier-backend-dotnet:${{ inputs.commit-sha || 'latest' }}

      - name: Check for Docker Image Updates Since Last Run
        id: should-run
        uses: optivem/actions/check-update-since-last-github-workflow-run@v1
        with:
          last-updated-at: ${{ steps.find-latest.outputs.latest-updated-at }}
          workflow-name: ${{ github.workflow }}

  run:
    needs: check
    if: needs.check.outputs.should-run == 'true'
    runs-on: ubuntu-latest
    environment: multitier-dotnet-acceptance
    permissions:
      contents: read
      packages: write
    outputs:
      version: ${{ steps.rc-version.outputs.version }}
      image-urls: ${{ steps.tag-images.outputs.image-urls }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ env.COMMIT_SHA }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Simulate Deployment (Real External Systems)
        uses: optivem/actions/deploy-docker-compose@v1
        with:
          environment: acceptance
          version: latest
          image-urls: ${{ needs.check.outputs.image-digest-urls }}
          compose-file: docker-compose.pipeline.multitier.real.yml
          working-directory: system-test/dotnet

      - name: Wait for Systems (Simulate Deployment (Real External Systems))
        uses: optivem/actions/wait-for-urls@v1
        with:
          systems: |
            [
              { "name": "Shop UI", "url": "http://localhost:3211/" },
              { "name": "Shop API", "url": "http://localhost:8211/health" },
              { "name": "ERP", "url": "http://localhost:9211/erp/health" },
              { "name": "Clock", "url": "http://localhost:9211/clock/health" }
            ]
          compose-file: docker-compose.pipeline.multitier.real.yml
          working-directory: system-test/dotnet

      - name: Simulate Deployment (Stub External Systems)
        uses: optivem/actions/deploy-docker-compose@v1
        with:
          environment: acceptance
          version: latest
          image-urls: ${{ needs.check.outputs.image-digest-urls }}
          compose-file: docker-compose.pipeline.multitier.stub.yml
          working-directory: system-test/dotnet

      - name: Wait for Systems (Simulate Deployment (Stub External Systems))
        uses: optivem/actions/wait-for-urls@v1
        with:
          systems: |
            [
              { "name": "Shop UI", "url": "http://localhost:3212/" },
              { "name": "Shop API", "url": "http://localhost:8212/health" },
              { "name": "ERP", "url": "http://localhost:9212/erp/health" },
              { "name": "Clock", "url": "http://localhost:9212/clock/health" }
            ]
          compose-file: docker-compose.pipeline.multitier.stub.yml
          working-directory: system-test/dotnet

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Cache NuGet Packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('system-test/dotnet/**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Compile System Tests
        run: dotnet build
        working-directory: system-test/dotnet

      - name: Cache Playwright Browsers
        id: cache-playwright
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('system-test/dotnet/**/*.csproj') }}

      - name: Install Playwright Browsers
        if: steps.cache-playwright.outputs.cache-hit != 'true'
        run: pwsh SystemTests/bin/Debug/net8.0/playwright.ps1 install chromium
        working-directory: system-test/dotnet

      - name: Install Playwright System Dependencies
        run: pwsh SystemTests/bin/Debug/net8.0/playwright.ps1 install-deps chromium
        working-directory: system-test/dotnet

      - name: Run Smoke Tests (Stub)
        run: dotnet test --filter "FullyQualifiedName~.Latest.SmokeTests" --verbosity normal
        working-directory: system-test/dotnet
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: stub

      - name: Run Smoke Tests (Real)
        run: dotnet test --filter "FullyQualifiedName~.Latest.SmokeTests" --verbosity normal
        working-directory: system-test/dotnet
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: real

      - name: Run Acceptance Tests - API Channel
        run: dotnet test --filter "FullyQualifiedName~.Latest.AcceptanceTests&Category!=isolated" --verbosity normal
        working-directory: system-test/dotnet
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: stub
          CHANNEL: API

      - name: Run Acceptance Tests - UI Channel
        run: dotnet test --filter "FullyQualifiedName~.Latest.AcceptanceTests&Category!=isolated" --verbosity normal
        working-directory: system-test/dotnet
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: stub
          CHANNEL: UI
          CHANNEL_MODE: static

      - name: Run Acceptance Tests (Isolated) - API Channel
        run: dotnet test --filter "FullyQualifiedName~.Latest.AcceptanceTests&Category=isolated" --verbosity normal
        working-directory: system-test/dotnet
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: stub
          CHANNEL: API

      - name: Run Acceptance Tests (Isolated) - UI Channel
        run: dotnet test --filter "FullyQualifiedName~.Latest.AcceptanceTests&Category=isolated" --verbosity normal
        working-directory: system-test/dotnet
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: stub
          CHANNEL: UI
          CHANNEL_MODE: static

      - name: Run Contract Tests (Stub)
        run: dotnet test --filter "FullyQualifiedName~.Latest.ExternalSystemContractTests&Category!=isolated" --verbosity normal
        working-directory: system-test/dotnet
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: stub

      - name: Run Contract Tests (Isolated) (Stub)
        run: dotnet test --filter "FullyQualifiedName~.Latest.ExternalSystemContractTests&Category=isolated" --verbosity normal
        working-directory: system-test/dotnet
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: stub

      - name: Run Contract Tests (Real)
        run: dotnet test --filter "FullyQualifiedName~.Latest.ExternalSystemContractTests&FullyQualifiedName~Real" --verbosity normal
        working-directory: system-test/dotnet
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: real

      - name: Run E2E Tests - API Channel
        run: dotnet test --filter "FullyQualifiedName~.Latest.E2eTests" --verbosity normal
        working-directory: system-test/dotnet
        env:
          ENVIRONMENT: acceptance
          CHANNEL: API

      - name: Run E2E Tests - UI Channel
        run: dotnet test --filter "FullyQualifiedName~.Latest.E2eTests" --verbosity normal
        working-directory: system-test/dotnet
        env:
          ENVIRONMENT: acceptance
          CHANNEL: UI
          CHANNEL_MODE: static

      - name: Read Base System Version
        id: read-version
        uses: optivem/actions/read-base-version@v1

      - name: Compose Prerelease Version
        id: rc-version
        uses: optivem/actions/compose-prerelease-version@v1
        with:
          base-version: ${{ steps.read-version.outputs.base-version }}
          suffix: rc
          build-number: ${{ github.run_number }}
          prefix: multitier-dotnet

      - name: Tag Docker Images for Prerelease
        id: tag-images
        uses: optivem/actions/promote-docker-images@v1
        with:
          image-urls: ${{ needs.check.outputs.image-digest-urls }}
          tag: ${{ steps.rc-version.outputs.version }}

  publish-tag:
    needs: run
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          ref: ${{ env.COMMIT_SHA }}

      - name: Publish Git Tag
        uses: optivem/actions/publish-tag@v1
        with:
          tag: ${{ needs.run.outputs.version }}
          token: ${{ secrets.WORKFLOW_TOKEN }}

  summary:
    needs: [preflight, check, run, publish-tag]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
    - name: Summarize Stage
      uses: optivem/actions/render-system-stage-summary@v1
      with:
        stage-name: 'Acceptance Stage'
        stage-result: ${{ needs.publish-tag.result == 'failure' && 'failure' || needs.run.result }}
        environment: acceptance
        success-version: ${{ needs.run.outputs.version }}
        success-artifact-ids: ${{ needs.run.outputs.image-urls }}
        skipped-reason: ${{ needs.preflight.outputs.skip-reason || needs.check.outputs.skip-reason }}
        latest-artifact-ids: ${{ needs.check.outputs.image-digest-urls }}
        latest-updated-at: ${{ needs.check.outputs.latest-updated-at }}
        last-run-at: ${{ needs.check.outputs.last-run-at }}
