name: monolith-java-acceptance-stage-legacy

on:
  schedule:
    - cron: '0 * * * *'  # Run every hour
  workflow_dispatch:
    inputs:
      commit-sha:
        description: 'Git SHA to test (leave empty for latest image)'
        required: false
        type: string

concurrency:
  group: monolith-java-acceptance-stage-legacy

env:
  COMMIT_SHA: ${{ inputs.commit-sha || github.sha }}

jobs:
  preflight:
    runs-on: ubuntu-latest
    permissions:
      packages: read
    outputs:
      artifacts-exist: ${{ steps.check-artifacts.outputs.exist }}
      skip-reason: ${{ steps.check-artifacts.outputs.exist != 'true' && 'No artifacts published yet — waiting for the commit stage to produce images.' || '' }}
    steps:
      - name: Check Container Packages Exist
        id: check-artifacts
        uses: optivem/actions/check-ghcr-packages-exist@v1
        with:
          image-urls: |
            ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}/sysapp-java

  check:
    needs: preflight
    if: needs.preflight.outputs.artifacts-exist == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      should-run: ${{ steps.should-run.outputs.newer }}
      skip-reason: ${{ steps.should-run.outputs.newer != 'true' && 'No new artifacts since the last run.' || '' }}
      image-digest-urls: ${{ steps.find-latest.outputs.image-digest-urls }}
      latest-updated-at: ${{ steps.find-latest.outputs.latest-updated-at }}
      last-run-at: ${{ steps.last-run.outputs.timestamp }}
    steps:
      - name: Ensure Environment Variables Defined
        uses: optivem/actions/validate-env-vars-defined@v1
        with:
          names: |
            DOCKERHUB_USERNAME
            DOCKERHUB_TOKEN
        env:
          DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ env.COMMIT_SHA }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Resolve Docker Image Digests
        id: find-latest
        uses: optivem/actions/resolve-docker-image-digests@v1
        with:
          base-image-urls: |
            ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}/sysapp-java
          tag: ${{ inputs.commit-sha && format('sha-{0}', inputs.commit-sha) || 'latest' }}

      - name: Resolve Latest Updated At
        id: latest
        shell: bash
        env:
          IMAGE_TS: ${{ steps.find-latest.outputs.latest-updated-at }}
        run: |
          set -euo pipefail
          # Take max of image push time and commit time. Tests live in this
          # repo, so using the commit timestamp makes the gate fire on
          # test-only changes as well as on image rebuilds.
          commit_ts=$(git log -1 --format=%cI "$COMMIT_SHA")
          image_epoch=$(date -d "$IMAGE_TS" +%s)
          commit_epoch=$(date -d "$commit_ts" +%s)
          if [ "$image_epoch" -ge "$commit_epoch" ]; then
            max_epoch=$image_epoch
          else
            max_epoch=$commit_epoch
          fi
          latest=$(date -d "@$max_epoch" -u +%Y-%m-%dT%H:%M:%SZ)
          echo "Image timestamp:  $IMAGE_TS"
          echo "Commit timestamp: $commit_ts"
          echo "Latest:           $latest"
          echo "latest-updated-at=$latest" >> "$GITHUB_OUTPUT"

      - name: Get Last Workflow Run
        id: last-run
        uses: optivem/actions/get-last-workflow-run@v1
        with:
          workflow-name: ${{ github.workflow }}

      - name: Check for Docker Image Updates Since Last Run
        id: should-run
        uses: optivem/actions/check-timestamp-newer@v1
        with:
          latest: ${{ steps.latest.outputs.latest-updated-at }}
          since: ${{ steps.last-run.outputs.timestamp }}

  run:
    needs: check
    if: needs.check.outputs.should-run == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ env.COMMIT_SHA }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Simulate Deployment (Real External Systems)
        uses: optivem/actions/deploy-docker-compose@v1
        with:
          environment: acceptance
          version: ${{ env.COMMIT_SHA }}
          image-urls: ${{ needs.check.outputs.image-digest-urls }}
          compose-file: monolith/docker-compose.pipeline.real.yml
          working-directory: system-test/java

      - name: Wait for Systems (Simulate Deployment (Real External Systems))
        uses: optivem/actions/wait-for-endpoints@v1
        with:
          endpoints: |
            [
              { "name": "MyShop UI", "url": "http://localhost:3111/" },
              { "name": "MyShop API", "url": "http://localhost:8111/health" },
              { "name": "ERP", "url": "http://localhost:9111/erp/health" },
              { "name": "Clock", "url": "http://localhost:9111/clock/health" }
            ]
          compose-file: monolith/docker-compose.pipeline.real.yml
          working-directory: system-test/java

      - name: Simulate Deployment (Stub External Systems)
        uses: optivem/actions/deploy-docker-compose@v1
        with:
          environment: acceptance
          version: ${{ env.COMMIT_SHA }}
          image-urls: ${{ needs.check.outputs.image-digest-urls }}
          compose-file: monolith/docker-compose.pipeline.stub.yml
          working-directory: system-test/java

      - name: Wait for Systems (Simulate Deployment (Stub External Systems))
        uses: optivem/actions/wait-for-endpoints@v1
        with:
          endpoints: |
            [
              { "name": "MyShop UI", "url": "http://localhost:3112/" },
              { "name": "MyShop API", "url": "http://localhost:8112/health" },
              { "name": "ERP", "url": "http://localhost:9112/erp/health" },
              { "name": "Clock", "url": "http://localhost:9112/clock/health" }
            ]
          compose-file: monolith/docker-compose.pipeline.stub.yml
          working-directory: system-test/java

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Cache Playwright Browsers
        id: cache-playwright
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('system-test/java/build.gradle') }}

      - name: Install Playwright Browsers
        timeout-minutes: 5
        if: steps.cache-playwright.outputs.cache-hit != 'true'
        run: npx playwright install chromium
        working-directory: system-test/java

      - name: Install Playwright System Dependencies
        timeout-minutes: 5
        run: npx playwright install-deps chromium
        working-directory: system-test/java

      - name: Compile System Tests
        run: ./gradlew clean compileJava compileTestJava
        working-directory: system-test/java

      - name: mod02 - Run Smoke Tests
        run: ./gradlew test -Dversion=mod02 -Dtype=smoke -DexternalSystemMode=real -Denvironment=acceptance
        working-directory: system-test/java

      - name: mod03 - Run E2E Tests
        run: ./gradlew test -Dversion=mod03 -Dtype=e2e -Denvironment=acceptance
        working-directory: system-test/java

      - name: mod04 - Run Smoke Tests
        run: ./gradlew test -Dversion=mod04 -Dtype=smoke -DexternalSystemMode=real -Denvironment=acceptance
        working-directory: system-test/java

      - name: mod04 - Run E2E Tests
        run: ./gradlew test -Dversion=mod04 -Dtype=e2e -Denvironment=acceptance
        working-directory: system-test/java

      - name: mod05 - Run Smoke Tests
        run: ./gradlew test -Dversion=mod05 -Dtype=smoke -DexternalSystemMode=real -Denvironment=acceptance
        working-directory: system-test/java

      - name: mod05 - Run E2E Tests
        run: ./gradlew test -Dversion=mod05 -Dtype=e2e -Denvironment=acceptance
        working-directory: system-test/java

      - name: mod06 - Run Smoke Tests
        run: ./gradlew test -Dversion=mod06 -Dtype=smoke -DexternalSystemMode=real -Denvironment=acceptance
        working-directory: system-test/java

      - name: mod06 - Run E2E Tests - API Channel
        run: ./gradlew test -Dversion=mod06 -Dtype=e2e -Dchannel=API -Denvironment=acceptance
        working-directory: system-test/java

      - name: mod06 - Run E2E Tests - UI Channel
        run: ./gradlew test -Dversion=mod06 -Dtype=e2e -Dchannel=UI -Denvironment=acceptance
        working-directory: system-test/java

      - name: mod07 - Run Smoke Tests
        run: ./gradlew test -Dversion=mod07 -Dtype=smoke -DexternalSystemMode=real -Denvironment=acceptance
        working-directory: system-test/java

      - name: mod07 - Run E2E Tests - API Channel
        run: ./gradlew test -Dversion=mod07 -Dtype=e2e -Dchannel=API -Denvironment=acceptance
        working-directory: system-test/java

      - name: mod07 - Run E2E Tests - UI Channel
        run: ./gradlew test -Dversion=mod07 -Dtype=e2e -Dchannel=UI -Denvironment=acceptance
        working-directory: system-test/java

      - name: mod08 - Run Smoke Tests
        run: ./gradlew test -Dversion=mod08 -Dtype=smoke -DexternalSystemMode=real -Denvironment=acceptance
        working-directory: system-test/java

      - name: mod08 - Run E2E Tests - API Channel
        run: ./gradlew test -Dversion=mod08 -Dtype=e2e -Dchannel=API -Denvironment=acceptance
        working-directory: system-test/java

      - name: mod08 - Run E2E Tests - UI Channel
        run: ./gradlew test -Dversion=mod08 -Dtype=e2e -Dchannel=UI -DchannelMode=static -Denvironment=acceptance
        working-directory: system-test/java

      - name: mod09 - Run Smoke Tests (Stub)
        run: ./gradlew test -Dversion=mod09 -Dtype=smoke -DexternalSystemMode=stub -Denvironment=acceptance
        working-directory: system-test/java

      - name: mod09 - Run Smoke Tests (Real)
        run: ./gradlew test -Dversion=mod09 -Dtype=smoke -DexternalSystemMode=real -Denvironment=acceptance
        working-directory: system-test/java

      - name: mod10 - Run Acceptance Tests - API Channel
        run: ./gradlew test -Dversion=mod10 -Dtype=acceptance -DexcludeTags=isolated -Dchannel=API -Denvironment=acceptance
        working-directory: system-test/java

      - name: mod10 - Run Acceptance Tests - UI Channel
        run: ./gradlew test -Dversion=mod10 -Dtype=acceptance -DexcludeTags=isolated -Dchannel=UI -DchannelMode=static -Denvironment=acceptance
        working-directory: system-test/java

      - name: mod10 - Run Acceptance Tests (Isolated) - API Channel
        run: ./gradlew test -Dversion=mod10 -Dtype=acceptance -DincludeTags=isolated -Dchannel=API -Denvironment=acceptance
        working-directory: system-test/java

      - name: mod10 - Run Acceptance Tests (Isolated) - UI Channel
        run: ./gradlew test -Dversion=mod10 -Dtype=acceptance -DincludeTags=isolated -Dchannel=UI -DchannelMode=static -Denvironment=acceptance
        working-directory: system-test/java

      - name: mod11 - Run Contract Tests (Stub)
        run: ./gradlew test -Dversion=mod11 -Dtype=contract -DexcludeTags=isolated -DexternalSystemMode=stub -Denvironment=acceptance
        working-directory: system-test/java

      - name: mod11 - Run Contract Tests (Stub) (Isolated)
        run: ./gradlew test -Dversion=mod11 -Dtype=contract -DincludeTags=isolated -DexternalSystemMode=stub -Denvironment=acceptance
        working-directory: system-test/java

      - name: mod11 - Run Contract Tests (Real)
        run: ./gradlew test -Dversion=mod11 -Dtype=contract -DexternalSystemMode=real -Denvironment=acceptance
        working-directory: system-test/java

      - name: mod11 - Run E2E Tests - API Channel
        run: ./gradlew test -Dversion=mod11 -Dtype=e2e -Dchannel=API -Denvironment=acceptance
        working-directory: system-test/java

      - name: mod11 - Run E2E Tests - UI Channel
        run: ./gradlew test -Dversion=mod11 -Dtype=e2e -Dchannel=UI -DchannelMode=static -Denvironment=acceptance
        working-directory: system-test/java

  summary:
    needs: [preflight, check, run]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
    - name: Summarize Stage
      uses: optivem/actions/render-system-stage-summary@v1
      with:
        stage-name: 'Acceptance Stage'
        stage-result: ${{ needs.run.result }}
        environment: acceptance
        success-version: latest
        skipped-reason: ${{ needs.preflight.outputs.skip-reason || needs.check.outputs.skip-reason }}
        latest-artifact-ids: ${{ needs.check.outputs.image-digest-urls }}
        latest-updated-at: ${{ needs.check.outputs.latest-updated-at }}
        last-run-at: ${{ needs.check.outputs.last-run-at }}
