name: multitier-typescript-verify

on:
  workflow_dispatch:
    inputs:
      skip-commit-stage:
        description: 'Skip commit stage'
        required: false
        type: boolean
        default: false

jobs:
  verify:
    uses: ./.github/workflows/_verify-pipeline.yml
    secrets: inherit
    with:
      prefix: multitier-typescript
      commit-workflows: '["multitier-backend-typescript-commit-stage.yml", "multitier-frontend-react-commit-stage.yml"]'
      skip-commit-stage: ${{ inputs.skip-commit-stage == true }}
