name: multitier-typescript-qa-signoff

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version that was tested in QA (e.g., multitier-typescript-v1.0.0-rc.1). Leave empty to sign off on the latest RC deployed to QA.'
        required: false
        type: string
        default: ''
      result:
        description: 'QA testing result'
        required: true
        type: choice
        options:
          - approved
          - rejected

concurrency:
  group: multitier-typescript-qa-signoff

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ inputs.version || steps.resolve-latest.outputs.base-tag }}
    steps:
      - name: Ensure Environment Variables Defined
        uses: optivem/actions/validate-env-vars-defined@v1
        with:
          names: |
            WORKFLOW_TOKEN
        env:
          WORKFLOW_TOKEN: ${{ secrets.WORKFLOW_TOKEN }}

      - name: Resolve Latest QA-Deployed RC
        id: resolve-latest
        if: inputs.version == ''
        uses: optivem/actions/resolve-latest-prerelease-tag@v1
        with:
          tag-prefix: multitier-typescript-v
          tag-suffix: -qa-deployed

      - name: Check RC Exists
        if: inputs.version != ''
        uses: optivem/actions/validate-tag-exists@v1
        with:
          tag: ${{ inputs.version }}

  run:
    needs: check
    if: needs.check.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.promote.outputs.status-tag }}
      stage-result: ${{ inputs.result == 'approved' && 'success' || 'failure' }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.check.outputs.version }}

      - name: Generate QA Signoff Tag
        id: promote
        uses: optivem/actions/compose-prerelease-status@v1
        with:
          prerelease-version: ${{ needs.check.outputs.version }}
          environment: qa
          status: ${{ inputs.result }}

  publish-tag:
    needs: run
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.version }}

      - name: Publish Git Tag
        uses: optivem/actions/publish-tag@v1
        with:
          tag: ${{ needs.run.outputs.version }}
          token: ${{ secrets.WORKFLOW_TOKEN }}

  summary:
    needs: [check, run, publish-tag]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v6

    - name: Summarize Stage
      uses: optivem/actions/render-system-stage-summary@v1
      with:
        stage-name: 'QA Signoff'
        stage-result: ${{ needs.publish-tag.result == 'failure' && 'failure' || needs.run.outputs.stage-result }}
        environment: qa
        success-version: ${{ needs.run.outputs.version }}
