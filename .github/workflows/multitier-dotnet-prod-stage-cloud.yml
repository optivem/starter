name: multitier-dotnet-prod-stage-cloud

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Prerelease version to deploy (e.g., multitier-dotnet-cloud-v1.0.0-rc.1). Leave empty to deploy the latest QA-approved RC.'
        required: false
        type: string
        default: ''

concurrency:
  group: multitier-dotnet-prod-stage-cloud

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ inputs.version || steps.resolve-latest.outputs.base-tag }}
      image-urls: ${{ steps.resolve-images.outputs.image-urls }}
    steps:
      - name: Ensure Environment Variables Defined
        uses: optivem/actions/validate-env-vars-defined@v1
        with:
          names: |
            DOCKERHUB_USERNAME
            DOCKERHUB_TOKEN
            GCP_PROJECT_ID
            GCP_REGION
            GCP_WORKLOAD_IDENTITY_PROVIDER
            GCP_SERVICE_ACCOUNT
            WORKFLOW_TOKEN
        env:
          DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          GCP_REGION: ${{ vars.GCP_REGION }}
          GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          GCP_SERVICE_ACCOUNT: ${{ vars.GCP_SERVICE_ACCOUNT }}
          WORKFLOW_TOKEN: ${{ secrets.WORKFLOW_TOKEN }}

      - name: Resolve Latest QA-Approved RC
        id: resolve-latest
        if: inputs.version == ''
        uses: optivem/actions/resolve-latest-prerelease-tag@v1
        with:
          tag-prefix: multitier-dotnet-cloud-v
          tag-suffix: -qa-approved

      - name: Check RC Exists
        if: inputs.version != ''
        uses: optivem/actions/validate-tag-exists@v1
        with:
          tag: ${{ inputs.version }}

      - name: Check QA Approved
        if: inputs.version != ''
        uses: optivem/actions/validate-tag-exists@v1
        with:
          tag: ${{ inputs.version }}-qa-approved

      - name: Generate Release Version
        id: release-version
        uses: optivem/actions/compose-release-version@v1
        with:
          prerelease-version: ${{ inputs.version || steps.resolve-latest.outputs.base-tag }}

      - name: Verify Version Not Yet Released
        uses: optivem/actions/validate-version-unreleased@v1
        with:
          version: ${{ steps.release-version.outputs.version }}

      - name: Compose Docker Image URLs
        id: resolve-images
        uses: optivem/actions/compose-docker-image-urls@v1
        with:
          tag: ${{ inputs.version || steps.resolve-latest.outputs.base-tag }}
          base-image-urls: |
            ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}/multitier-frontend-react
            ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}/multitier-backend-dotnet

  deploy-frontend:
    needs: check
    if: needs.check.result == 'success'
    runs-on: ubuntu-latest
    environment: multitier-dotnet-production
    permissions:
      contents: read
      id-token: write
    outputs:
      app-url: ${{ steps.deploy.outputs.url }}
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Setup Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy Frontend to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: multitier-dotnet-frontend-production
          image: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}/multitier-frontend-react:${{ needs.check.outputs.version }}
          region: ${{ vars.GCP_REGION }}
          project_id: ${{ vars.GCP_PROJECT_ID }}
          flags: --port=3000 --max-instances=3 --allow-unauthenticated

      - name: Wait for Frontend Ready
        uses: optivem/actions/wait-for-endpoints@v1
        with:
          endpoints: '[{"name": "multitier-dotnet-frontend-production", "url": "${{ steps.deploy.outputs.url }}"}]'

  deploy-backend:
    needs: check
    if: needs.check.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    outputs:
      app-url: ${{ steps.deploy.outputs.url }}
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Setup Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy Backend to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: multitier-dotnet-backend-production
          image: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}/multitier-backend-dotnet:${{ needs.check.outputs.version }}
          region: ${{ vars.GCP_REGION }}
          project_id: ${{ vars.GCP_PROJECT_ID }}
          env_vars: |
            ASPNETCORE_ENVIRONMENT=Cloud
          secrets: |
            DATABASE_URL=db-connection-string:latest
          flags: --port=8080 --max-instances=3 --allow-unauthenticated

      - name: Wait for Backend Ready
        uses: optivem/actions/wait-for-endpoints@v1
        with:
          endpoints: '[{"name": "multitier-dotnet-backend-production", "url": "${{ steps.deploy.outputs.url }}"}]'

  deploy-external-real:
    needs: check
    if: needs.check.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    outputs:
      external-url: ${{ steps.deploy.outputs.url }}
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Setup Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy External Real to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: external-real-production
          image: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}/external-real-sim:latest
          region: ${{ vars.GCP_REGION }}
          project_id: ${{ vars.GCP_PROJECT_ID }}
          flags: --port=9000 --max-instances=3 --allow-unauthenticated

      - name: Wait for External Real Ready
        uses: optivem/actions/wait-for-endpoints@v1
        with:
          endpoints: '[{"name": "external-real-production", "url": "${{ steps.deploy.outputs.url }}"}]'

  promote:
    needs: [check, deploy-frontend, deploy-backend, deploy-external-real]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    outputs:
      version: ${{ steps.promote.outputs.version }}
      image-urls: ${{ needs.check.outputs.image-urls }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.check.outputs.version }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate Release Version
        id: promote
        uses: optivem/actions/compose-release-version@v1
        with:
          prerelease-version: ${{ needs.check.outputs.version }}

      - name: Tag Docker Images
        id: tag-images
        uses: optivem/actions/promote-docker-images@v1
        with:
          image-urls: ${{ needs.check.outputs.image-urls }}
          tag: ${{ steps.promote.outputs.version }}

      - name: Publish Release Tag
        uses: optivem/actions/publish-tag@v1
        with:
          tag: ${{ steps.promote.outputs.version }}
          token: ${{ secrets.WORKFLOW_TOKEN }}

      - name: Compose Release Notes
        id: release-notes
        uses: optivem/actions/compose-release-notes@v1
        with:
          base-version: ${{ needs.check.outputs.version }}
          release-version: ${{ steps.promote.outputs.version }}
          environment: prod
          status: deployed
          artifact-urls: ${{ steps.tag-images.outputs.image-urls }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.promote.outputs.version }}
          name: ${{ steps.release-notes.outputs.title }}
          body_path: ${{ steps.release-notes.outputs.notes-file }}
          prerelease: false

      - name: Create Component Tags
        uses: optivem/actions/create-component-tags@v1
        with:
          components: |
            multitier-backend-dotnet:system/multitier/backend-dotnet/VERSION
            multitier-frontend-react:system/multitier/frontend-react/VERSION
          token: ${{ secrets.WORKFLOW_TOKEN }}

  summary:
    needs: [check, promote]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
    - name: Summarize Stage
      uses: optivem/actions/render-system-stage-summary@v1
      with:
        stage-name: 'Production Stage (Cloud Run)'
        stage-result: ${{ needs.promote.result }}
        environment: production
        success-version: ${{ needs.promote.outputs.version }}
        success-artifact-ids: ${{ needs.promote.outputs.image-urls }}
