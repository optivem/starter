name: multitier-backend-java-commit-stage

on:
  push:
    branches: [ "main" ]
    paths:
        - 'system/multitier/backend-java/**'
        - '.github/workflows/multitier-backend-java-commit-stage.yml'
  pull_request:
    branches: [ "main" ]
    paths:
        - 'system/multitier/backend-java/**'
        - '.github/workflows/multitier-backend-java-commit-stage.yml'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Ensure Environment Variables Defined
        uses: optivem/actions/ensure-env-vars-defined@v1
        with:
          names: |
            DOCKERHUB_USERNAME
            DOCKERHUB_TOKEN
        env:
          DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

  run:
    needs: check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    outputs:
      component-version: ${{ steps.read-version.outputs.target-version }}
      image-version-tag: ${{ steps.build.outputs.image-version-tag }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Read Component Target Version
        id: read-version
        uses: optivem/actions/read-target-version@v1
        with:
          file: system/multitier/backend-java/VERSION

      - name: Setup Runtime
        uses: optivem/actions/setup-java-gradle@v1
        with:
          java-version: 21
          working-directory: system/multitier/backend-java

      - name: Compile Code
        run: ./gradlew build
        working-directory: system/multitier/backend-java

      # TODO: Implement
      - name: Run Unit Tests
        run: echo "TODO - not yet implemented"

      # TODO: Implement
      - name: Run Narrow Integration Tests
        run: echo "TODO - not yet implemented"

      # TODO: Implement
      - name: Run Component Tests
        run: echo "TODO - not yet implemented"

      # TODO: Implement
      - name: Run Contract Tests
        run: echo "TODO - not yet implemented"

      - name: Run Linter
        run: ./gradlew checkstyleMain
        working-directory: system/multitier/backend-java

      - name: Run Code Analysis
        if: github.ref == 'refs/heads/main' && env.SONAR_TOKEN != ''
        run: ./gradlew build sonar --info
        working-directory: system/multitier/backend-java

      - name: Build Artifact
        if: github.ref == 'refs/heads/main'
        id: build
        uses: optivem/actions/build-docker-image@v1
        with:
          working-directory: system/multitier/backend-java
          image-name: multitier-backend-java
          image-namespace: ${{ github.repository }}
          commit-sha: ${{ github.sha }}
          component-version: ${{ steps.read-version.outputs.target-version }}
          build-number: ${{ github.run_number }}
          dockerfile: Dockerfile

      - name: Push Artifact
        if: github.ref == 'refs/heads/main'
        id: push
        uses: optivem/actions/push-docker-image@v1
        with:
          image-sha-tag: ${{ steps.build.outputs.image-sha-tag }}
          image-latest-url: ${{ steps.build.outputs.image-latest-url }}
          image-version-tag: ${{ steps.build.outputs.image-version-tag }}
        env:
          REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}

  summary:
    needs: [check, run]
    if: always()
    runs-on: ubuntu-latest
    steps:
    - name: Summarize Stage
      uses: optivem/actions/summarize-commit-stage@v1
      with:
        stage-result: ${{ needs.run.result }}
        success-artifact-url: ${{ needs.run.outputs.image-version-tag }}
