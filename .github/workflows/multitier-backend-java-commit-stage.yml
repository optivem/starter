name: multitier-backend-java-commit-stage

on:
  push:
    branches: [ "main" ]
    paths:
        - 'system/multitier/backend-java/**'
        - '.github/workflows/multitier-backend-java-commit-stage.yml'
  pull_request:
    branches: [ "main" ]
    paths:
        - 'system/multitier/backend-java/**'
        - '.github/workflows/multitier-backend-java-commit-stage.yml'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git SHA to build (leave empty for HEAD)'
        required: false
        type: string

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Ensure Environment Variables Defined
        uses: optivem/actions/ensure-env-vars-defined@v1
        with:
          names: |
            DOCKERHUB_USERNAME
            DOCKERHUB_TOKEN
        env:
          DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref || github.sha }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

  run:
    needs: check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    outputs:
      component-version: ${{ steps.read-version.outputs.target-version }}
      image-version-tag: ${{ fromJSON(steps.tag.outputs.image-urls)[2] }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref || github.sha }}

      - name: Read Component Target Version
        id: read-version
        uses: optivem/actions/read-target-version@v1
        with:
          file: system/multitier/backend-java/VERSION

      - name: Setup Java and Gradle
        uses: optivem/actions/setup-java-gradle@v1
        with:
          java-version: 21
          working-directory: system/multitier/backend-java

      - name: Compile Code
        run: ./gradlew build
        working-directory: system/multitier/backend-java

      # TODO: Implement
      - name: Run Unit Tests
        run: echo "TODO - not yet implemented"

      # TODO: Implement
      - name: Run Narrow Integration Tests
        run: echo "TODO - not yet implemented"

      # TODO: Implement
      - name: Run Component Tests
        run: echo "TODO - not yet implemented"

      # TODO: Implement
      - name: Run Contract Tests
        run: echo "TODO - not yet implemented"

      - name: Run Linter
        run: ./gradlew checkstyleMain
        working-directory: system/multitier/backend-java

      - name: Run Code Analysis
        if: github.ref == 'refs/heads/main' && env.SONAR_TOKEN != ''
        run: ./gradlew build sonar --info
        working-directory: system/multitier/backend-java

      - name: Build Artifact
        if: github.ref == 'refs/heads/main'
        id: build
        uses: optivem/actions/build-docker-image@v1
        with:
          working-directory: system/multitier/backend-java
          image-name: multitier-backend-java
          commit-sha: ${{ inputs.ref || github.sha }}
          dockerfile: Dockerfile

      - name: Compose Dev Version
        if: github.ref == 'refs/heads/main'
        id: dev-version
        uses: optivem/actions/compose-prerelease-version@v1
        with:
          target-version: ${{ steps.read-version.outputs.target-version }}
          suffix: dev
          number: ${{ github.run_number }}

      - name: Tag Docker Image
        if: github.ref == 'refs/heads/main'
        id: tag
        uses: optivem/actions/tag-docker-image-local@v1
        with:
          source: ${{ steps.build.outputs.local-image-ref }}
          image-name: multitier-backend-java
          tags: |
            ${{ github.sha }}
            latest
            ${{ steps.dev-version.outputs.version }}

      - name: Push Artifact
        if: github.ref == 'refs/heads/main'
        id: push
        uses: optivem/actions/push-docker-image@v1
        with:
          image-sha-tag: ${{ fromJSON(steps.tag.outputs.image-urls)[0] }}
          image-latest-url: ${{ fromJSON(steps.tag.outputs.image-urls)[1] }}
          image-version-tag: ${{ fromJSON(steps.tag.outputs.image-urls)[2] }}

  summary:
    needs: [check, run]
    if: always()
    runs-on: ubuntu-latest
    steps:
    - name: Summarize Stage
      uses: optivem/actions/compose-commit-stage-summary@v1
      with:
        stage-result: ${{ needs.run.result }}
        success-artifact-url: ${{ needs.run.outputs.image-version-tag }}
