name: multitier-backend-typescript-commit-stage

on:
  push:
    branches: [ "main" ]
    paths:
        - 'system/multitier/backend-typescript/**'
        - '.github/workflows/multitier-backend-typescript-commit-stage.yml'
  pull_request:
    branches: [ "main" ]
    paths:
        - 'system/multitier/backend-typescript/**'
        - '.github/workflows/multitier-backend-typescript-commit-stage.yml'
  workflow_dispatch:
    inputs:
      sha:
        description: 'Git SHA to build (leave empty for HEAD)'
        required: false
        type: string

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Ensure Environment Variables Defined
        uses: optivem/actions/ensure-env-vars-defined@v1
        with:
          names: |
            DOCKERHUB_USERNAME
            DOCKERHUB_TOKEN
        env:
          DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.sha || github.sha }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

  run:
    needs: check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    outputs:
      component-version: ${{ steps.read-version.outputs.target-version }}
      image-version-url: ${{ fromJSON(steps.tag.outputs.image-urls)[2] }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.sha || github.sha }}
          fetch-depth: 0

      - name: Verify Built SHA Is On Main
        id: verify-main
        uses: optivem/actions/check-sha-on-branch@v1
        with:
          commit-sha: ${{ inputs.sha || github.sha }}

      - name: Read Target Component Version
        id: read-version
        uses: optivem/actions/read-target-version@v1
        with:
          file: system/multitier/backend-typescript/VERSION

      - name: Setup Node
        uses: optivem/actions/setup-node@v1
        with:
          node-version: 22.x
          working-directory: system/multitier/backend-typescript

      - name: Compile Code
        run: npm run build
        working-directory: system/multitier/backend-typescript

      - name: Run Unit Tests
        run: npm test
        working-directory: system/multitier/backend-typescript

      # TODO: Implement
      - name: Run Narrow Integration Tests
        run: echo "TODO - not yet implemented"

      # TODO: Implement
      - name: Run Component Tests
        run: echo "TODO - not yet implemented"

      # TODO: Implement
      - name: Run Contract Tests
        run: echo "TODO - not yet implemented"

      - name: Run Linter
        run: npm run lint
        working-directory: system/multitier/backend-typescript

      - name: Run Code Analysis
        if: steps.verify-main.outputs.on-branch == 'true' && env.SONAR_TOKEN != ''
        uses: SonarSource/sonarcloud-github-action@v5
        with:
          projectBaseDir: system/multitier/backend-typescript
          args: >
            -Dsonar.projectKey=optivem_shop-multitier-backend-typescript
            -Dsonar.projectName=shop-multitier-backend-typescript
            -Dsonar.organization=optivem
            -Dsonar.sources=src

      - name: Build Artifact
        if: steps.verify-main.outputs.on-branch == 'true'
        id: build
        uses: optivem/actions/build-docker-image@v1
        with:
          working-directory: system/multitier/backend-typescript
          image-name: multitier-backend-typescript
          commit-sha: ${{ inputs.sha || github.sha }}
          dockerfile: Dockerfile

      - name: Compose Dev Version
        if: steps.verify-main.outputs.on-branch == 'true'
        id: dev-version
        uses: optivem/actions/compose-prerelease-version@v1
        with:
          target-version: ${{ steps.read-version.outputs.target-version }}
          suffix: dev
          number: ${{ github.run_number }}

      - name: Tag Docker Image
        if: steps.verify-main.outputs.on-branch == 'true'
        id: tag
        uses: optivem/actions/tag-docker-image@v1
        with:
          source: ${{ steps.build.outputs.local-image-ref }}
          image-name: multitier-backend-typescript
          tags: |
            ${{ inputs.sha || github.sha }}
            latest
            ${{ steps.dev-version.outputs.version }}

      - name: Push Artifact
        if: steps.verify-main.outputs.on-branch == 'true'
        id: push
        uses: optivem/actions/push-docker-image@v1
        with:
          image-sha-url: ${{ fromJSON(steps.tag.outputs.image-urls)[0] }}
          image-latest-url: ${{ fromJSON(steps.tag.outputs.image-urls)[1] }}
          image-version-url: ${{ fromJSON(steps.tag.outputs.image-urls)[2] }}

  summary:
    needs: [check, run]
    if: always()
    runs-on: ubuntu-latest
    steps:
    - name: Summarize Stage
      uses: optivem/actions/render-stage-summary@v1
      with:
        stage-result: ${{ needs.run.result }}
        stage-name: 'Commit Stage'
        stage-success-content: |
          **Artifact URL:**
          `${{ needs.run.outputs.image-version-url }}`
