name: multitier-frontend-react-commit-stage

on:
  push:
    branches: [ "main" ]
    paths:
        - 'system/multitier/frontend-react/**'
        - '.github/workflows/multitier-frontend-react-commit-stage.yml'
  pull_request:
    branches: [ "main" ]
    paths:
        - 'system/multitier/frontend-react/**'
        - '.github/workflows/multitier-frontend-react-commit-stage.yml'
  workflow_dispatch:
    inputs:
      commit-sha:
        description: 'Git SHA to build (leave empty for HEAD)'
        required: false
        type: string

env:
  COMMIT_SHA: ${{ inputs.commit-sha || github.sha }}

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Ensure Environment Variables Defined
        uses: optivem/actions/validate-env-vars-defined@v1
        with:
          names: |
            DOCKERHUB_USERNAME
            DOCKERHUB_TOKEN
        env:
          DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          ref: ${{ env.COMMIT_SHA }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

  run:
    needs: check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    outputs:
      component-version: ${{ steps.read-version.outputs.base-version }}
      image-digest-url: ${{ steps.digest-url.outputs.value }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          ref: ${{ env.COMMIT_SHA }}
          fetch-depth: 0

      - name: Verify Built SHA Is On Main
        id: verify-main
        uses: optivem/actions/check-sha-on-branch@v1
        with:
          commit-sha: ${{ env.COMMIT_SHA }}

      - name: Read Base Component Version
        id: read-version
        uses: optivem/actions/read-base-version@v1
        with:
          file: system/multitier/frontend-react/VERSION

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: 'npm'
          cache-dependency-path: system/multitier/frontend-react/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: system/multitier/frontend-react

      - name: Compile Code
        run: npm run build
        working-directory: system/multitier/frontend-react

      # TODO: Implement
      - name: Run Unit Tests
        run: echo "TODO - not yet implemented"

      # TODO: Implement
      - name: Run Narrow Integration Tests
        run: echo "TODO - not yet implemented"

      # TODO: Implement
      - name: Run Component Tests
        run: echo "TODO - not yet implemented"

      # TODO: Implement
      - name: Run Contract Tests
        run: echo "TODO - not yet implemented"

      - name: Run Linter
        run: npm run lint
        working-directory: system/multitier/frontend-react

      - name: Run Code Analysis
        if: steps.verify-main.outputs.on-branch == 'true' && env.SONAR_TOKEN != ''
        uses: SonarSource/sonarqube-scan-action@v7
        with:
          projectBaseDir: system/multitier/frontend-react
          args: >
            -Dsonar.projectKey=optivem_shop-multitier-frontend-react
            -Dsonar.projectName=shop-multitier-frontend-react
            -Dsonar.organization=optivem
            -Dsonar.sources=src

      - name: Compose Dev Version
        if: steps.verify-main.outputs.on-branch == 'true'
        id: dev-version
        uses: optivem/actions/compose-prerelease-version@v1
        with:
          base-version: ${{ steps.read-version.outputs.base-version }}
          suffix: dev
          build-number: ${{ github.run_number }}

      - name: Log in to GHCR
        if: steps.verify-main.outputs.on-branch == 'true'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Extract Docker Metadata
        if: steps.verify-main.outputs.on-branch == 'true'
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}/multitier-frontend-react
          tags: |
            type=raw,value=sha-${{ env.COMMIT_SHA }}
            type=raw,value=latest
            type=raw,value=${{ steps.dev-version.outputs.version }}

      - name: Set up Docker Buildx
        if: steps.verify-main.outputs.on-branch == 'true'
        uses: docker/setup-buildx-action@v4

      - name: Pre-pull base images (retry transient registry 403s)
        if: steps.verify-main.outputs.on-branch == 'true'
        shell: bash
        run: |
          set -e
          for image in node:22-alpine nginx:alpine; do
            for attempt in 1 2 3; do
              if docker pull "$image"; then
                break
              fi
              if [ "$attempt" -eq 3 ]; then
                echo "FATAL: failed to pull $image after 3 attempts" >&2
                exit 1
              fi
              echo "Pull failed for $image (attempt $attempt/3); retrying in $((attempt * 15))s..."
              sleep $((attempt * 15))
            done
          done

      - name: Build and Push Docker Image
        if: steps.verify-main.outputs.on-branch == 'true'
        id: push
        uses: Wandalen/wretry.action@v3
        with:
          action: docker/build-push-action@v7
          attempt_limit: 3
          attempt_delay: 30000
          with: |
            context: system/multitier/frontend-react
            file: system/multitier/frontend-react/Dockerfile
            push: true
            tags: ${{ steps.meta.outputs.tags }}
            labels: ${{ steps.meta.outputs.labels }}
            provenance: mode=max
            sbom: true

      - name: Compose Digest URL
        if: steps.verify-main.outputs.on-branch == 'true'
        id: digest-url
        shell: bash
        run: echo "value=ghcr.io/${{ github.repository }}/multitier-frontend-react@${{ fromJSON(steps.push.outputs.outputs).digest }}" >> "$GITHUB_OUTPUT"

  summary:
    needs: [check, run]
    if: always()
    runs-on: ubuntu-latest
    steps:
    - name: Format Artifacts
      id: format-artifacts
      uses: optivem/actions/format-artifact-list@v1
      with:
        artifacts: ${{ needs.run.outputs.image-digest-url }}

    - name: Summarize Stage
      uses: optivem/actions/render-stage-summary@v1
      with:
        stage-name: 'Commit Stage'
        stage-result: ${{ needs.run.result }}
        stage-success-content: |
          🔗 **Artifacts:**
          ${{ steps.format-artifacts.outputs.formatted }}
