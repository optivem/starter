name: multitier-java-acceptance-stage-cloud

on:
  workflow_dispatch:

concurrency:
  group: multitier-java-acceptance-stage-cloud

jobs:
  preflight:
    runs-on: ubuntu-latest
    permissions:
      packages: read
    outputs:
      artifacts-exist: ${{ steps.check-artifacts.outputs.exist }}
      skip-reason: ${{ steps.check-artifacts.outputs.exist != 'true' && 'No artifacts published yet — waiting for the commit stage to produce images.' || '' }}
    steps:
      - name: Check Container Packages Exist
        id: check-artifacts
        uses: optivem/actions/check-github-container-packages-exist@v1

  check:
    needs: preflight
    if: needs.preflight.outputs.artifacts-exist == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      should-run: ${{ steps.should-run.outputs.changed }}
      skip-reason: ${{ steps.should-run.outputs.changed != 'true' && 'No new artifacts since the last successful run.' || '' }}
      image-digest-urls: ${{ steps.find-latest.outputs.image-digest-urls }}
      latest-image-timestamp: ${{ steps.find-latest.outputs.latest-image-timestamp }}
      last-run-at: ${{ steps.should-run.outputs.last-run-at }}
    steps:
      - name: Ensure Environment Variables Defined
        uses: optivem/actions/ensure-env-vars-defined@v1
        with:
          names: |
            DOCKERHUB_USERNAME
            DOCKERHUB_TOKEN
            GCP_PROJECT_ID
            GCP_REGION
            GCP_WORKLOAD_IDENTITY_PROVIDER
            GCP_SERVICE_ACCOUNT
        env:
          DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          GCP_REGION: ${{ vars.GCP_REGION }}
          GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          GCP_SERVICE_ACCOUNT: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Resolve Docker Image Digests
        id: find-latest
        uses: optivem/actions/resolve-docker-image-digests@v1
        with:
          image-urls: |
            ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}/multitier-frontend-react:latest
            ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}/multitier-backend-java:latest

      - name: Check for Docker Image Updates Since Last Run
        id: should-run
        uses: optivem/actions/check-update-since-last-github-workflow-run@v1
        with:
          last-updated-at: ${{ steps.find-latest.outputs.latest-image-timestamp }}
          workflow-name: ${{ github.workflow }}

  deploy-frontend:
    needs: check
    if: needs.check.outputs.should-run == 'true'
    runs-on: ubuntu-latest
    environment: multitier-java-acceptance
    permissions:
      contents: read
      id-token: write
    outputs:
      app-url: ${{ steps.deploy.outputs.service-url }}
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Setup Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy Frontend to Cloud Run
        id: deploy
        uses: optivem/actions/deploy-to-cloud-run@v1
        with:
          environment: acceptance
          version: latest
          image-url: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}/multitier-frontend-react:latest
          project-id: ${{ vars.GCP_PROJECT_ID }}
          region: ${{ vars.GCP_REGION }}
          service-name: multitier-java-frontend-acceptance
          port: '3000'

  deploy-backend:
    needs: check
    if: needs.check.outputs.should-run == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    outputs:
      app-url: ${{ steps.deploy.outputs.service-url }}
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Setup Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy Backend to Cloud Run
        id: deploy
        uses: optivem/actions/deploy-to-cloud-run@v1
        with:
          environment: acceptance
          version: latest
          image-url: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}/multitier-backend-java:latest
          project-id: ${{ vars.GCP_PROJECT_ID }}
          region: ${{ vars.GCP_REGION }}
          service-name: multitier-java-backend-acceptance
          port: '8080'
          env-vars: |
            SPRING_PROFILES_ACTIVE=cloud
          secrets: |
            DATABASE_URL=db-connection-string:latest

  deploy-external-real:
    needs: check
    if: needs.check.outputs.should-run == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    outputs:
      external-url: ${{ steps.deploy.outputs.service-url }}
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Setup Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy External Real to Cloud Run
        id: deploy
        uses: optivem/actions/deploy-to-cloud-run@v1
        with:
          environment: acceptance
          version: latest
          image-url: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}/external-real-sim:latest
          project-id: ${{ vars.GCP_PROJECT_ID }}
          region: ${{ vars.GCP_REGION }}
          service-name: external-real-acceptance
          port: '9000'

  deploy-external-stub:
    needs: check
    if: needs.check.outputs.should-run == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    outputs:
      external-url: ${{ steps.deploy.outputs.service-url }}
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Setup Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy External Stub to Cloud Run
        id: deploy
        uses: optivem/actions/deploy-to-cloud-run@v1
        with:
          environment: acceptance
          version: latest
          image-url: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}/external-stub:latest
          project-id: ${{ vars.GCP_PROJECT_ID }}
          region: ${{ vars.GCP_REGION }}
          service-name: external-stub-acceptance
          port: '8080'

  test-smoke-real:
    needs: [deploy-frontend, deploy-backend, deploy-external-real]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Java and Gradle
        uses: optivem/actions/setup-java-gradle@v1
        with:
          java-version: 21
          working-directory: system-test/java

      - name: Run Smoke Tests (Real)
        run: ./gradlew test -Dversion=latest -Dtype=smoke -DexternalSystemMode=real -Denvironment=acceptance -DbaseUrl=${{ needs.deploy-frontend.outputs.app-url }} -DexternalBaseUrl=${{ needs.deploy-external-real.outputs.external-url }}
        working-directory: system-test/java

  test-smoke-stub:
    needs: [deploy-frontend, deploy-backend, deploy-external-stub]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Java and Gradle
        uses: optivem/actions/setup-java-gradle@v1
        with:
          java-version: 21
          working-directory: system-test/java

      - name: Run Smoke Tests (Stub)
        run: ./gradlew test -Dversion=latest -Dtype=smoke -DexternalSystemMode=stub -Denvironment=acceptance -DbaseUrl=${{ needs.deploy-frontend.outputs.app-url }} -DexternalBaseUrl=${{ needs.deploy-external-stub.outputs.external-url }}
        working-directory: system-test/java

  test-acceptance-api:
    needs: [deploy-frontend, deploy-backend, deploy-external-real]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Java and Gradle
        uses: optivem/actions/setup-java-gradle@v1
        with:
          java-version: 21
          working-directory: system-test/java

      - name: Run Acceptance Tests - API Channel
        run: ./gradlew test -Dversion=latest -Dtype=acceptance -DexcludeTags=isolated -Dchannel=API -Denvironment=acceptance -DbaseUrl=${{ needs.deploy-frontend.outputs.app-url }} -DexternalBaseUrl=${{ needs.deploy-external-real.outputs.external-url }}
        working-directory: system-test/java

  test-acceptance-ui:
    needs: [deploy-frontend, deploy-backend, deploy-external-real]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Java and Gradle
        uses: optivem/actions/setup-java-gradle@v1
        with:
          java-version: 21
          working-directory: system-test/java

      - name: Cache Playwright Browsers
        id: cache-playwright
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('system-test/java/build.gradle') }}

      - name: Install Playwright Browsers
        if: steps.cache-playwright.outputs.cache-hit != 'true'
        run: npx playwright install chromium
        working-directory: system-test/java

      - name: Install Playwright System Dependencies
        run: npx playwright install-deps chromium
        working-directory: system-test/java

      - name: Run Acceptance Tests - UI Channel
        run: ./gradlew test -Dversion=latest -Dtype=acceptance -DexcludeTags=isolated -Dchannel=UI -DchannelMode=static -Denvironment=acceptance -DbaseUrl=${{ needs.deploy-frontend.outputs.app-url }} -DexternalBaseUrl=${{ needs.deploy-external-real.outputs.external-url }}
        working-directory: system-test/java

  test-acceptance-isolated-api:
    needs: [deploy-frontend, deploy-backend, deploy-external-real]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Java and Gradle
        uses: optivem/actions/setup-java-gradle@v1
        with:
          java-version: 21
          working-directory: system-test/java

      - name: Run Acceptance Tests (Isolated) - API Channel
        run: ./gradlew test -Dversion=latest -Dtype=acceptance -DincludeTags=isolated -Dchannel=API -Denvironment=acceptance -DbaseUrl=${{ needs.deploy-frontend.outputs.app-url }} -DexternalBaseUrl=${{ needs.deploy-external-real.outputs.external-url }}
        working-directory: system-test/java

  test-acceptance-isolated-ui:
    needs: [deploy-frontend, deploy-backend, deploy-external-real]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Java and Gradle
        uses: optivem/actions/setup-java-gradle@v1
        with:
          java-version: 21
          working-directory: system-test/java

      - name: Cache Playwright Browsers
        id: cache-playwright
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('system-test/java/build.gradle') }}

      - name: Install Playwright Browsers
        if: steps.cache-playwright.outputs.cache-hit != 'true'
        run: npx playwright install chromium
        working-directory: system-test/java

      - name: Install Playwright System Dependencies
        run: npx playwright install-deps chromium
        working-directory: system-test/java

      - name: Run Acceptance Tests (Isolated) - UI Channel
        run: ./gradlew test -Dversion=latest -Dtype=acceptance -DincludeTags=isolated -Dchannel=UI -DchannelMode=static -Denvironment=acceptance -DbaseUrl=${{ needs.deploy-frontend.outputs.app-url }} -DexternalBaseUrl=${{ needs.deploy-external-real.outputs.external-url }}
        working-directory: system-test/java

  test-contract-stub:
    needs: [deploy-frontend, deploy-backend, deploy-external-stub]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Java and Gradle
        uses: optivem/actions/setup-java-gradle@v1
        with:
          java-version: 21
          working-directory: system-test/java

      - name: Run Contract Tests (Stub)
        run: ./gradlew test -Dversion=latest -Dtype=contract -DexcludeTags=isolated -DexternalSystemMode=stub -Denvironment=acceptance -DbaseUrl=${{ needs.deploy-frontend.outputs.app-url }} -DexternalBaseUrl=${{ needs.deploy-external-stub.outputs.external-url }}
        working-directory: system-test/java

  test-contract-isolated-stub:
    needs: [deploy-frontend, deploy-backend, deploy-external-stub]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Java and Gradle
        uses: optivem/actions/setup-java-gradle@v1
        with:
          java-version: 21
          working-directory: system-test/java

      - name: Run Contract Tests (Isolated) (Stub)
        run: ./gradlew test -Dversion=latest -Dtype=contract -DincludeTags=isolated -DexternalSystemMode=stub -Denvironment=acceptance -DbaseUrl=${{ needs.deploy-frontend.outputs.app-url }} -DexternalBaseUrl=${{ needs.deploy-external-stub.outputs.external-url }}
        working-directory: system-test/java

  test-contract-real:
    needs: [deploy-frontend, deploy-backend, deploy-external-real]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Java and Gradle
        uses: optivem/actions/setup-java-gradle@v1
        with:
          java-version: 21
          working-directory: system-test/java

      - name: Run Contract Tests (Real)
        run: ./gradlew test -Dversion=latest -Dtype=contract -DexternalSystemMode=real -Denvironment=acceptance -DbaseUrl=${{ needs.deploy-frontend.outputs.app-url }} -DexternalBaseUrl=${{ needs.deploy-external-real.outputs.external-url }}
        working-directory: system-test/java

  test-e2e-api:
    needs: [deploy-frontend, deploy-backend, deploy-external-real]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Java and Gradle
        uses: optivem/actions/setup-java-gradle@v1
        with:
          java-version: 21
          working-directory: system-test/java

      - name: Run E2E Tests - API Channel
        run: ./gradlew test -Dversion=latest -Dtype=e2e -Dchannel=API -Denvironment=acceptance -DbaseUrl=${{ needs.deploy-frontend.outputs.app-url }} -DexternalBaseUrl=${{ needs.deploy-external-real.outputs.external-url }}
        working-directory: system-test/java

  test-e2e-ui:
    needs: [deploy-frontend, deploy-backend, deploy-external-real]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Java and Gradle
        uses: optivem/actions/setup-java-gradle@v1
        with:
          java-version: 21
          working-directory: system-test/java

      - name: Cache Playwright Browsers
        id: cache-playwright
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('system-test/java/build.gradle') }}

      - name: Install Playwright Browsers
        if: steps.cache-playwright.outputs.cache-hit != 'true'
        run: npx playwright install chromium
        working-directory: system-test/java

      - name: Install Playwright System Dependencies
        run: npx playwright install-deps chromium
        working-directory: system-test/java

      - name: Run E2E Tests - UI Channel
        run: ./gradlew test -Dversion=latest -Dtype=e2e -Dchannel=UI -DchannelMode=static -Denvironment=acceptance -DbaseUrl=${{ needs.deploy-frontend.outputs.app-url }} -DexternalBaseUrl=${{ needs.deploy-external-real.outputs.external-url }}
        working-directory: system-test/java

  promote:
    needs: [check, deploy-frontend, deploy-backend, test-smoke-real, test-smoke-stub, test-acceptance-api, test-acceptance-ui, test-acceptance-isolated-api, test-acceptance-isolated-ui, test-contract-stub, test-contract-isolated-stub, test-contract-real, test-e2e-api, test-e2e-ui]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    outputs:
      version: ${{ steps.generate-version.outputs.version }}
      image-urls: ${{ steps.tag-images.outputs.image-urls }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Read Target System Version
        id: read-version
        uses: optivem/actions/read-target-version@v1

      - name: Generate Prerelease Version
        id: generate-version
        uses: optivem/actions/compose-prerelease-version@v1
        with:
          target-version: ${{ steps.read-version.outputs.target-version }}
          suffix: rc
          number: ${{ github.run_number }}
          prefix: multitier-java-cloud

      - name: Tag Docker Images for Prerelease
        id: tag-images
        uses: optivem/actions/promote-docker-images@v1
        with:
          image-urls: ${{ needs.check.outputs.image-digest-urls }}
          tag: ${{ steps.generate-version.outputs.version }}

      - name: Create and Push Git Tag
        uses: optivem/actions/create-and-push-tag@v1
        with:
          tag: ${{ steps.generate-version.outputs.version }}

  summary:
    needs: [preflight, check, promote]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
    - name: Summarize Stage
      uses: optivem/actions/compose-system-stage-summary@v1
      with:
        stage-name: 'Acceptance Stage (Cloud Run)'
        environment: acceptance
        stage-result: ${{ needs.promote.result }}
        success-version: ${{ needs.promote.outputs.version }}
        success-artifact-ids: ${{ needs.promote.outputs.image-urls }}
        skipped-reason: ${{ needs.preflight.outputs.skip-reason || needs.check.outputs.skip-reason }}
        latest-artifact-ids: ${{ needs.check.outputs.image-digest-urls }}
        latest-updated-at: ${{ needs.check.outputs.latest-image-timestamp }}
        last-run-at: ${{ needs.check.outputs.last-run-at }}
