name: _prerelease-pipeline

on:
  workflow_call:
    inputs:
      prefix:
        description: 'Pipeline prefix (e.g. monolith-java, multitier-dotnet)'
        required: true
        type: string
      architecture:
        description: 'Architecture: monolith or multitier'
        required: true
        type: string
      language:
        description: 'Language: java, dotnet, or typescript'
        required: true
        type: string
      commit-workflows:
        description: 'JSON array of commit-stage workflow filenames'
        required: false
        type: string
        default: '[]'
      skip-local-stage:
        description: 'Skip local stage (when local stages are run externally)'
        required: false
        type: boolean
        default: false
      skip-commit-stage:
        description: 'Skip commit stage (when commit stages are run externally)'
        required: false
        type: boolean
        default: false
      level:
        description: 'Verification level: local, commit, acceptance, or qa'
        required: false
        type: string
        default: 'qa'

jobs:
  local:
    if: ${{ !inputs.skip-local-stage }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      # Setup runtimes
      - name: Setup Node.js
        if: inputs.language == 'typescript' || inputs.architecture == 'multitier'
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Setup Java
        if: inputs.language == 'java'
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Setup .NET
        if: inputs.language == 'dotnet'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      # Compile source — monolith
      - name: Compile System (monolith, typescript)
        if: inputs.architecture == 'monolith' && inputs.language == 'typescript'
        run: npm ci && npx tsc --noEmit
        working-directory: system/monolith/typescript

      - name: Compile System (monolith, java)
        if: inputs.architecture == 'monolith' && inputs.language == 'java'
        run: ./gradlew compileJava compileTestJava
        working-directory: system/monolith/java

      - name: Compile System (monolith, dotnet)
        if: inputs.architecture == 'monolith' && inputs.language == 'dotnet'
        run: dotnet build
        working-directory: system/monolith/dotnet

      # Compile source — multitier backend
      - name: Compile Backend (multitier, typescript)
        if: inputs.architecture == 'multitier' && inputs.language == 'typescript'
        run: npm ci && npx tsc --noEmit
        working-directory: system/multitier/backend-typescript

      - name: Compile Backend (multitier, java)
        if: inputs.architecture == 'multitier' && inputs.language == 'java'
        run: ./gradlew compileJava compileTestJava
        working-directory: system/multitier/backend-java

      - name: Compile Backend (multitier, dotnet)
        if: inputs.architecture == 'multitier' && inputs.language == 'dotnet'
        run: dotnet build
        working-directory: system/multitier/backend-dotnet

      # Compile source — multitier frontend
      - name: Compile Frontend (multitier)
        if: inputs.architecture == 'multitier'
        run: npm ci && npm run build
        working-directory: system/multitier/frontend-react

      # Compile system tests
      - name: Compile System Tests (typescript)
        if: inputs.language == 'typescript'
        run: npm ci && npx tsc --noEmit
        working-directory: system-test/typescript

      - name: Compile System Tests (java)
        if: inputs.language == 'java'
        run: ./gradlew compileJava compileTestJava
        working-directory: system-test/java

      - name: Compile System Tests (dotnet)
        if: inputs.language == 'dotnet'
        run: dotnet build
        working-directory: system-test/dotnet

      # Run system tests (sample) — latest
      - name: Run System Tests - Latest (Sample)
        run: pwsh -NonInteractive -Command "./Run-SystemTests.ps1 -Architecture ${{ inputs.architecture }} -Sample"
        working-directory: system-test/${{ inputs.language }}

      # Run system tests (sample) — legacy
      - name: Run System Tests - Legacy (Sample)
        run: pwsh -NonInteractive -Command "./Run-SystemTests.ps1 -Architecture ${{ inputs.architecture }} -Legacy -Sample"
        working-directory: system-test/${{ inputs.language }}

  commit-stage:
    needs: local
    if: ${{ always() && inputs.level != 'local' && !inputs.skip-commit-stage && (inputs.skip-local-stage || needs.local.result == 'success') }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        workflow: ${{ fromJSON(inputs.commit-workflows) }}
    steps:
      - uses: optivem/actions/trigger-and-wait@main
        with:
          workflow: ${{ matrix.workflow }}

  acceptance-stage:
    needs: [local, commit-stage]
    if: ${{ always() && inputs.level != 'local' && inputs.level != 'commit' && (inputs.skip-local-stage || needs.local.result == 'success') && (inputs.skip-commit-stage || needs.commit-stage.result == 'success') }}
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get-version.outputs.tag }}
    steps:
      - id: trigger
        uses: optivem/actions/trigger-and-wait@main
        with:
          workflow: ${{ inputs.prefix }}-acceptance-stage.yml
          poll-interval: '300'

      - id: get-version
        uses: optivem/actions/find-release-by-run@main
        with:
          run-id: ${{ steps.trigger.outputs.run-id }}

  acceptance-stage-legacy:
    needs: acceptance-stage
    if: ${{ always() && inputs.level != 'commit' && needs.acceptance-stage.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: optivem/actions/trigger-and-wait@main
        with:
          workflow: ${{ inputs.prefix }}-acceptance-stage-legacy.yml
          poll-interval: '300'

  qa-stage:
    needs: [acceptance-stage, acceptance-stage-legacy]
    if: ${{ always() && inputs.level == 'qa' && needs.acceptance-stage-legacy.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: optivem/actions/trigger-and-wait@main
        with:
          workflow: ${{ inputs.prefix }}-qa-stage.yml
          inputs: '{"version": "${{ needs.acceptance-stage.outputs.version }}"}'

  qa-signoff:
    needs: [acceptance-stage, qa-stage]
    if: ${{ always() && inputs.level == 'qa' && needs.qa-stage.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: optivem/actions/trigger-and-wait@main
        with:
          workflow: ${{ inputs.prefix }}-qa-signoff.yml
          inputs: '{"version": "${{ needs.acceptance-stage.outputs.version }}", "result": "approved"}'

  # Note: prod-stage is intentionally NOT part of the pipeline.
  # Production releases are orchestrated externally via meta-release-stage (for full releases)
  # or via direct workflow_dispatch on the per-flavor *-prod-stage.yml workflows.
  # Keeping the release step out of the pipeline enforces the rule that
  # "verification" and "release" are separate concerns.
