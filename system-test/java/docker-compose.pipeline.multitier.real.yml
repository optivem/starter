name: starter-java-multitier-real

services:

  frontend:
    image: ghcr.io/optivem/starter/multitier-frontend-react:latest
    ports:
      - "3101:3000"
    environment:
      - BACKEND_API_URL=http://backend:8081
    depends_on:
      - backend
    networks:
      - app-network

  backend:
    image: ghcr.io/optivem/starter/multitier-backend-java:latest
    ports:
      - "8101:8081"
    environment:
      - POSTGRES_URL=jdbc:postgresql://postgres:5432/starter
      - POSTGRES_USERNAME=starter_user
      - POSTGRES_PASSWORD=starter_password
      - ALLOWED_ORIGINS=http://localhost:3101,http://frontend:3000
      - ERP_API_URL=http://external-real:9000/erp
      - CLOCK_API_URL=http://external-real:9000/clock
      - EXTERNAL_SYSTEM_MODE=real
    depends_on:
      postgres:
        condition: service_healthy
      external-real:
        condition: service_started
    networks:
      - app-network

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=starter
      - POSTGRES_USER=starter_user
      - POSTGRES_PASSWORD=starter_password
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U starter_user -d starter"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  external-real:
    image: node:18-alpine
    ports:
      - "9101:9000"

    volumes:
      - ../../system/external-real-sim:/app
    working_dir: /app
    command: sh -c "npm install && npm start"
    networks:
      - app-network

volumes:
  postgres-data:

networks:
  app-network:
    driver: bridge
