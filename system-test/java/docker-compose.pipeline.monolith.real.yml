name: eshop-java-monolith-real

services:

  monolith:
    image: ghcr.io/optivem/starter/monolith-system-java:latest
    ports:
      - "3111:8080"
      - "8111:8080"
    environment:
      - POSTGRES_DB_HOST=postgres
      - POSTGRES_DB_PORT=5432
      - POSTGRES_DB_NAME=eshop
      - POSTGRES_DB_USER=eshop_user
      - POSTGRES_DB_PASSWORD=eshop_password
      - ERP_API_URL=http://external-real:9000/erp
      - CLOCK_API_URL=http://external-real:9000/clock
      - EXTERNAL_SYSTEM_MODE=real
    depends_on:
      postgres:
        condition: service_healthy
      external-real:
        condition: service_started
    networks:
      - app-network

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=eshop
      - POSTGRES_USER=eshop_user
      - POSTGRES_PASSWORD=eshop_password
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eshop_user -d eshop"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  external-real:
    image: node:18-alpine
    ports:
      - "9111:9000"
    volumes:
      - ../../system/external-real-sim:/app
    working_dir: /app
    command: sh -c "npm install && npm start"
    networks:
      - app-network

volumes:
  postgres-data:

networks:
  app-network:
    driver: bridge
