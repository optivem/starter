name: starter-java-monolith-stub

services:

  monolith:
    image: ghcr.io/optivem/starter/monolith-java-monolith:latest
    ports:
      - "2102:8080"
    environment:
      - POSTGRES_URL=jdbc:postgresql://postgres:5432/starter
      - POSTGRES_USERNAME=starter_user
      - POSTGRES_PASSWORD=starter_password
      - ERP_API_URL=http://external-stub:8080/erp
      - CLOCK_API_URL=http://external-stub:8080/clock
      - EXTERNAL_SYSTEM_MODE=stub
    depends_on:
      postgres:
        condition: service_healthy
      external-stub:
        condition: service_started
    networks:
      - app-network

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=starter
      - POSTGRES_USER=starter_user
      - POSTGRES_PASSWORD=starter_password
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U starter_user -d starter"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  external-stub:
    image: wiremock/wiremock:3.10.0
    ports:
      - "9104:8080"
    volumes:
      - ../../system/external-stub:/home/wiremock
    command: --verbose --global-response-templating
    networks:
      - app-network

volumes:
  postgres-data:

networks:
  app-network:
    driver: bridge
