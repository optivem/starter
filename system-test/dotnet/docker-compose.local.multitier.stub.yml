name: starter-dotnet-multitier-stub

services:

  frontend:
    build:
      context: ../../system/multitier/frontend-react
      dockerfile: Dockerfile
    ports:
      - "3212:3000"
    environment:
      - BACKEND_API_URL=http://backend:8081
    depends_on:
      - backend
    networks:
      - app-network

  backend:
    build:
      context: ../../system/multitier/backend-dotnet
      dockerfile: Dockerfile
    ports:
      - "8212:8081"
    environment:
      - POSTGRES_DB_HOST=postgres
      - POSTGRES_DB_PORT=5432
      - POSTGRES_DB_NAME=starter
      - POSTGRES_DB_USER=starter_user
      - POSTGRES_DB_PASSWORD=starter_password
      - Cors__AllowedOrigins__0=http://localhost:3202
      - Cors__AllowedOrigins__1=http://frontend:3000
      - ERP_API_URL=http://external-stub:8080/erp
      - CLOCK_API_URL=http://external-stub:8080/clock
      - EXTERNAL_SYSTEM_MODE=stub
    depends_on:
      postgres:
        condition: service_healthy
      external-stub:
        condition: service_started
    networks:
      - app-network

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=starter
      - POSTGRES_USER=starter_user
      - POSTGRES_PASSWORD=starter_password
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U starter_user -d starter"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  external-stub:
    image: wiremock/wiremock:3.10.0
    ports:
      - "9212:8080"
    volumes:
      - ../../system/external-stub:/home/wiremock
    command: --verbose --global-response-templating
    networks:
      - app-network

volumes:
  postgres-data:

networks:
  app-network:
    driver: bridge
