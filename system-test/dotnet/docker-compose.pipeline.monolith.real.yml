name: starter-dotnet-monolith-real

services:

  monolith:
    image: ghcr.io/optivem/starter/monolith-dotnet-monolith:latest
    ports:
      - "3201:8080"
      - "8201:8080"
    environment:
      - ConnectionStrings__Postgres=Host=postgres;Port=5432;Database=starter;Username=starter_user;Password=starter_password
      - Erp__Url=http://external-real:9000/erp
      - Clock__Url=http://external-real:9000/clock
      - External__SystemMode=real
    depends_on:
      postgres:
        condition: service_healthy
      external-real:
        condition: service_started
    networks:
      - app-network

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=starter
      - POSTGRES_USER=starter_user
      - POSTGRES_PASSWORD=starter_password
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U starter_user -d starter"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  external-real:
    image: node:18-alpine
    ports:
      - "9201:9000"
    volumes:
      - ../../system/external-real-sim:/app
    working_dir: /app
    command: sh -c "npm install && npm start"
    networks:
      - app-network

volumes:
  postgres-data:

networks:
  app-network:
    driver: bridge
