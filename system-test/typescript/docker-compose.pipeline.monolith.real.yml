name: starter-typescript-monolith-real

services:

  monolith:
    image: ghcr.io/optivem/starter/monolith-typescript-monolith:latest
    ports:
      - "3301:3000"
      - "8301:3000"
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=starter
      - POSTGRES_USER=starter_user
      - POSTGRES_PASSWORD=starter_password
      - ERP_API_URL=http://external-real:9000/erp
      - CLOCK_API_URL=http://external-real:9000/clock
    depends_on:
      postgres:
        condition: service_healthy
      external-real:
        condition: service_started
    networks:
      - app-network

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=starter
      - POSTGRES_USER=starter_user
      - POSTGRES_PASSWORD=starter_password
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U starter_user -d starter"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  external-real:
    image: node:18-alpine
    ports:
      - "9301:9000"
    volumes:
      - ../../system/external-real-sim:/app
    working_dir: /app
    command: sh -c "npm install && npm start"
    networks:
      - app-network

volumes:
  postgres-data:

networks:
  app-network:
    driver: bridge
