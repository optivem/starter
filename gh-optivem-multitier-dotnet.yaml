project:
    provider: github
    url: https://github.com/orgs/optivem/projects/20
repo_strategy: mono-repo
sonar:
    organization: optivem
system:
    architecture: multitier
    config: docker/dotnet/multitier/systems.yaml
    backend:
        path: system/multitier/backend-dotnet
        repo: optivem/shop
        lang: dotnet
        sonar_project: optivem_shop-multitier-backend-dotnet
    frontend:
        path: system/multitier/frontend-react
        repo: optivem/shop
        lang: typescript
        sonar_project: optivem_shop-multitier-frontend-react
system_test:
    path: system-test/dotnet
    config: system-test/dotnet/tests.yaml
    repo: optivem/shop
    lang: dotnet
    sonar_project: optivem_shop-tests-dotnet
external_systems:
    stubs:
        path: external-systems/stubs
        repo: optivem/shop
    simulators:
        path: external-systems/simulators
        repo: optivem/shop
paths:
    driver_port: system-test/dotnet/Testkit.Driver.Port/shop
    driver_adapter: system-test/dotnet/Testkit.Driver.Adapter/shop
    external_system_driver_port: system-test/dotnet/Testkit.External.Port/shop
    external_system_driver_adapter: system-test/dotnet/Testkit.External.Adapter/shop
    at_test: system-test/dotnet/SystemTests/Latest/AcceptanceTests
    dsl_port: system-test/dotnet/Testkit.Dsl.Port/shop
    dsl_core: system-test/dotnet/Testkit.Dsl.Core/shop
    ct_test: system-test/dotnet/SystemTests/Latest/ExternalSystemContractTests
