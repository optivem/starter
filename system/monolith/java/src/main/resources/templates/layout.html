<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="layout(title, content)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:replace="${title}">hhop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .status-PLACED { color: #198754; font-weight: bold; }
        .status-CANCELLED { color: #dc3545; font-weight: bold; }
        .status-DELIVERED { color: #0d6efd; font-weight: bold; }
        .navbar-brand { font-weight: bold; }
        .notification { padding: 12px; margin-top: 10px; margin-bottom: 16px; border-radius: 4px; font-weight: 600; }
        .notification.success { background: #d1e7dd; color: #0f5132; border: 1px solid #badbcc; }
        .notification.error { background: #f8d7da; color: #842029; border: 1px solid #f5c2c7; }
        .notification .error-message { margin-bottom: 8px; }
        .notification .field-error { margin-left: 12px; margin-top: 4px; font-weight: 400; }
        body { min-height: 100vh; background-color: #f8f9fa; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/">hhop</a>
        </div>
    </nav>

    <div class="container mt-4">
        <div th:replace="${content}">Page content</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
