<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::title}, ~{::section})}">
<head>
    <title>Order History</title>
</head>
<body>
<section>
    <nav aria-label="breadcrumb">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="/">Home</a></li>
            <li class="breadcrumb-item active" aria-current="page">Order History</li>
        </ol>
    </nav>

    <h2>Order History</h2>

    <div class="card shadow">
        <div class="card-header bg-primary text-white">
            <h4 class="mb-0">Order History</h4>
        </div>
        <div class="card-body">
            <div class="row mb-3">
                <div class="col-md-8">
                    <label for="orderNumberFilter" class="form-label">Filter by Order Number:</label>
                    <input type="text" class="form-control" id="orderNumberFilter"
                           placeholder="Enter order number..." aria-label="Order Number">
                </div>
                <div class="col-md-4 d-flex align-items-end">
                    <button class="btn btn-secondary w-100" id="refreshBtn"
                            aria-label="Refresh Order List">
                        Refresh
                    </button>
                </div>
            </div>

            <div id="loading" class="text-center" style="display: none;">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
                <p class="mt-3">Loading orders...</p>
            </div>

            <div id="errorMessage" style="display: none;"></div>

            <div id="ordersTableContainer" style="display: none;">
                <div class="table-responsive">
                    <table class="table table-striped table-hover">
                        <thead>
                            <tr>
                                <th>Order Number</th>
                                <th>Order Date</th>
                                <th>SKU</th>
                                <th>Quantity</th>
                                <th>Total Price</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="ordersBody">
                        </tbody>
                    </table>
                </div>
            </div>

            <div id="emptyMessage" style="display: none;">
                <table class="table table-striped table-hover">
                    <thead>
                        <tr>
                            <th>Order Number</th>
                            <th>Order Date</th>
                            <th>SKU</th>
                            <th>Quantity</th>
                            <th>Total Price</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td colspan="7" class="text-center">No orders found</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        async function loadOrders() {
            var filter = document.getElementById('orderNumberFilter').value.trim();
            var loading = document.getElementById('loading');
            var ordersTableContainer = document.getElementById('ordersTableContainer');
            var emptyMessage = document.getElementById('emptyMessage');
            var errorMessage = document.getElementById('errorMessage');
            var refreshBtn = document.getElementById('refreshBtn');

            loading.style.display = 'block';
            ordersTableContainer.style.display = 'none';
            emptyMessage.style.display = 'none';
            errorMessage.style.display = 'none';
            refreshBtn.disabled = true;

            try {
                var url = '/api/orders';
                if (filter) {
                    url += '?orderNumber=' + encodeURIComponent(filter);
                }

                var response = await fetch(url);
                var data = await response.json();

                loading.style.display = 'none';
                refreshBtn.disabled = false;

                if (!response.ok) {
                    errorMessage.innerHTML = '<div class="alert alert-danger d-flex justify-content-between align-items-center" role="alert"><div><strong>Error:</strong> ' + (data.detail || 'Failed to load orders') + '</div><button class="btn btn-sm btn-outline-danger" onclick="loadOrders()">Try Again</button></div>';
                    errorMessage.style.display = 'block';
                    return;
                }

                var orders = data.orders || [];

                if (orders.length === 0) {
                    emptyMessage.style.display = 'block';
                    return;
                }

                var tbody = document.getElementById('ordersBody');
                tbody.innerHTML = '';

                orders.forEach(function(order) {
                    var row = document.createElement('tr');
                    row.innerHTML =
                        '<td>' + order.orderNumber + '</td>' +
                        '<td>' + new Date(order.orderTimestamp).toLocaleString('en-US', { timeZone: 'UTC' }) + '</td>' +
                        '<td>' + order.sku + '</td>' +
                        '<td>' + order.quantity + '</td>' +
                        '<td>$' + order.totalPrice.toFixed(2) + '</td>' +
                        '<td><span class="status-' + order.status + '">' + order.status + '</span></td>' +
                        '<td><a href="/order-details/' + encodeURIComponent(order.orderNumber) + '">View Details</a></td>';
                    tbody.appendChild(row);
                });

                ordersTableContainer.style.display = 'block';
            } catch (err) {
                loading.style.display = 'none';
                refreshBtn.disabled = false;
                errorMessage.innerHTML = '<div class="alert alert-danger d-flex justify-content-between align-items-center" role="alert"><div><strong>Error:</strong> Network error: ' + err.message + '</div><button class="btn btn-sm btn-outline-danger" onclick="loadOrders()">Try Again</button></div>';
                errorMessage.style.display = 'block';
            }
        }

        document.getElementById('refreshBtn').addEventListener('click', loadOrders);
        document.getElementById('orderNumberFilter').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') loadOrders();
        });

        loadOrders();
    </script>
</section>
</body>
</html>
