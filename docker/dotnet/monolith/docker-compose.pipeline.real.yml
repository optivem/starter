name: my-shop-real

services:

  system:
    image: ghcr.io/optivem/shop/monolith-system-dotnet:latest
    ports:
      - "3211:8080"
      - "8211:8080"
    environment:
      - POSTGRES_DB_HOST=postgres
      - POSTGRES_DB_PORT=5432
      - POSTGRES_DB_NAME=app
      - POSTGRES_DB_USER=app
      - POSTGRES_DB_PASSWORD=app
      - ERP_API_URL=http://external-real:9000/erp
      - CLOCK_API_URL=http://external-real:9000/clock
      - TAX_API_URL=http://external-real:9000/tax
      - EXTERNAL_SYSTEM_MODE=real
    depends_on:
      postgres:
        condition: service_healthy
      external-real:
        condition: service_started
    networks:
      - app-network

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=app
      - POSTGRES_USER=app
      - POSTGRES_PASSWORD=app
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  external-real:
    image: node:18-alpine
    ports:
      - "9211:9000"
    volumes:
      - ../../../system/external-real-sim:/app
    working_dir: /app
    command: sh -c "npm install && npm start"
    networks:
      - app-network

volumes:
  postgres-data:

networks:
  app-network:
    driver: bridge
